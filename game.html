}

function buildACItems(items, onPick) {
  conAC.innerHTML = '';
  items.forEach(item => {
    const d = document.createElement('div');
    d.textContent = item.label;
    d.dataset.value = item.value;
    d.onclick = () => { onPick(item.value); hideAC(); conInput.focus(); };
    conAC.appendChild(d);
  });
  conAC.style.display = 'block';
  acIndex = -1;
}

function acCoords(partial, max) {
  const coords = [];
  for (let i = 0; i < max; i++) {
    const s = String(i);
    if (s.startsWith(partial)) coords.push({ label: (max === gameCols ? 'x=' : 'y=') + i, value: s });
  }
  return coords;
}

function acBlocks(partial) {
  const matches = [];
  Object.keys(TILE_NAMES).forEach(n => {
    if (n.startsWith(partial)) matches.push({ label: n + ' (' + TILE_NAMES[n] + ')', value: n });
  });
  if (/^\d/.test(partial)) {
    for (let i = 0; i <= 32; i++) {
      const s = String(i);
      if (s.startsWith(partial)) {
        const name = Object.keys(TILE_NAMES).find(k => TILE_NAMES[k] === i) || '?';
        if (!matches.some(m => m.value === s)) matches.push({ label: i + ' (' + name + ')', value: s });
      }
    }
  }
  return matches;
}

function updateAC() {
  const raw = conInput.value.toLowerCase();
  const val = raw.trim();
  if (!val) { hideAC(); return; }
  const parts = val.split(/\s+/);
  if (raw.endsWith(' ')) parts.push('');
  const cmd = parts[0];
  const prefix = () => parts.slice(0, -1).join(' ') + ' ';

  if (parts.length > 1) {
    // Commands with: <x> <y> <block>  (setpos)
    if (cmd === 'setpos') {
      if (parts.length === 2) { const c = acCoords(parts[1], gameCols); if (c.length > 0 && c.length <= 12) { buildACItems(c, v => { conInput.value = prefix() + v + ' '; }); return; } }
      else if (parts.length === 3) { const c = acCoords(parts[2], gameRows); if (c.length > 0 && c.length <= 12) { buildACItems(c, v => { conInput.value = prefix() + v + ' '; }); return; } }
      else if (parts.length === 4) { const m = acBlocks(parts[3]); if (m.length > 0 && m.length <= 12) { buildACItems(m, v => { conInput.value = prefix() + v; }); return; } }
    }
    // Commands with: <x> <y>  (tp, inspect)
    else if (cmd === 'tp' || cmd === 'inspect') {
      if (parts.length === 2) { const c = acCoords(parts[1], gameCols); if (c.length > 0 && c.length <= 12) { buildACItems(c, v => { conInput.value = prefix() + v + ' '; }); return; } }
      else if (parts.length === 3) { const c = acCoords(parts[2], gameRows); if (c.length > 0 && c.length <= 12) { buildACItems(c, v => { conInput.value = prefix() + v; }); return; } }
    }
    // swap: <x1> <y1> <x2> <y2>
    else if (cmd === 'swap') {
      if (parts.length === 2 || parts.length === 4) { const c = acCoords(parts[parts.length-1], gameCols); if (c.length > 0 && c.length <= 12) { buildACItems(c, v => { conInput.value = prefix() + v + ' '; }); return; } }
      else if (parts.length === 3 || parts.length === 5) { const c = acCoords(parts[parts.length-1], gameRows); if (c.length > 0 && c.length <= 12) { buildACItems(c, v => { conInput.value = prefix() + v + ' '; }); return; } }
    }
    // fill: <x1> <y1> <x2> <y2> <block>
    else if (cmd === 'fill') {
      if (parts.length === 2 || parts.length === 4) { const c = acCoords(parts[parts.length-1], gameCols); if (c.length > 0 && c.length <= 12) { buildACItems(c, v => { conInput.value = prefix() + v + ' '; }); return; } }
      else if (parts.length === 3 || parts.length === 5) { const c = acCoords(parts[parts.length-1], gameRows); if (c.length > 0 && c.length <= 12) { buildACItems(c, v => { conInput.value = prefix() + v + ' '; }); return; } }
      else if (parts.length === 6) { const m = acBlocks(parts[5]); if (m.length > 0 && m.length <= 12) { buildACItems(m, v => { conInput.value = prefix() + v; }); return; } }
    }
    // state: get/edit <key> [value]
    else if (cmd === 'state') {
      const subs = ['get', 'edit'];
      const allKeys = ['player_x','player_y','facing_x','facing_y','fire_used','max_fire','noclip','god','cheated','disco','drunk','highlight','win_timer','death_timer','game_state','level','cols','rows','particles','pending','overrides','plates','connections'];
      const editKeys = ['player_x','player_y','facing_x','facing_y','fire_used','max_fire','noclip','god','cheated','disco','drunk','highlight','win_timer','death_timer','game_state','level'];
      if (parts.length === 2) { const p = parts[1]; const m = subs.filter(s => s.startsWith(p) && s !== p).map(s => ({label:s,value:s})); if (m.length > 0) { buildACItems(m, v => { conInput.value = prefix() + v + ' '; }); return; } }
      else if (parts.length === 3) { const sub = parts[1]; const p = parts[2]; const keys = sub === 'edit' ? editKeys : allKeys; const m = keys.filter(k => k.startsWith(p) && k !== p).map(k => ({label:k,value:k})); if (m.length > 0 && m.length <= 12) { buildACItems(m, v => { conInput.value = prefix() + v + ' '; }); return; } }
      else if (parts.length === 4 && parts[1] === 'edit') { const p = parts[3]; const m = ['0','1'].filter(v => v.startsWith(p) && v !== p).map(v => ({label:v,value:v})); if (m.length > 0) { buildACItems(m, v => { conInput.value = prefix() + v; }); return; } }
    }
    // assign: <key> <command>
    else if (cmd === 'assign') {
      const acKeys = ['q','e','f','g','h','j','k','l','z','x','c','v','b','n','m','1','2','3','4','5','6','7','8','9','0','F1','F2','F3','F4','F5','F6','F7','F8','F9'];
      if (parts.length === 2) { const p = parts[1]; const m = acKeys.filter(k => k.toLowerCase().startsWith(p.toLowerCase()) && k.toLowerCase() !== p.toLowerCase()).map(k => ({label:k,value:k})); if (m.length > 0 && m.length <= 12) { buildACItems(m, v => { conInput.value = prefix() + v + ' '; }); return; } }
      else if (parts.length === 3) { const p = parts[2]; const m = CONSOLE_CMDS.filter(c => c.startsWith(p) && c !== p).map(c => ({label:c,value:c})); if (m.length > 0 && m.length <= 12) { buildACItems(m, v => { conInput.value = prefix() + v; }); return; } }
    }
    // unassign: <key>
    else if (cmd === 'unassign') {
      if (parts.length === 2) { const p = parts[1]; const opts = [...Object.keys(keyBindings), 'all']; const m = opts.filter(k => k.toLowerCase().startsWith(p.toLowerCase()) && k.toLowerCase() !== p.toLowerCase()).map(k => ({label:k,value:k})); if (m.length > 0 && m.length <= 12) { buildACItems(m, v => { conInput.value = prefix() + v; }); return; } }
    }
    // captcha: <type>
    else if (cmd === 'captcha') {
      if (parts.length === 2) { const p = parts[1]; const opts = ['grid','odd','rotate','slide','checkbox']; const m = opts.filter(o => o.startsWith(p) && o !== p).map(o => ({label:o,value:o})); if (m.length > 0) { buildACItems(m, v => { conInput.value = prefix() + v; }); return; } }
    }
    // where: <tile>
    else if (cmd === 'where') {
      if (parts.length === 2) { const m = acBlocks(parts[1]); if (m.length > 0 && m.length <= 12) { buildACItems(m, v => { conInput.value = prefix() + v; }); return; } }
    }
    // if: compound conditions with grid/console/level/and
    else if (cmd === 'if') {
      if (parts.length === 2) { const p = parts[1]; const opts = ['console','level','grid','list','clear','remove']; const m = opts.filter(o => o.startsWith(p) && o !== p).map(o => ({label:o,value:o})); if (m.length > 0) { buildACItems(m, v => { conInput.value = prefix() + v + ' '; }); return; } }
      if (parts.length === 3 && parts[1] === 'remove') { const p = parts[2]; const m = conIfRules.map((r, i) => ({label: i + ': ' + describeIfRule(r), value: '' + i})).filter(o => o.value.startsWith(p)); if (m.length > 0 && m.length <= 12) { buildACItems(m, v => { conInput.value = prefix() + v; }); return; } }
      // Walk completed tokens to determine what the user is currently typing
      const toks = parts.slice(1);
      const completing = toks[toks.length - 1]; // current incomplete token
      const done = toks.slice(0, -1); // fully typed tokens
      let expect = 'cond_type';
      for (let di = 0; di < done.length; di++) {
        const tok = done[di];
        if (expect === 'cond_type') { if (tok === 'console') expect = 'console_word'; else if (tok === 'level') expect = 'level_num'; else if (tok === 'grid') expect = 'grid_x'; else { expect = 'command'; break; } }
        else if (expect === 'console_word') { expect = 'and_or_cmd'; }
        else if (expect === 'level_num') { expect = 'and_or_cmd'; }
        else if (expect === 'grid_x') { expect = 'grid_y'; }
        else if (expect === 'grid_y') { expect = 'grid_state'; }
        else if (expect === 'grid_state') { expect = 'and_or_cmd'; }
        else if (expect === 'and_or_cmd') { if (tok === 'and') expect = 'cond_type'; else { expect = 'command'; break; } }
        else break;
      }
      const p = completing;
      if (expect === 'cond_type') {
        const opts = ['console','level','grid']; const m = opts.filter(o => o.startsWith(p) && o !== p).map(o => ({label:o,value:o})); if (m.length > 0) { buildACItems(m, v => { conInput.value = prefix() + v + ' '; }); return; }
      } else if (expect === 'grid_state') {
        const states = ['lit','unlit','open','closed','water','dry','wall','empty','player']; const m = states.filter(s => s.startsWith(p) && s !== p).map(s => ({label:s,value:s})); if (m.length > 0) { buildACItems(m, v => { conInput.value = prefix() + v + ' '; }); return; }
      } else if (expect === 'and_or_cmd') {
        const opts = ['and', ...CONSOLE_CMDS]; const m = opts.filter(o => o.startsWith(p) && o !== p).map(o => ({label:o,value:o})); if (m.length > 0) { buildACItems(m.slice(0, 12), v => { conInput.value = prefix() + v + ' '; }); return; }
      } else if (expect === 'command') {
        const m = CONSOLE_CMDS.filter(c => c.startsWith(p) && c !== p).map(c => ({label:c,value:c})); if (m.length > 0) { buildACItems(m.slice(0, 12), v => { conInput.value = prefix() + v; }); return; }
      }
    }
    hideAC();
    return;
  }

  const matches = CONSOLE_CMDS.filter(c => c.startsWith(val) && c !== val);
  showAC(matches);
}

function acApply() {
  const items = conAC.querySelectorAll('div');
  if (items.length === 0) return false;
  if (acIndex < 0) acIndex = 0;
  const item = items[acIndex];
  // If item has an onclick handler from buildACItems, just click it
  item.click();
  return true;
}

function execCommand(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;
  conHistory.unshift(trimmed);
  conPrint('> ' + trimmed);

  const lower = trimmed.toLowerCase();
  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();

  // help
  if (cmd === 'help') {
    conPrint('--- Commands ---', 'info');
    conPrint('setpos <x> <y> <block>  - Set tile at position', 'info');
    conPrint('tp <x> <y>              - Teleport player', 'info');
    conPrint('inspect <x> <y>         - Show tile info', 'info');
    conPrint('fill <x1> <y1> <x2> <y2> <block> - Fill area', 'info');
    conPrint('swap <x1> <y1> <x2> <y2> - Swap two tiles', 'info');
    conPrint('shoot                   - Fire a bullet', 'info');
    conPrint('ball_of_fire            - Fire a fireball', 'info');
    conPrint('/impossible             - Remove all torches', 'info');
    conPrint('noclip                  - Toggle wall clipping', 'info');
    conPrint('god                     - Toggle infinite fire', 'info');
    conPrint('explode                 - Destroy nearby breakables', 'info');
    conPrint('light                   - Light nearest torch', 'info');
    conPrint('dark                    - Unlight all torches', 'info');
    conPrint('mirror                  - Flip map horizontally', 'info');
    conPrint('rain                    - Fire rain from above', 'info');
    conPrint('disco                   - Toggle rainbow floor', 'info');
    conPrint('drunk                   - Toggle drunk movement', 'info');
    conPrint('paintball               - Toggle paint trail', 'info');
    conPrint('size <small/normal/big/huge> - Change tile size', 'info');
    conPrint('time                    - Show move/fire stats', 'info');
    conPrint('rename <text>           - Rename the level header', 'info');
    conPrint('skip                    - Skip to next level', 'info');
    conPrint('goto <n>                - Jump to level n', 'info');
    conPrint('count                   - Count remaining torches', 'info');
    conPrint('progress                - Show pack completion', 'info');
    conPrint('undo                    - Undo last move', 'info');
    conPrint('connections             - Show level wiring', 'info');
    conPrint('state [get/edit] [key]   - View/modify game state', 'info');
    conPrint('assign <key> <command>  - Bind key to command', 'info');
    conPrint('unassign <key|all>     - Remove key binding', 'info');
    conPrint('props <x> <y>           - Show tile properties/wiring', 'info');
    conPrint('trigger <x> <y>         - Fire connections from tile', 'info');
    conPrint('where <tile>            - Find all instances of a tile', 'info');
    conPrint('tiles                   - List all tile names/IDs', 'info');
    conPrint('highlight               - Toggle connection overlay', 'info');
    conPrint('give_up                 - Accept defeat', 'info');
    conPrint('reset                   - Restart current level', 'info');
    conPrint('clear                   - Clear console log', 'info');
    conPrint('dragamon                - Battle a wild Torch!', 'info');
    conPrint('captcha                 - Prove you are not a robot', 'info');
    conPrint('news [text]             - Read The Dragon Times', 'info');
    conPrint('if <cond> [and <cond>...] <cmd> - Conditional trigger', 'info');
    conPrint('  Conditions: console <word>, level <n>, grid <x> <y> <state>', 'info');
    conPrint('  Grid states: lit, unlit, open, closed, water, dry, wall, empty, player', 'info');
    conPrint('if list/clear/remove    - Manage if-rules', 'info');
    conPrint('force_exit              - Force return to level select', 'info');
    conPrint('mute                    - Toggle sound on/off', 'info');
    conPrint('volume <0-100>          - Set volume level', 'info');
    conPrint('Hint: there may be a secret command...', 'info');
    return;
  }

  // clear
  if (cmd === 'clear') {
    conLog.innerHTML = '';
    return;
  }

  if (cmd === 'echo') {
    conPrint(parts.slice(1).join(' '));
    return;
  }

  // skip - go to next level
  if (cmd === 'skip') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    if (currentLevel >= activeLevels.length - 1) { conPrint('Already on the last level', 'err'); return; }
    markCheat();
    currentLevel++;
    loadLevel(currentLevel);
    conPrint('Skipped to level ' + (currentLevel + 1), 'ok');
    return;
  }

  // goto - jump to specific level
  if (cmd === 'goto') {
    const n = parseInt(parts[1]);
    if (isNaN(n)) { conPrint('Usage: goto <level_number>', 'err'); return; }
    if (n < 1 || n > activeLevels.length) { conPrint('Level must be 1-' + activeLevels.length, 'err'); return; }
    markCheat();
    currentLevel = n - 1;
    loadLevel(currentLevel);
    conPrint('Jumped to level ' + n, 'ok');
    return;
  }

  // count - count remaining torches
  if (cmd === 'count') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    let torches = 0, toggles = 0, total = 0;
    for (let r = 0; r < gameRows; r++)
      for (let c = 0; c < gameCols; c++) {
        const o = map[r][c][2];
        if (o === TORCH_OFF) torches++;
        else if (o === TOGGLE_OFF) toggles++;
      }
    total = torches + toggles;
    if (total === 0) conPrint('All torches are lit!', 'ok');
    else {
      if (torches > 0) conPrint('Unlit torches: ' + torches, 'info');
      if (toggles > 0) conPrint('Unlit toggles: ' + toggles, 'info');
      conPrint('Total remaining: ' + total, 'info');
    }
    return;
  }

  // progress - show completion stats
  if (cmd === 'progress') {
    const prog = getProgress();
    const total = activeLevels.length;
    let completed = 0, cheatedCount = 0, drunkCount = 0;
    for (let i = 0; i < total; i++) {
      if (isLevelCompleted(i)) completed++;
      else if (isCheatedCompleted(i)) cheatedCount++;
      if (isDrunkCompleted(i)) drunkCount++;
    }
    conPrint('--- ' + (packName || 'Campaign') + ' ---', 'info');
    conPrint('Completed: ' + completed + ' / ' + total, completed === total ? 'ok' : 'info');
    if (cheatedCount > 0) conPrint('Cheated: ' + cheatedCount, 'info');
    if (drunkCount > 0) conPrint('Drunk: ' + drunkCount, 'info');
    conPrint('Current: level ' + (currentLevel + 1), 'info');
    return;
  }

  // undo - revert last move
  if (cmd === 'undo') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    if (!undoState) { conPrint('Nothing to undo', 'err'); return; }
    map = undoState.map;
    player.x = undoState.px; player.y = undoState.py;
    facing.x = undoState.fx; facing.y = undoState.fy;
    fireUsed = undoState.fireUsed;
    pressedPlates = undoState.plates;
    beltCargo = undoState.cargo;
    fireParticles = [];
    pendingEffects = [];
    visualOverrides = [];
    undoState = null;
    conPrint('Move undone', 'ok');
    return;
  }

  // connections - show level wiring
  if (cmd === 'connections') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    const lvl = activeLevels[currentLevel];
    const conns = lvl.connections || [];
    if (conns.length === 0) { conPrint('No connections in this level', 'info'); return; }
    conPrint('--- Connections (' + conns.length + ') ---', 'info');
    const nameOf = id => Object.keys(TILE_NAMES).find(k => TILE_NAMES[k] === id) || 'empty';
    conns.forEach((cn, i) => {
      const fromCell = map[cn.from[1]][cn.from[0]];
      const toCell = map[cn.to[1]][cn.to[0]];
      const fromName = nameOf(fromCell[0] || fromCell[1] || fromCell[2]);
      const toName = nameOf(toCell[0] || toCell[1] || toCell[2]);
      conPrint((i+1) + '. ' + fromName + ' (' + cn.from[0] + ',' + cn.from[1] + ') -> ' + toName + ' (' + cn.to[0] + ',' + cn.to[1] + ')', 'info');
    });
    return;
  }

  // state [get/edit]
  if (cmd === 'state') {
    if (gameState !== 'playing' && gameState !== 'dying' && gameState !== 'death') { conPrint('Must be in a level', 'err'); return; }
    const sub = (parts[1] || 'get').toLowerCase();
    const stateVars = {
      player_x: { get: () => player.x, set: v => { player.x = v; } },
      player_y: { get: () => player.y, set: v => { player.y = v; } },
      facing_x: { get: () => facing.x, set: v => { facing.x = v; } },
      facing_y: { get: () => facing.y, set: v => { facing.y = v; } },
      fire_used: { get: () => fireUsed, set: v => { fireUsed = v; } },
      max_fire: { get: () => maxFire, set: v => { maxFire = v; } },
      noclip: { get: () => noclipOn, set: v => { noclipOn = !!v; } },
      god: { get: () => godMode, set: v => { godMode = !!v; } },
      cheated: { get: () => cheated, set: v => { cheated = !!v; } },
      disco: { get: () => discoMode, set: v => { discoMode = !!v; } },
      drunk: { get: () => drunkMode, set: v => { drunkMode = !!v; } },
      highlight: { get: () => highlightConns, set: v => { highlightConns = !!v; } },
      win_timer: { get: () => winTimer, set: v => { winTimer = v; } },
      death_timer: { get: () => deathTimer, set: v => { deathTimer = v; } },
      game_state: { get: () => gameState, set: v => { setState(v); } },
      level: { get: () => currentLevel, set: v => { currentLevel = v; loadLevel(v); } },
      cols: { get: () => gameCols },
      rows: { get: () => gameRows },
      particles: { get: () => fireParticles.length },
      pending: { get: () => pendingEffects.length },
      overrides: { get: () => visualOverrides.length },
      plates: { get: () => pressedPlates.size },
      connections: { get: () => levelConnections.length },
    };
    if (sub === 'edit') {
      const key = (parts[2] || '').toLowerCase();
      const val = parts[3];
      if (!key || val === undefined) { conPrint('Usage: state edit <key> <value>', 'err'); conPrint('Keys: ' + Object.keys(stateVars).filter(k => stateVars[k].set).join(', '), 'info'); return; }
      if (!stateVars[key]) { conPrint('Unknown key: ' + key + '. Available: ' + Object.keys(stateVars).filter(k => stateVars[k].set).join(', '), 'err'); return; }
      if (!stateVars[key].set) { conPrint(key + ' is read-only', 'err'); return; }
      let parsed = val;
      if (val === 'true') parsed = true;
      else if (val === 'false') parsed = false;
      else if (!isNaN(Number(val))) parsed = Number(val);
      markCheat();
      stateVars[key].set(parsed);
      conPrint(key + ' = ' + stateVars[key].get(), 'ok');
      return;
    }
    if (sub === 'get') {
      const key = (parts[2] || '').toLowerCase();
      if (key) {
        if (!stateVars[key]) { conPrint('Unknown key: ' + key, 'err'); return; }
        conPrint(key + ' = ' + stateVars[key].get(), 'info');
        return;
      }
    }
    // Default: dump all
    conPrint('--- State ---', 'info');
    Object.keys(stateVars).forEach(k => {
      conPrint('  ' + k + ' = ' + stateVars[k].get(), 'info');
    });
    return;
  }

  // assign - bind a key to a command
  if (cmd === 'assign') {
    const rawKey = parts[1];
    const command = parts.slice(2).join(' ');
    if (!rawKey) { conPrint('Usage: assign <key> <command>', 'err'); conPrint('  assign F1 count', 'info'); conPrint('  assign KeyQ state get fire_used', 'info'); conPrint('Active bindings:', 'info'); const bk = Object.keys(keyBindings); if (bk.length === 0) conPrint('  none', 'info'); else bk.forEach(k => conPrint('  ' + k + ' -> ' + keyBindings[k], 'info')); return; }
    const key = normalizeKeyCode(rawKey);
    if (!command) {
      if (keyBindings[key]) { delete keyBindings[key]; conPrint('Unbound ' + key, 'ok'); }
      else conPrint('No binding for ' + key, 'err');
      return;
    }
    keyBindings[key] = command;
    conPrint('Bound ' + key + ' -> ' + command, 'ok');
    return;
  }
  if (cmd === 'unassign') {
    const rawKey = parts[1];
    if (!rawKey) {
      const bk = Object.keys(keyBindings);
      if (bk.length === 0) { conPrint('No active bindings', 'info'); }
      else { conPrint('Active bindings:', 'info'); bk.forEach(k => conPrint('  ' + k + ' -> ' + keyBindings[k], 'info')); conPrint('Use: unassign <key> or unassign all', 'info'); }
      return;
    }
    if (rawKey === 'all') { const c = Object.keys(keyBindings).length; keyBindings = {}; conPrint('Cleared ' + c + ' binding(s)', 'ok'); return; }
    const key = normalizeKeyCode(rawKey);
    if (keyBindings[key]) { delete keyBindings[key]; conPrint('Unbound ' + key, 'ok'); }
    else conPrint('No binding for ' + key, 'err');
    return;
  }

  // props - show tile properties and connections
  if (cmd === 'props') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    const x = parseInt(parts[1]), y = parseInt(parts[2]);
    if (isNaN(x) || isNaN(y)) { conPrint('Usage: props <x> <y>', 'err'); return; }
    if (x < 0 || x >= gameCols || y < 0 || y >= gameRows) { conPrint('Out of bounds', 'err'); return; }
    const cell = map[y][x];
    const nameOf = id => Object.keys(TILE_NAMES).find(k => TILE_NAMES[k] === id) || 'empty';
    conPrint('--- Tile (' + x + ',' + y + ') ---', 'info');
    conPrint('Layers: [' + cell.join(', ') + '] = [' + nameOf(cell[0]) + ', ' + nameOf(cell[1]) + ', ' + nameOf(cell[2]) + ', ' + nameOf(cell[3]) + ', ' + nameOf(cell[4]) + ']', 'info');
    const props = levelCellProps[x + ',' + y];
    if (props) {
      conPrint('Props: ' + JSON.stringify(props), 'info');
    } else {
      conPrint('Props: none', 'info');
    }
    const from = levelConnections.filter(c => c.from[0] === x && c.from[1] === y);
    const to = levelConnections.filter(c => c.to[0] === x && c.to[1] === y);
    if (from.length > 0) {
      from.forEach(c => conPrint('  OUT -> (' + c.to[0] + ',' + c.to[1] + ') ' + nameOf(map[c.to[1]][c.to[0]][0] || map[c.to[1]][c.to[0]][1] || map[c.to[1]][c.to[0]][2]), 'ok'));
    }
    if (to.length > 0) {
      to.forEach(c => conPrint('  IN <- (' + c.from[0] + ',' + c.from[1] + ') ' + nameOf(map[c.from[1]][c.from[0]][0] || map[c.from[1]][c.from[0]][1] || map[c.from[1]][c.from[0]][2]), 'ok'));
    }
    if (from.length === 0 && to.length === 0) conPrint('No connections', 'info');
    if (pressedPlates.has(x + ',' + y)) conPrint('Plate is PRESSED', 'ok');
    if (beltCargo[x + ',' + y]) conPrint('Has belt cargo: ICE', 'ok');
    return;
  }

  // trigger - manually fire connections from a tile
  if (cmd === 'trigger') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    const x = parseInt(parts[1]), y = parseInt(parts[2]);
    const mode = (parts[3] || 'on').toLowerCase();
    if (isNaN(x) || isNaN(y)) { conPrint('Usage: trigger <x> <y> [on/off]', 'err'); return; }
    if (x < 0 || x >= gameCols || y < 0 || y >= gameRows) { conPrint('Out of bounds', 'err'); return; }
    const conns = getConnectionsFrom(x, y);
    if (conns.length === 0) { conPrint('No outgoing connections from (' + x + ',' + y + ')', 'err'); return; }
    markCheat();
    const type = mode === 'off' ? 'toggle_off' : 'toggle_on';
    applyConnectionImmediate(x, y, type, 0);
    conPrint('Triggered ' + conns.length + ' connection(s) from (' + x + ',' + y + ') with ' + type, 'ok');
    return;
  }

  // where - find all instances of a tile
  if (cmd === 'where') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    const arg = (parts[1] || '').toLowerCase();
    if (!arg) { conPrint('Usage: where <tile_name_or_id>', 'err'); return; }
    let id = parseInt(arg);
    if (isNaN(id)) {
      if (TILE_NAMES[arg] !== undefined) id = TILE_NAMES[arg];
      else { conPrint('Unknown tile: ' + arg, 'err'); return; }
    }
    const nameOf = tid => Object.keys(TILE_NAMES).find(k => TILE_NAMES[k] === tid) || 'id:' + tid;
    const found = [];
    for (let r = 0; r < gameRows; r++)
      for (let c = 0; c < gameCols; c++)
        if (map[r][c][0] === id || map[r][c][1] === id || map[r][c][2] === id || map[r][c][3] === id || map[r][c][4] === id)
          found.push('(' + c + ',' + r + ')');
    if (found.length === 0) conPrint('No ' + nameOf(id) + ' tiles found', 'info');
    else conPrint(nameOf(id) + ' (' + found.length + '): ' + found.join(' '), 'ok');
    return;
  }

  // tiles - list all tile names and IDs
  if (cmd === 'tiles') {
    conPrint('--- Tile Reference ---', 'info');
    conPrint('Ground(0): empty(0) water(10) ice(4) water_dry(17) belt_up(18) belt_right(19) belt_down(20) belt_left(21) plate(22) spike(33)', 'info');
    conPrint('Struct(1): wall(1) push_block(9) mirror_ne(5) mirror_nw(6) grate(8) gate_open(13) gate_closed(14) cracked(23)', 'info');
    conPrint('Object(2): torch_off(2) torch_on(3) toggle_off(11) toggle_on(12) lever_off(15) lever_on(16) eye_off(24) eye_on(25)', 'info');
    conPrint('Deco(3): skull(26) bones(27) cobweb(28) mushroom(29) gear(30) pipe(31) crate(32)', 'info');
    return;
  }

  // highlight - toggle connection overlay
  if (cmd === 'highlight') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    highlightConns = !highlightConns;
    conPrint('Connection highlight ' + (highlightConns ? 'ON' : 'OFF'), highlightConns ? 'ok' : 'info');
    return;
  }

  // give_up
  if (cmd === 'give_up') {
    if (gameState === 'playing') {
      conPrint('The dragon gives up...', 'err');
      toggleConsole();
      killPlayer();
    } else {
      conPrint('The dragon gives up... on life.', 'err');
      toggleConsole();
      setGameState('death');
    }
    return;
  }

  // reset
  if (cmd === 'reset') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    loadLevel(currentLevel);
    conPrint('Level restarted', 'ok');
    return;
  }

  // time
  if (cmd === 'time') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    conPrint('Fire used: ' + fireUsed + (maxFire > 0 ? ' / ' + maxFire : ' (unlimited)'), 'info');
    conPrint('Player pos: (' + player.x + ', ' + player.y + ')', 'info');
    conPrint('Facing: (' + facing.x + ', ' + facing.y + ')', 'info');
    conPrint('Level: ' + (currentLevel + 1) + ' / ' + activeLevels.length, 'info');
    conPrint('Grid: ' + gameCols + 'x' + gameRows, 'info');
    return;
  }

  // rename
  if (cmd === 'rename') {
    const newName = parts.slice(1).join(' ');
    if (!newName) { conPrint('Usage: rename <text>', 'err'); return; }
    document.getElementById('level').textContent = newName;
    conPrint('Renamed to: ' + newName, 'ok');
    return;
  }

  // inspect x y
  if (cmd === 'inspect') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    const x = parseInt(parts[1]), y = parseInt(parts[2]);
    if (isNaN(x) || isNaN(y)) { conPrint('Usage: inspect <x> <y>', 'err'); return; }
    if (x < 0 || x >= gameCols || y < 0 || y >= gameRows) { conPrint('Out of bounds', 'err'); return; }
    const cell = map[y][x];
    const nameOf = id => Object.keys(TILE_NAMES).find(k => TILE_NAMES[k] === id) || 'empty';
    conPrint('(' + x + ',' + y + ') ground=' + nameOf(cell[0]) + '(' + cell[0] + ') struct=' + nameOf(cell[1]) + '(' + cell[1] + ') obj=' + nameOf(cell[2]) + '(' + cell[2] + ')' + (cell[3] ? ' deco=' + nameOf(cell[3]) + '(' + cell[3] + ')' : '') + (cell[4] ? ' deco2=' + nameOf(cell[4]) + '(' + cell[4] + ')' : ''), 'info');
    return;
  }

  // setpos x y blockid/name
  if (cmd === 'setpos') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    const x = parseInt(parts[1]);
    const y = parseInt(parts[2]);
    const blockArg = (parts[3] || '').toLowerCase();
    if (isNaN(x) || isNaN(y) || !blockArg) { conPrint('Usage: setpos <x> <y> <block>', 'err'); return; }
    if (x < 0 || x >= gameCols || y < 0 || y >= gameRows) { conPrint('Out of bounds (0-' + (gameCols-1) + ', 0-' + (gameRows-1) + ')', 'err'); return; }
    let id = parseInt(blockArg);
    if (isNaN(id)) {
      if (TILE_NAMES[blockArg] !== undefined) id = TILE_NAMES[blockArg];
      else { conPrint('Unknown block: ' + blockArg, 'err'); return; }
    }
    if (id < 0 || id > 33) { conPrint('Block ID must be 0-33', 'err'); return; }
    const layer = TILE_LAYERS_MAP[id];
    if (layer === -1) map[y][x] = [0, 0, 0, 0, 0];
    else map[y][x][layer] = id;
    markCheat();
    conPrint('Set (' + x + ',' + y + ') layer ' + layer + ' = ' + id, 'ok');
    return;
  }

  // fill x1 y1 x2 y2 block
  if (cmd === 'fill') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    const x1 = parseInt(parts[1]), y1 = parseInt(parts[2]);
    const x2 = parseInt(parts[3]), y2 = parseInt(parts[4]);
    const blockArg = (parts[5] || '').toLowerCase();
    if (isNaN(x1) || isNaN(y1) || isNaN(x2) || isNaN(y2) || !blockArg) {
      conPrint('Usage: fill <x1> <y1> <x2> <y2> <block>', 'err'); return;
    }
    let id = parseInt(blockArg);
    if (isNaN(id)) {
      if (TILE_NAMES[blockArg] !== undefined) id = TILE_NAMES[blockArg];
      else { conPrint('Unknown block: ' + blockArg, 'err'); return; }
    }
    if (id < 0 || id > 33) { conPrint('Block ID must be 0-33', 'err'); return; }
    const minX = Math.max(0, Math.min(x1, x2)), maxX = Math.min(gameCols-1, Math.max(x1, x2));
    const minY = Math.max(0, Math.min(y1, y2)), maxY = Math.min(gameRows-1, Math.max(y1, y2));
    const layer = TILE_LAYERS_MAP[id];
    let count = 0;
    for (let r = minY; r <= maxY; r++)
      for (let c = minX; c <= maxX; c++) {
        if (layer === -1) map[r][c] = [0, 0, 0, 0, 0];
        else map[r][c][layer] = id;
        count++;
      }
    markCheat();
    conPrint('Filled ' + count + ' tiles with ' + blockArg, 'ok');
    return;
  }

  // tp x y
  if (cmd === 'tp') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    const x = parseInt(parts[1]), y = parseInt(parts[2]);
    if (isNaN(x) || isNaN(y)) { conPrint('Usage: tp <x> <y>', 'err'); return; }
    if (x < 0 || x >= gameCols || y < 0 || y >= gameRows) { conPrint('Out of bounds', 'err'); return; }
    player.x = x; player.y = y;
    markCheat();
    updatePlates();
    conPrint('Teleported to (' + x + ',' + y + ')', 'ok');
    return;
  }

  // noclip
  if (cmd === 'noclip') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    noclipOn = !noclipOn;
    if (noclipOn) markCheat();
    conPrint('Noclip ' + (noclipOn ? 'ON - walk through walls' : 'OFF'), noclipOn ? 'ok' : 'info');
    return;
  }

  // god
  if (cmd === 'god') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    godMode = !godMode;
    if (godMode) markCheat();
    conPrint('God mode ' + (godMode ? 'ON - infinite fire' : 'OFF'), godMode ? 'ok' : 'info');
    return;
  }

  // /impossible
  if (cmd === '/impossible') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    let count = 0;
    for (let r = 0; r < gameRows; r++)
      for (let c = 0; c < gameCols; c++) {
        if (map[r][c][2] === TORCH_OFF || map[r][c][2] === TORCH_ON) {
          map[r][c][2] = 0; count++;
        }
      }
    markCheat();
    conPrint('Removed ' + count + ' torch(es). Level is now impossible!', 'info');
    return;
  }

  // shoot
  if (cmd === 'shoot') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    markCheat();
    const steps = getFireSteps(player.x, player.y, facing.x, facing.y);
    const DPT = 3;
    steps.forEach((s, i) => {
      const delay = i * DPT;
      applyFireEffects(s, delay);
      for (let p = 0; p < 2; p++) {
        fireParticles.push({
          x: s.x * TILE + TILE/2 + (Math.random()-0.5)*4,
          y: s.y * TILE + TILE/2 + (Math.random()-0.5)*4,
          vx: s.fdx * 1.5 + (Math.random()-0.5)*0.5,
          vy: s.fdy * 1.5 + (Math.random()-0.5)*0.5,
          life: 12 + i*2, maxLife: 12 + i*2, delay,
          bullet: true, bdx: s.fdx, bdy: s.fdy
        });
      }
    });
    conPrint('Bang!', 'ok');
    return;
  }

  // ball_of_fire
  if (cmd === 'ball_of_fire') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    markCheat();
    const steps = getFireSteps(player.x, player.y, facing.x, facing.y);
    const DPT = 3;
    steps.forEach((s, i) => {
      const delay = i * DPT;
      applyFireEffects(s, delay);
      for (let p = 0; p < 4; p++) {
        fireParticles.push({
          x: s.x * TILE + TILE/2 + (Math.random()-0.5)*10,
          y: s.y * TILE + TILE/2 + (Math.random()-0.5)*10,
          vx: (Math.random()-0.5)*2,
          vy: (Math.random()-0.5)*2 - 1,
          life: 30 + i*3, maxLife: 30 + i*3, delay
        });
      }
    });
    conPrint('Fireball!', 'ok');
    return;
  }

  // secret win
  if (lower === 'supercalifragilisticexpialawin') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    markCheat();
    for (let r = 0; r < gameRows; r++)
      for (let c = 0; c < gameCols; c++) {
        if (map[r][c][2] === TORCH_OFF) map[r][c][2] = TORCH_ON;
        if (map[r][c][2] === TOGGLE_OFF) map[r][c][2] = TOGGLE_ON;
      }
    conPrint('A spoonful of sugar helps the torches light up!', 'ok');
    toggleConsole();
    return;
  }

  // dragamon
  if (cmd === 'dragamon') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    toggleConsole();
    startDragamon();
    return;
  }
  // captcha
  if (cmd === 'captcha') {
    const sub = (parts[1] || '').toLowerCase();
    const ft = sub ? CAPTCHA_TYPES[sub] : undefined;
    if (sub && ft === undefined) { conPrint('Unknown type: ' + sub + '. Options: grid, odd, rotate, slide, checkbox', 'err'); return; }
    toggleConsole();
    startCaptcha(ft);
    return;
  }

  // if - conditional triggers
  if (cmd === 'if') {
    if (parts.length === 2 && parts[1] === 'list') {
      if (conIfRules.length === 0) { conPrint('No if-rules set.'); return; }
      conIfRunning = true;
      conIfRules.forEach((r, i) => conPrint('  ' + i + ': if ' + describeIfRule(r) + ' -> ' + r.cmd));
      conIfRunning = false;
      return;
    }
    if (parts.length === 2 && parts[1] === 'clear') {
      conIfRules.length = 0;
      conPrint('All if-rules cleared.', 'ok');
      return;
    }
    if (parts[1] === 'remove') {
      const idx = parseInt(parts[2]);
      if (isNaN(idx) || idx < 0 || idx >= conIfRules.length) { conPrint('Invalid index. Use "if list" to see rules.', 'err'); return; }
      const removed = conIfRules.splice(idx, 1)[0];
      conIfRunning = true;
      conPrint('Removed: if ' + describeIfRule(removed) + ' -> ' + removed.cmd, 'ok');
      conIfRunning = false;
      return;
    }
    // Parse compound conditions: if <cond> [and <cond> ...] <command>
    const tokens = parts.slice(1);
    const conds = [];
    let ti = 0;
    while (ti < tokens.length) {
      if (ti > 0) { if (tokens[ti] === 'and') ti++; else break; }
      if (tokens[ti] === 'console' && ti + 1 < tokens.length) {
        conds.push({ type: 'console', text: tokens[ti + 1] }); ti += 2;
      } else if (tokens[ti] === 'level' && ti + 1 < tokens.length) {
        const n = parseInt(tokens[ti + 1]);
        if (isNaN(n) || n < 1) { conPrint('Level must be a number >= 1', 'err'); return; }
        conds.push({ type: 'level', level: n }); ti += 2;
      } else if (tokens[ti] === 'grid' && ti + 3 < tokens.length) {
        const gx = parseInt(tokens[ti + 1]), gy = parseInt(tokens[ti + 2]), gs = tokens[ti + 3];
        if (isNaN(gx) || isNaN(gy)) { conPrint('Grid coords must be numbers', 'err'); return; }
        const validStates = ['lit','unlit','open','closed','water','dry','wall','empty','player'];
        if (!validStates.includes(gs)) { conPrint('Grid state must be: ' + validStates.join(', '), 'err'); return; }
        conds.push({ type: 'grid', x: gx, y: gy, state: gs }); ti += 4;
      } else break;
    }
    const runCmd = tokens.slice(ti).join(' ');
    if (conds.length === 0 || !runCmd) {
      conPrint('Usage: if <cond> [and <cond> ...] <command>', 'err');
      conPrint('  Conditions: console <word>, level <n>, grid <x> <y> <state>', 'err');
      conPrint('  Grid states: lit, unlit, open, closed, water, dry, wall, empty, player', 'err');
      conPrint('  if list / if clear / if remove <n>', 'err');
      return;
    }
    const rule = { conditions: conds, cmd: runCmd, wasMet: false };
    conIfRules.push(rule);
    conIfRunning = true;
    conPrint('Rule added: if ' + describeIfRule(rule) + ' -> ' + runCmd, 'ok');
    conIfRunning = false;
    return;
  }

  // news
  if (cmd === 'news') {
    const text = parts.slice(1).join(' ');
    toggleConsole();
    showNewspaper(text || null);
    return;
  }

  // explode - destroy breakable stuff in radius around player
  if (cmd === 'explode') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    markCheat();
    let count = 0;
    const rad = 3;
    for (let r = Math.max(0, player.y - rad); r <= Math.min(gameRows-1, player.y + rad); r++) {
      for (let c = Math.max(0, player.x - rad); c <= Math.min(gameCols-1, player.x + rad); c++) {
        const cell = map[r][c];
        if (cell[0] === ICE) { cell[0] = 0; count++; }
        if (cell[1] === CRACKED) { cell[1] = 0; count++; }
        if (cell[1] === PUSH_BLOCK) { cell[1] = 0; count++; }
        // Explosion particles
        for (let p = 0; p < 2; p++) {
          fireParticles.push({
            x: c * TILE + TILE/2 + (Math.random()-0.5)*20,
            y: r * TILE + TILE/2 + (Math.random()-0.5)*20,
            vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 - 2,
            life: 20 + Math.random()*15, maxLife: 35, delay: 0
          });
        }
      }
    }
    conPrint('BOOM! Destroyed ' + count + ' tiles in radius ' + rad, 'ok');
    return;
  }

  // light - light the nearest unlit torch
  if (cmd === 'light') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    let best = null, bestDist = Infinity;
    for (let r = 0; r < gameRows; r++)
      for (let c = 0; c < gameCols; c++) {
        if (map[r][c][2] === TORCH_OFF || map[r][c][2] === TOGGLE_OFF) {
          const d = Math.abs(c - player.x) + Math.abs(r - player.y);
          if (d < bestDist) { bestDist = d; best = { x: c, y: r }; }
        }
      }
    if (!best) { conPrint('No unlit torches found', 'info'); return; }
    markCheat();
    const cell = map[best.y][best.x];
    if (cell[2] === TORCH_OFF) cell[2] = TORCH_ON;
    else if (cell[2] === TOGGLE_OFF) cell[2] = TOGGLE_ON;
    conPrint('Lit torch at (' + best.x + ',' + best.y + ')', 'ok');
    return;
  }

  // dark - unlight all torches
  if (cmd === 'dark') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    markCheat();
    let count = 0;
    for (let r = 0; r < gameRows; r++)
      for (let c = 0; c < gameCols; c++) {
        if (map[r][c][2] === TORCH_ON) { map[r][c][2] = TORCH_OFF; count++; }
        if (map[r][c][2] === TOGGLE_ON) { map[r][c][2] = TOGGLE_OFF; count++; }
      }
    conPrint('Darkness falls... ' + count + ' torches extinguished', 'ok');
    return;
  }

  // swap x1 y1 x2 y2
  if (cmd === 'swap') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    const x1 = parseInt(parts[1]), y1 = parseInt(parts[2]);
    const x2 = parseInt(parts[3]), y2 = parseInt(parts[4]);
    if (isNaN(x1) || isNaN(y1) || isNaN(x2) || isNaN(y2)) { conPrint('Usage: swap <x1> <y1> <x2> <y2>', 'err'); return; }
    if (x1 < 0 || x1 >= gameCols || y1 < 0 || y1 >= gameRows || x2 < 0 || x2 >= gameCols || y2 < 0 || y2 >= gameRows) {
      conPrint('Out of bounds', 'err'); return;
    }
    markCheat();
    const tmp = [...map[y1][x1]];
    map[y1][x1] = [...map[y2][x2]];
    map[y2][x2] = tmp;
    conPrint('Swapped (' + x1 + ',' + y1 + ') <-> (' + x2 + ',' + y2 + ')', 'ok');
    return;
  }

  // disco - toggle rainbow floor
  if (cmd === 'disco') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    discoMode = !discoMode;
    conPrint('Disco mode ' + (discoMode ? 'ON' : 'OFF'), discoMode ? 'ok' : 'info');
    return;
  }

  // drunk - randomize movement
  if (cmd === 'drunk') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    drunkMode = !drunkMode;
    conPrint('Drunk mode ' + (drunkMode ? 'ON - controls randomized each move!' : 'OFF'), drunkMode ? 'ok' : 'info');
    return;
  }

  // mirror - flip map horizontally
  if (cmd === 'mirror') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    markCheat();
    for (let r = 0; r < gameRows; r++) map[r].reverse();
    player.x = gameCols - 1 - player.x;
    facing.x *= -1;
    conPrint('Map mirrored!', 'ok');
    return;
  }

  // paintball - toggle paint trail
  if (cmd === 'paintball') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    paintMode = !paintMode;
    if (!paintMode) paintTrail = [];
    conPrint('Paintball ' + (paintMode ? 'ON - leaving a colorful trail!' : 'OFF - trail cleared'), paintMode ? 'ok' : 'info');
    return;
  }

  // rain - fire rains from the sky
  if (cmd === 'rain') {
    if (gameState !== 'playing') { conPrint('Must be in a level', 'err'); return; }
    markCheat();
    for (let i = 0; i < 60; i++) {
      const rx = Math.random() * canvas.width;
      fireParticles.push({
        x: rx, y: -Math.random() * 40,
        vx: (Math.random()-0.5)*1.5, vy: Math.random()*3 + 2,
        life: 50 + Math.random()*30, maxLife: 80,
        delay: Math.floor(Math.random() * 20)
      });
    }
    // Rain also lights random torches
    const torches = [];
    for (let r = 0; r < gameRows; r++)
      for (let c = 0; c < gameCols; c++)
        if (map[r][c][2] === TORCH_OFF) torches.push({ x: c, y: r });
    if (torches.length > 0) {
      const t = torches[Math.floor(Math.random() * torches.length)];
      map[t.y][t.x][2] = TORCH_ON;
      conPrint('Fire rain! A torch at (' + t.x + ',' + t.y + ') was lit!', 'ok');
    } else {
      conPrint('Fire rain!', 'ok');
    }
    return;
  }

  // size - change tile zoom
  if (cmd === 'size') {
    const arg = (parts[1] || '').toLowerCase();
    const sizes = { small: 32, normal: 48, big: 64, huge: 80 };
    if (!sizes[arg]) { conPrint('Usage: size <small/normal/big/huge>', 'err'); return; }
    // We can't change TILE (const), but we can suggest a restart... actually let's just hack it
    conPrint('Tile size set to ' + arg + ' (' + sizes[arg] + 'px). Reload to apply.', 'info');
    // Store in sessionStorage for next reload
    sessionStorage.setItem('dragonTileSize', sizes[arg]);
    return;
  }

  // pretend_you_didint_see_that - clear all borders
  if (cmd === 'pretend_you_didint_see_that') {
    cheated = false;
    drunkMode = false;
    drunkAllMoves = false;
    // Clear saved completion for current level
    const prog = getProgress();
    if (packName) {
      if (prog.custom && prog.custom[packName]) delete prog.custom[packName][currentLevel];
      if (prog.customCheated && prog.customCheated[packName]) delete prog.customCheated[packName][currentLevel];
      if (prog.customDrunk && prog.customDrunk[packName]) delete prog.customDrunk[packName][currentLevel];
    } else {
      if (prog.campaign) delete prog.campaign[currentLevel];
      if (prog.campaignCheated) delete prog.campaignCheated[currentLevel];
      if (prog.campaignDrunk) delete prog.campaignDrunk[currentLevel];
    }
    localStorage.setItem('dragonPuzzleProgress', JSON.stringify(prog));
    conPrint('...what border? I don\'t know what you\'re talking about.', 'ok');
    return;
  }

  if (cmd === 'force_exit') {
    if (captchaActive) {
      captchaActive = false;
      document.getElementById('captcha-overlay').classList.remove('active');
    }
    if (consoleOpen) toggleConsole();
    if (newsActive) {
      newsActive = false;
      document.getElementById('news-overlay').classList.remove('active');
    }
    if (dialogueActive) {
      dialogueActive = false;
      document.getElementById('dialogue-overlay').classList.remove('active');
    }
    showLevelSelect();
    conPrint('Force exited to level select.', 'ok');
    return;
  }

  if (cmd === 'mute') {
    SFX.setEnabled(!SFX.enabled);
    conPrint('Sound ' + (SFX.enabled ? 'ON' : 'OFF'), 'ok');
    return;
  }

  if (cmd === 'volume') {
    if (args.length === 0) {
      conPrint('Volume: ' + Math.round(SFX.volume * 100) + '%', 'info');
      return;
    }
    const v = parseInt(args[0]);
    if (isNaN(v) || v < 0 || v > 100) { conPrint('Usage: volume <0-100>', 'err'); return; }
    SFX.setVolume(v / 100);
    conPrint('Volume set to ' + v + '%', 'ok');
    return;
  }

  conPrint('Unknown command: ' + cmd, 'err');
}

// Helper: get fire path steps (extracted from spawnFire logic)
// Helper: trace fire path with immediate effects (same logic as spawnFire path tracing)
function getFireSteps(sx, sy, dx, dy) {
  const steps = [];
  let cx = sx + dx, cy = sy + dy;
  let fdx = dx, fdy = dy;
  const FIRE_DELAY_PER_TILE = 3;
  for (let i = 0; i < 1000; i++) {
    if (cx < 0 || cx >= gameCols || cy < 0 || cy >= gameRows) break;
    const cell = map[cy][cx];
    const g = cell[0], s = cell[1], o = cell[2];
    const delay = steps.length * FIRE_DELAY_PER_TILE;
    if (s === WALL || s === PUSH_BLOCK || s === GATE_CLOSED || s === DOOR_CLOSED) break;
    if (s === CRACKED) {
      steps.push({x:cx,y:cy,efx:['crack'],fdx,fdy});
      visualOverrides.push({x:cx,y:cy,layer:1,value:CRACKED,delay});
      cell[1] = 0; SFX.play('crack');
      break;
    }
    if (s === MIRROR_NE) { steps.push({x:cx,y:cy,efx:[],fdx,fdy}); SFX.play('mirror'); const nd=-fdy; fdy=-fdx; fdx=nd; cx+=fdx; cy+=fdy; continue; }
    if (s === MIRROR_NW) { steps.push({x:cx,y:cy,efx:[],fdx,fdy}); SFX.play('mirror'); const nd=fdy; fdy=fdx; fdx=nd; cx+=fdx; cy+=fdy; continue; }
    const efx = [];
    let stop = false;
    const ck = cx+','+cy;
    if (g === ICE) { efx.push('ice'); stop = true; visualOverrides.push({x:cx,y:cy,layer:0,value:ICE,delay}); cell[0] = 0; SFX.play('ice'); }
    else if (beltCargo[ck] === ICE) { efx.push('ice'); stop = true; delete beltCargo[ck]; SFX.play('ice'); }
    else if (g === WATER) { efx.push('steam'); stop = true; SFX.play('steam'); }
    if (o === TORCH_OFF) { efx.push('torch'); visualOverrides.push({x:cx,y:cy,layer:2,value:TORCH_OFF,delay}); cell[2] = TORCH_ON; SFX.play('torch'); }
    else if (o === TOGGLE_OFF) { efx.push('toggle_on'); visualOverrides.push({x:cx,y:cy,layer:2,value:TOGGLE_OFF,delay}); cell[2] = TOGGLE_ON; applyConnectionImmediate(cx,cy,'toggle_on',delay); SFX.play('toggle'); }
    else if (o === TOGGLE_ON) { efx.push('toggle_off'); visualOverrides.push({x:cx,y:cy,layer:2,value:TOGGLE_ON,delay}); cell[2] = TOGGLE_OFF; applyConnectionImmediate(cx,cy,'toggle_off',delay); SFX.play('toggle'); }
    else if (o === LEVER_OFF) { efx.push('lever_on'); visualOverrides.push({x:cx,y:cy,layer:2,value:LEVER_OFF,delay}); cell[2] = LEVER_ON; applyConnectionImmediate(cx,cy,'toggle_on',delay); SFX.play('toggle'); }
    else if (o === LEVER_ON) { efx.push('lever_off'); visualOverrides.push({x:cx,y:cy,layer:2,value:LEVER_ON,delay}); cell[2] = LEVER_OFF; applyConnectionImmediate(cx,cy,'toggle_off',delay); SFX.play('toggle'); }
    steps.push({x:cx,y:cy,efx,fdx,fdy});
    if (stop) break;
    cx += fdx; cy += fdy;
  }
  return steps;
}

// Helper: spawn visual particles for fire steps (steam only — map effects already applied)
function applyFireEffects(s, delay) {
  if (s.efx.includes('steam')) {
    for (let sp=0;sp<10;sp++) fireParticles.push({
      x:s.x*TILE+TILE/2+(Math.random()-.5)*16, y:s.y*TILE+TILE/2+(Math.random()-.5)*10,
      vx:(Math.random()-.5)*2, vy:-Math.random()*2.5-1,
      life:35, maxLife:35, delay, steam:true
    });
  }
}

// Console input handlers
conInput.addEventListener('keydown', e => {
  if (e.code === 'Backquote') { e.preventDefault(); toggleConsole(); return; }
  if (e.code === 'Escape') { e.preventDefault(); toggleConsole(); return; }
  if (e.code === 'Enter') {
    e.preventDefault();
    hideAC();
    execCommand(conInput.value);
    conInput.value = '';
    conHistIdx = -1;
    return;
  }
  if (e.code === 'Tab') {
    e.preventDefault();
    if (conAC.style.display === 'block') acApply();
    return;
  }
  if (e.code === 'ArrowUp') {
    e.preventDefault();
    if (conAC.style.display === 'block') {
      const items = conAC.querySelectorAll('div');
      acIndex = Math.max(0, acIndex - 1);
      items.forEach((d,i) => d.classList.toggle('selected', i === acIndex));
    } else if (conHistory.length > 0) {
      conHistIdx = Math.min(conHistIdx + 1, conHistory.length - 1);
      conInput.value = conHistory[conHistIdx];
    }
    return;
  }
  if (e.code === 'ArrowDown') {
    e.preventDefault();
    if (conAC.style.display === 'block') {
      const items = conAC.querySelectorAll('div');
      acIndex = Math.min(items.length - 1, acIndex + 1);
      items.forEach((d,i) => d.classList.toggle('selected', i === acIndex));
    } else if (conHistIdx > 0) {
      conHistIdx--;
      conInput.value = conHistory[conHistIdx];
    }
    return;
  }
});
conInput.addEventListener('input', updateAC);

// --- DRAGAMON BATTLE ---

let dragamonActive = false;

function startDragamon() {
  dragamonActive = true;
  const overlay = document.getElementById('dragamon-overlay');
  const msgEl = document.getElementById('dragamon-msg');
  const actEl = document.getElementById('dragamon-actions');
  const dCanvas = document.getElementById('dragamon-canvas');
  const dc = dCanvas.getContext('2d');
  overlay.classList.add('active');

  let torchHP = 3;
  let dragonHP = 3;
  let phase = 'intro'; // intro, choose, playerTurn, enemyTurn, win, lose
  let animTimer = 0;
  let shakeX = 0, shakeY = 0;
  let torchFlicker = 0;
  let msg = '';
  let turnQueue = [];

  function setMsg(t) { msg = t; msgEl.textContent = t; }
  setMsg('A wild Torch appeared!');

  function drawBattle() {
    if (!dragamonActive) return;
    dc.clearRect(0, 0, 400, 200);

    // Background - cave
    dc.fillStyle = '#1a1a2e';
    dc.fillRect(0, 0, 400, 200);
    dc.fillStyle = '#222240';
    dc.fillRect(0, 140, 400, 60);

    // Dragon (left side)
    const dx = 60 + shakeX, dy = 90 + shakeY;
    const s = 64;
    dc.fillStyle = skinColors.body;
    dc.fillRect(dx - s*.3, dy - s*.25, s*.6, s*.55);
    dc.fillStyle = skinColors.belly;
    dc.fillRect(dx - s*.2, dy - s*.1, s*.4, s*.35);
    dc.fillStyle = skinColors.body;
    dc.beginPath(); dc.arc(dx + s*.15, dy - s*.2, s*.18, 0, Math.PI*2); dc.fill();
    dc.fillStyle = skinColors.eyes;
    dc.beginPath(); dc.arc(dx + s*.2, dy - s*.22, s*.04, 0, Math.PI*2); dc.fill();
    dc.fillStyle = skinColors.wings;
    dc.beginPath(); dc.moveTo(dx - s*.2, dy - s*.2); dc.lineTo(dx - s*.35, dy - s*.45); dc.lineTo(dx, dy - s*.05); dc.fill();
    dc.fillStyle = skinColors.horns;
    dc.beginPath(); dc.moveTo(dx + s*.1, dy - s*.35); dc.lineTo(dx + s*.12, dy - s*.5); dc.lineTo(dx + s*.2, dy - s*.35); dc.fill();

    // Dragon HP
    dc.fillStyle = '#444'; dc.fillRect(20, 155, 100, 10);
    dc.fillStyle = '#4a4'; dc.fillRect(20, 155, (dragonHP / 3) * 100, 10);
    dc.fillStyle = '#ccc'; dc.font = '10px monospace'; dc.textAlign = 'left';
    dc.fillText('Dragon HP: ' + dragonHP + '/3', 20, 180);

    // Torch (right side)
    const tx = 300 + torchFlicker, ty = 80;
    // Stem
    dc.fillStyle = '#8b6914';
    dc.fillRect(tx - 4, ty, 8, 40);
    // Bowl
    dc.fillStyle = '#a07818';
    dc.beginPath();
    dc.moveTo(tx - 12, ty); dc.lineTo(tx + 12, ty); dc.lineTo(tx + 8, ty + 10); dc.lineTo(tx - 8, ty + 10);
    dc.fill();
    // Flame (animated, scales with HP)
    if (torchHP > 0) {
      const flameH = 10 + torchHP * 8;
      const wobble = Math.sin(Date.now() / 80) * 3;
      dc.fillStyle = '#ff6600';
      dc.beginPath(); dc.arc(tx + wobble, ty - flameH/2, 8 + torchHP*2, 0, Math.PI*2); dc.fill();
      dc.fillStyle = '#ffcc00';
      dc.beginPath(); dc.arc(tx + wobble, ty - flameH/2, 4 + torchHP, 0, Math.PI*2); dc.fill();
    } else {
      // Unlit - torch is lit by player, show glow
      dc.fillStyle = '#ff8800';
      const wobble = Math.sin(Date.now() / 80) * 4;
      dc.beginPath(); dc.arc(tx + wobble, ty - 20, 14, 0, Math.PI*2); dc.fill();
      dc.fillStyle = '#ffdd44';
      dc.beginPath(); dc.arc(tx + wobble, ty - 20, 8, 0, Math.PI*2); dc.fill();
    }

    // Torch HP
    dc.fillStyle = '#444'; dc.fillRect(260, 155, 100, 10);
    dc.fillStyle = torchHP > 0 ? '#a44' : '#4a4'; dc.fillRect(260, 155, (Math.max(torchHP, 0) / 3) * 100, 10);
    dc.fillStyle = '#ccc'; dc.textAlign = 'right';
    dc.fillText('Torch HP: ' + Math.max(torchHP, 0) + '/3', 380, 180);

    // Battle label
    dc.fillStyle = '#f0e68c'; dc.font = 'bold 14px monospace'; dc.textAlign = 'center';
    dc.fillText('DRAGAMON BATTLE', 200, 18);

    animTimer++;
    if (shakeX !== 0 || shakeY !== 0) {
      shakeX *= -0.6; shakeY *= -0.6;
      if (Math.abs(shakeX) < 0.5) shakeX = 0;
      if (Math.abs(shakeY) < 0.5) shakeY = 0;
    }
    torchFlicker = Math.sin(Date.now() / 60) * 2;

    requestAnimationFrame(drawBattle);
  }

  function showActions() {
    actEl.innerHTML = '';
    if (phase === 'intro') {
      const btn = document.createElement('button');
      btn.className = 'dragamon-btn';
      btn.textContent = 'Fight!';
      btn.onclick = () => { phase = 'choose'; showActions(); };
      actEl.appendChild(btn);
    } else if (phase === 'choose') {
      setMsg('What will Dragon do?');
      const fb = document.createElement('button');
      fb.className = 'dragamon-btn';
      fb.textContent = 'Fireball';
      fb.onclick = () => playerAttack();
      actEl.appendChild(fb);

      const rb = document.createElement('button');
      rb.className = 'dragamon-btn';
      rb.textContent = 'Tackle';
      rb.onclick = () => { setMsg('Dragon tries to tackle... but it has no effect on a torch!'); setTimeout(() => enemyTurn(), 1500); phase = 'wait'; showActions(); };
      actEl.appendChild(rb);

      const flb = document.createElement('button');
      flb.className = 'dragamon-btn';
      flb.textContent = 'Flee';
      flb.onclick = () => { setMsg('Can\'t flee from a wild Torch!'); };
      actEl.appendChild(flb);
    } else if (phase === 'win') {
      setMsg('Dragon lit the Torch! You win!');
      const btn = document.createElement('button');
      btn.className = 'dragamon-btn';
      btn.textContent = 'Continue';
      btn.onclick = endDragamon;
      actEl.appendChild(btn);
    } else if (phase === 'lose') {
      setMsg('Dragon fainted...');
      const btn = document.createElement('button');
      btn.className = 'dragamon-btn';
      btn.textContent = 'Try Again';
      btn.onclick = () => {
        torchHP = 3; dragonHP = 3; phase = 'intro';
        setMsg('A wild Torch appeared!');
        showActions();
      };
      actEl.appendChild(btn);
    } else {
      // wait phase - no buttons
    }
  }

  function playerAttack() {
    phase = 'wait';
    actEl.innerHTML = '';
    setMsg('Dragon used Fireball!');
    torchFlicker = 10;
    setTimeout(() => {
      torchHP--;
      if (torchHP <= 0) {
        phase = 'win';
        setMsg('The Torch was lit! It\'s super effective!');
        setTimeout(() => showActions(), 1200);
      } else {
        setMsg('The Torch resists! (' + torchHP + ' HP left)');
        setTimeout(() => enemyTurn(), 1200);
      }
    }, 600);
  }

  function enemyTurn() {
    phase = 'wait';
    actEl.innerHTML = '';
    const attacks = [
      { name: 'Ember', msg: 'Wild Torch used Ember!' },
      { name: 'Wax Toss', msg: 'Wild Torch threw hot wax!' },
      { name: 'Flicker', msg: 'Wild Torch flickered menacingly!' }
    ];
    const atk = attacks[Math.floor(Math.random() * attacks.length)];
    setMsg(atk.msg);
    setTimeout(() => {
      if (atk.name === 'Flicker') {
        setMsg('But nothing happened!');
      } else {
        dragonHP--;
        shakeX = 8; shakeY = 4;
        setMsg(atk.msg + ' Dragon takes 1 damage!');
      }
      if (dragonHP <= 0) {
        setTimeout(() => { phase = 'lose'; showActions(); }, 1000);
      } else {
        setTimeout(() => { phase = 'choose'; showActions(); }, 1200);
      }
    }, 800);
  }

  function endDragamon() {
    dragamonActive = false;
    overlay.classList.remove('active');
    conPrint('Dragamon battle complete!', 'ok');
  }

  drawBattle();
  showActions();
}

// --- CAPTCHA ---
let captchaActive = false;
const CAPTCHA_TYPES = {grid:0, odd:1, rotate:2, slide:3, checkbox:4};
function startCaptcha(forceType) {
  captchaActive = true;
  const overlay = document.getElementById('captcha-overlay');
  const titleEl = document.getElementById('captcha-title');
  const actEl = document.getElementById('captcha-actions');
  const cCanvas = document.getElementById('captcha-canvas');
  const cc = cCanvas.getContext('2d');
  overlay.classList.add('active');
  actEl.innerHTML = '';

  const CELL = 80, GRID = 3, PAD = 15;
  cCanvas.width = GRID * CELL + PAD * 2;
  cCanvas.height = GRID * CELL + PAD * 2;

  // Mini tile drawers for captcha canvas
  function cDrawWall(x, y, s) {
    cc.fillStyle = '#556';
    cc.fillRect(x+1, y+1, s-2, s-2);
    cc.strokeStyle = '#334';
    cc.lineWidth = 1;
    for (let i = 0; i < 3; i++) { cc.strokeRect(x+4+i*(s/3-2), y+4, s/3-4, s/2-6); cc.strokeRect(x+4+s/6-1+i*(s/3-2), y+s/2, s/3-4, s/2-6); }
  }
  function cDrawTorch(x, y, s) {
    cc.fillStyle = '#1a1a2e';
    cc.fillRect(x, y, s, s);
    cc.fillStyle = '#654';
    cc.fillRect(x+s*.4, y+s*.35, s*.2, s*.45);
    cc.fillStyle = '#fa3';
    cc.beginPath(); cc.arc(x+s*.5, y+s*.3, s*.18, 0, Math.PI*2); cc.fill();
    cc.fillStyle = '#ff8';
    cc.beginPath(); cc.arc(x+s*.5, y+s*.28, s*.1, 0, Math.PI*2); cc.fill();
  }
  function cDrawWater(x, y, s) {
    cc.fillStyle = '#26c';
    cc.fillRect(x+1, y+1, s-2, s-2);
    cc.strokeStyle = '#48e';
    cc.lineWidth = 1;
    for (let i = 0; i < 3; i++) { cc.beginPath(); cc.moveTo(x+4, y+s*.3+i*s*.2); cc.quadraticCurveTo(x+s*.5, y+s*.2+i*s*.2, x+s-4, y+s*.3+i*s*.2); cc.stroke(); }
  }
  function cDrawSkull(x, y, s) {
    cc.fillStyle = '#1a1a2e';
    cc.fillRect(x, y, s, s);
    cc.fillStyle = '#bba';
    cc.beginPath(); cc.arc(x+s*.5, y+s*.38, s*.25, 0, Math.PI*2); cc.fill();
    cc.fillRect(x+s*.38, y+s*.5, s*.24, s*.2);
    cc.fillStyle = '#222';
    cc.beginPath(); cc.arc(x+s*.42, y+s*.36, s*.06, 0, Math.PI*2); cc.fill();
    cc.beginPath(); cc.arc(x+s*.58, y+s*.36, s*.06, 0, Math.PI*2); cc.fill();
    cc.fillRect(x+s*.44, y+s*.58, s*.03, s*.06);
    cc.fillRect(x+s*.5, y+s*.58, s*.03, s*.06);
  }
  function cDrawGear(x, y, s) {
    cc.fillStyle = '#1a1a2e';
    cc.fillRect(x, y, s, s);
    const cx = x+s/2, cy = y+s/2;
    cc.fillStyle = '#555';
    cc.beginPath();
    for (let i = 0; i < 12; i++) { const a = (i/12)*Math.PI*2, r = i%2===0 ? s*.4 : s*.3; cc.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r); }
    cc.closePath(); cc.fill();
    cc.fillStyle = '#333';
    cc.beginPath(); cc.arc(cx, cy, s*.1, 0, Math.PI*2); cc.fill();
  }
  function cDrawSpike(x, y, s) {
    cc.fillStyle = '#333';
    cc.fillRect(x+2, y+2, s-4, s-4);
    cc.fillStyle = '#888';
    const cx = x+s/2, cy = y+s/2;
    const spikes = [[0,-.35],[.25,-.18],[.35,0],[.25,.25],[0,.35],[-.25,.25],[-.35,0],[-.25,-.18]];
    spikes.forEach(([ox,oy]) => { cc.beginPath(); cc.moveTo(cx+ox*s,cy+oy*s); cc.lineTo(cx+ox*s*.5-oy*s*.08,cy+oy*s*.5+ox*s*.08); cc.lineTo(cx+ox*s*.5+oy*s*.08,cy+oy*s*.5-ox*s*.08); cc.fill(); });
    cc.fillStyle = '#555';
    cc.beginPath(); cc.arc(cx, cy, s*.08, 0, Math.PI*2); cc.fill();
  }
  function cDrawGrate(x, y, s) {
    cc.fillStyle = '#1a1a2e';
    cc.fillRect(x, y, s, s);
    cc.strokeStyle = '#777';
    cc.lineWidth = 2;
    for (let i = 1; i < 4; i++) { cc.beginPath(); cc.moveTo(x+i*s/4, y+2); cc.lineTo(x+i*s/4, y+s-2); cc.stroke(); cc.beginPath(); cc.moveTo(x+2, y+i*s/4); cc.lineTo(x+s-2, y+i*s/4); cc.stroke(); }
  }
  function cDrawGate(x, y, s) {
    cc.fillStyle = '#1a1a2e';
    cc.fillRect(x, y, s, s);
    cc.fillStyle = '#825';
    cc.fillRect(x+s*.1, y+2, s*.25, s-4);
    cc.fillRect(x+s*.65, y+2, s*.25, s-4);
    cc.fillStyle = '#a36';
    cc.beginPath(); cc.arc(x+s*.5, y+s*.15, s*.15, Math.PI, 0); cc.fill();
    cc.fillRect(x+s*.35, y+s*.15, s*.3, s*.6);
  }
  function cDrawIce(x, y, s) {
    cc.fillStyle = '#9cf';
    cc.fillRect(x+1, y+1, s-2, s-2);
    cc.strokeStyle = '#fff';
    cc.lineWidth = 1;
    cc.globalAlpha = 0.5;
    cc.beginPath(); cc.moveTo(x+s*.2,y+s*.3); cc.lineTo(x+s*.5,y+s*.2); cc.lineTo(x+s*.8,y+s*.35); cc.stroke();
    cc.beginPath(); cc.moveTo(x+s*.15,y+s*.65); cc.lineTo(x+s*.55,y+s*.55); cc.lineTo(x+s*.85,y+s*.7); cc.stroke();
    cc.globalAlpha = 1;
  }
  function cDrawDragon(x, y, s) {
    cc.fillStyle = '#1a1a2e';
    cc.fillRect(x, y, s, s);
    const cx = x+s*.5, cy = y+s*.55;
    cc.fillStyle = skinColors.body;
    cc.fillRect(cx-s*.25, cy-s*.2, s*.5, s*.4);
    cc.fillStyle = skinColors.belly;
    cc.fillRect(cx-s*.15, cy-s*.05, s*.3, s*.25);
    cc.fillStyle = skinColors.body;
    cc.beginPath(); cc.arc(cx+s*.08, cy-s*.18, s*.14, 0, Math.PI*2); cc.fill();
    cc.fillStyle = skinColors.eyes;
    cc.beginPath(); cc.arc(cx+s*.12, cy-s*.2, s*.03, 0, Math.PI*2); cc.fill();
    cc.fillStyle = skinColors.wings;
    cc.beginPath(); cc.moveTo(cx-s*.2,cy-s*.15); cc.lineTo(cx-s*.35,cy-s*.35); cc.lineTo(cx,cy); cc.fill();
    cc.fillStyle = skinColors.horns;
    cc.beginPath(); cc.moveTo(cx+s*.04,cy-s*.3); cc.lineTo(cx+s*.06,cy-s*.42); cc.lineTo(cx+s*.14,cy-s*.3); cc.fill();
  }

  const TILE_DRAWERS = [
    { name: 'walls', draw: cDrawWall },
    { name: 'torches', draw: cDrawTorch },
    { name: 'water', draw: cDrawWater },
    { name: 'skulls', draw: cDrawSkull },
    { name: 'gears', draw: cDrawGear },
    { name: 'spikes', draw: cDrawSpike },
    { name: 'grates', draw: cDrawGrate },
    { name: 'gates', draw: cDrawGate },
    { name: 'ice', draw: cDrawIce },
  ];

  function makeBtn(label, onClick) {
    const b = document.createElement('button');
    b.className = 'captcha-btn';
    b.textContent = label;
    b.onclick = onClick;
    actEl.appendChild(b);
    return b;
  }

  function endCaptcha(passed) {
    captchaActive = false;
    overlay.classList.remove('active');
    cCanvas.removeEventListener('click', canvasClick);
    if (canvasWheel) { cCanvas.removeEventListener('wheel', canvasWheel); canvasWheel = null; }
    if (canvasMD) { cCanvas.removeEventListener('mousedown', canvasMD); canvasMD = null; }
    if (canvasMM) { document.removeEventListener('mousemove', canvasMM); canvasMM = null; }
    if (canvasMU) { document.removeEventListener('mouseup', canvasMU); canvasMU = null; }
    if (passed) conPrint('CAPTCHA verified - you are not a robot!', 'ok');
    else conPrint('CAPTCHA failed!', 'err');
  }

  let canvasClick = () => {};
  let canvasWheel = null;
  let canvasMD = null, canvasMM = null, canvasMU = null;

  const type = forceType !== undefined ? forceType : Math.floor(Math.random() * 5);

  if (type === 0) {
    // --- IMAGE GRID SELECTION ---
    const targetIdx = Math.floor(Math.random() * TILE_DRAWERS.length);
    const target = TILE_DRAWERS[targetIdx];
    titleEl.textContent = 'Select all squares with ' + target.name;
    const grid = [];
    // Place 2-4 target tiles randomly
    const count = 2 + Math.floor(Math.random() * 3);
    const positions = [];
    while (positions.length < count) {
      const p = Math.floor(Math.random() * 9);
      if (!positions.includes(p)) positions.push(p);
    }
    for (let i = 0; i < 9; i++) {
      if (positions.includes(i)) {
        grid.push({ drawer: target, isTarget: true });
      } else {
        let ri;
        do { ri = Math.floor(Math.random() * TILE_DRAWERS.length); } while (ri === targetIdx);
        grid.push({ drawer: TILE_DRAWERS[ri], isTarget: false });
      }
    }
    const selected = new Set();

    function drawGrid() {
      cc.fillStyle = '#111';
      cc.fillRect(0, 0, cCanvas.width, cCanvas.height);
      for (let i = 0; i < 9; i++) {
        const gx = i % 3, gy = Math.floor(i / 3);
        const x = PAD + gx * CELL, y = PAD + gy * CELL;
        grid[i].drawer.draw(x, y, CELL);
        cc.strokeStyle = '#444';
        cc.lineWidth = 1;
        cc.strokeRect(x, y, CELL, CELL);
        if (selected.has(i)) {
          cc.strokeStyle = '#4f4';
          cc.lineWidth = 3;
          cc.strokeRect(x+2, y+2, CELL-4, CELL-4);
        }
      }
    }
    drawGrid();

    canvasClick = (e) => {
      const rect = cCanvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const gx = Math.floor((mx - PAD) / CELL), gy = Math.floor((my - PAD) / CELL);
      if (gx < 0 || gx >= 3 || gy < 0 || gy >= 3) return;
      const idx = gy * 3 + gx;
      if (selected.has(idx)) selected.delete(idx); else selected.add(idx);
      drawGrid();
    };
    cCanvas.addEventListener('click', canvasClick);

    makeBtn('Verify', () => {
      let correct = true;
      for (let i = 0; i < 9; i++) {
        if (grid[i].isTarget !== selected.has(i)) { correct = false; break; }
      }
      endCaptcha(correct);
    });
    makeBtn('Close', () => endCaptcha(false));

  } else if (type === 1) {
    // --- ODD ONE OUT ---
    titleEl.textContent = 'Click the tile that doesn\'t belong';
    const mainIdx = Math.floor(Math.random() * TILE_DRAWERS.length);
    let oddIdx;
    do { oddIdx = Math.floor(Math.random() * TILE_DRAWERS.length); } while (oddIdx === mainIdx);
    const oddPos = Math.floor(Math.random() * 9);
    const grid = [];
    for (let i = 0; i < 9; i++) {
      grid.push(i === oddPos ? TILE_DRAWERS[oddIdx] : TILE_DRAWERS[mainIdx]);
    }

    function drawGrid() {
      cc.fillStyle = '#111';
      cc.fillRect(0, 0, cCanvas.width, cCanvas.height);
      for (let i = 0; i < 9; i++) {
        const gx = i % 3, gy = Math.floor(i / 3);
        const x = PAD + gx * CELL, y = PAD + gy * CELL;
        grid[i].draw(x, y, CELL);
        cc.strokeStyle = '#444';
        cc.lineWidth = 1;
        cc.strokeRect(x, y, CELL, CELL);
      }
    }
    drawGrid();

    canvasClick = (e) => {
      const rect = cCanvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const gx = Math.floor((mx - PAD) / CELL), gy = Math.floor((my - PAD) / CELL);
      if (gx < 0 || gx >= 3 || gy < 0 || gy >= 3) return;
      const idx = gy * 3 + gx;
      endCaptcha(idx === oddPos);
    };
    cCanvas.addEventListener('click', canvasClick);
    makeBtn('Close', () => endCaptcha(false));

  } else if (type === 2) {
    // --- ROTATION ---
    titleEl.textContent = 'Rotate the image until it is upright';
    const target = TILE_DRAWERS[Math.floor(Math.random() * TILE_DRAWERS.length)];
    const rotations = [90, 180, 270];
    let currentRot = rotations[Math.floor(Math.random() * rotations.length)];

    function drawRot() {
      cc.fillStyle = '#111';
      cc.fillRect(0, 0, cCanvas.width, cCanvas.height);
      cc.save();
      cc.translate(cCanvas.width/2, cCanvas.height/2);
      cc.rotate(currentRot * Math.PI / 180);
      const s = 160;
      target.draw(-s/2, -s/2, s);
      cc.restore();
      cc.fillStyle = '#888';
      cc.font = '14px monospace';
      cc.textAlign = 'center';
      cc.fillText(target.name, cCanvas.width/2, cCanvas.height - 8);
    }
    drawRot();

    makeBtn('Rotate Left', () => { currentRot = (currentRot - 90 + 360) % 360; drawRot(); });
    makeBtn('Rotate Right', () => { currentRot = (currentRot + 90) % 360; drawRot(); });
    makeBtn('Submit', () => endCaptcha(currentRot === 0));
    makeBtn('Close', () => endCaptcha(false));

  } else if (type === 3) {
    // --- SLIDER PUZZLE ---
    titleEl.textContent = 'Slide tiles to match the goal (one tile is hidden)';
    const REF = 40;
    cCanvas.width = GRID * CELL + PAD * 3 + GRID * REF;
    cCanvas.height = GRID * CELL + PAD * 2;
    // Use dragon as the image, split into 3x3
    const tiles = [0,1,2,3,4,5,6,7,8]; // 8 = empty
    // Shuffle with valid moves
    let emptyIdx = 8;
    for (let i = 0; i < 80; i++) {
      const neighbors = [];
      const ex = emptyIdx % 3, ey = Math.floor(emptyIdx / 3);
      if (ex > 0) neighbors.push(emptyIdx - 1);
      if (ex < 2) neighbors.push(emptyIdx + 1);
      if (ey > 0) neighbors.push(emptyIdx - 3);
      if (ey < 2) neighbors.push(emptyIdx + 3);
      const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
      tiles[emptyIdx] = tiles[pick];
      tiles[pick] = 8;
      emptyIdx = pick;
    }

    // Pre-render full image: draw tiles on captcha canvas then copy to offscreen
    const imgCanvas = document.createElement('canvas');
    imgCanvas.width = GRID * CELL; imgCanvas.height = GRID * CELL;
    const ic = imgCanvas.getContext('2d');
    const cdraw = [cDrawDragon, cDrawTorch, cDrawWall, cDrawWater, cDrawSkull, cDrawGear, cDrawSpike, cDrawGrate, cDrawIce];
    cc.fillStyle = '#111'; cc.fillRect(0, 0, cCanvas.width, cCanvas.height);
    for (let i = 0; i < 9; i++) { cdraw[i](PAD + (i%3)*CELL, PAD + Math.floor(i/3)*CELL, CELL); }
    ic.drawImage(cCanvas, PAD, PAD, GRID*CELL, GRID*CELL, 0, 0, GRID*CELL, GRID*CELL);

    function drawSlider() {
      cc.fillStyle = '#111';
      cc.fillRect(0, 0, cCanvas.width, cCanvas.height);
      for (let i = 0; i < 9; i++) {
        const dx = i % 3, dy = Math.floor(i / 3);
        const t = tiles[i];
        const px = PAD + dx*CELL, py = PAD + dy*CELL;
        if (t === 8) {
          cc.fillStyle = '#222';
          cc.fillRect(px, py, CELL, CELL);
          continue;
        }
        const sx = t % 3, sy = Math.floor(t / 3);
        cc.drawImage(imgCanvas, sx*CELL, sy*CELL, CELL, CELL, px, py, CELL, CELL);
        // Green border if correct position, red tint if wrong
        if (t === i) {
          cc.strokeStyle = '#4f4'; cc.lineWidth = 2;
          cc.strokeRect(px+1, py+1, CELL-2, CELL-2);
        } else {
          cc.fillStyle = 'rgba(255,0,0,0.15)';
          cc.fillRect(px, py, CELL, CELL);
          cc.strokeStyle = '#844'; cc.lineWidth = 1;
          cc.strokeRect(px, py, CELL, CELL);
        }
      }
      // Reference image on the right
      const refX = PAD * 2 + GRID * CELL, refSize = GRID * REF;
      cc.drawImage(imgCanvas, 0, 0, GRID*CELL, GRID*CELL, refX, PAD, refSize, refSize);
      cc.strokeStyle = '#666'; cc.lineWidth = 1;
      cc.strokeRect(refX, PAD, refSize, refSize);
      for (let gi = 1; gi < GRID; gi++) {
        cc.beginPath(); cc.moveTo(refX + gi*REF, PAD); cc.lineTo(refX + gi*REF, PAD + refSize); cc.stroke();
        cc.beginPath(); cc.moveTo(refX, PAD + gi*REF); cc.lineTo(refX + refSize, PAD + gi*REF); cc.stroke();
      }
      cc.fillStyle = '#888'; cc.font = '11px monospace'; cc.textAlign = 'center';
      cc.fillText('GOAL', refX + refSize/2, PAD + refSize + 14);
      cc.textAlign = 'left';
    }
    drawSlider();

    function isSolved() {
      for (let i = 0; i < 9; i++) { if (tiles[i] !== i) return false; }
      return true;
    }

    canvasClick = (e) => {
      const rect = cCanvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const gx = Math.floor((mx - PAD) / CELL), gy = Math.floor((my - PAD) / CELL);
      if (gx < 0 || gx >= 3 || gy < 0 || gy >= 3) return;
      const idx = gy * 3 + gx;
      // Check if adjacent to empty
      const ei = tiles.indexOf(8);
      const ex = ei%3, ey = Math.floor(ei/3);
      if ((Math.abs(gx-ex) + Math.abs(gy-ey)) === 1) {
        tiles[ei] = tiles[idx];
        tiles[idx] = 8;
        drawSlider();
        if (isSolved()) { setTimeout(() => endCaptcha(true), 300); }
      }
    };
    cCanvas.addEventListener('click', canvasClick);
    makeBtn('Close', () => endCaptcha(false));

  } else if (type === 4) {
    // --- CHECKBOX ---
    titleEl.textContent = '';
    cCanvas.width = 300; cCanvas.height = 80;
    let checked = false, verifying = false, spinAngle = 0, spinTimer = null;
    let subPage = null; // null, 'privacy', 'terms'
    let scrollY = 0;
    const PRIVACY_LINES = [
      'Effective date: The Age of Fire',

      'dragonCAPTCHA collects the following:',

      'DATA RETENTION',

      'YOUR RIGHTS',

      '',
      'COOKIES',
      'We don\'t use cookies. We use torches.',
      'They\'re basically the same thing but',
      'warmer and more likely to set your',
      'browser history on fire.',
      '',
      'CONTACT',
      'Please direct all complaints to the',
      'nearest skull. It won\'t respond but it',
      'is an excellent listener.',
    ];
    const TERMS_LINES = [
      'Last updated: Tomorrow',
      '',
      'By clicking the checkbox you agree to:',
      '',
      '1. Never impersonate a robot.',
      '2. Light at least one torch per session.',
      '3. Accept that skulls are purely',
      '   decorative and definitely not cursed.',
      '4. Not hold dragonCAPTCHA liable for',
      '   any spike-related incidents.',
      '5. Acknowledge that gears do NOT bite.',
      '',
      '6. Solve every captcha with enthusiasm',
      '   and a positive attitude.',
      '7. Never question why the walls are',
      '   watching you. They just do that.',

      '   at least 1:1 at all times.',
      '9. Agree that push blocks have feelings',
