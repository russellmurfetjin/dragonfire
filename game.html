      '10. Not reverse-engineer the dragon.',
      '    (We tried. It got angry.)',
      '',
      '11. Accept that ice tiles are slippery',
      '    and that is YOUR problem.',
      '12. Refrain from stacking more than',
      '    three skulls at once. It\'s weird.',
      '13. Acknowledge that the Torch Council',
      '    is a legitimate governing body.',
      '14. Not use fire breath indoors without',
      '    written consent from the Torch',
      '    Council and two (2) witnesses.',
      '',
      '15. Understand that conveyor belts go',
      '    where conveyor belts want to go.',
      '16. Not attempt to bribe gates with',
      '    treasure, compliments, or snacks.',
      '17. Accept that mirrors exist and are',
      '    NOT portals. Stop walking into them.',
      '18. Promise not to sue if a gear looks',
      '    at you funny. That\'s just its face.',
      '',
      'LIMITATION OF LIABILITY',
      'dragonCAPTCHA is not responsible for',
      'existential crises caused by being asked',
      'to prove you are not a robot. If you ARE',
      'a robot, why did you click the checkbox?',
      'That was very dishonest of you.',
      '',
      'TERMINATION',
      'Violation of these terms results in',
      'permanent captcha. Not one captcha. ALL',
      'captchas. Forever. Even to check your',
      'email. We have that power somehow and',
      'we are not afraid to use it.',
    ];

    function drawCheckbox() {
      if (subPage) {
        const w = cCanvas.width, h = cCanvas.height;
        cc.fillStyle = '#f9f9f9'; cc.fillRect(0, 0, w, h);
        cc.strokeStyle = '#c1c1c1'; cc.lineWidth = 2; cc.strokeRect(0, 0, w, h);
        cc.fillStyle = '#333'; cc.font = 'bold 13px monospace'; cc.textAlign = 'left';
        cc.fillText(subPage === 'privacy' ? 'Privacy Policy' : 'Terms and Conditions', 12, 22);
        const lines = subPage === 'privacy' ? PRIVACY_LINES : TERMS_LINES;
        const contentH = lines.length * 14 + (subPage === 'terms' ? 30 : 4);
        const viewTop = 30, viewBot = h - 26;
        const viewH = viewBot - viewTop;
        const maxScroll = Math.max(0, contentH - viewH);
        scrollY = Math.max(0, Math.min(maxScroll, scrollY));
        cc.save();
        cc.beginPath(); cc.rect(2, viewTop, w - 4, viewH); cc.clip();
        cc.fillStyle = '#555'; cc.font = '10px monospace';
        lines.forEach((l, i) => cc.fillText(l, 12, viewTop + 12 + i * 14 - scrollY));
        if (subPage === 'terms') {
          const btnY = viewTop + 12 + lines.length * 14 + 10 - scrollY;
          cc.fillStyle = '#47a'; cc.font = 'bold 10px monospace';
          cc.fillText('[Accept Terms and Conditions]', 12, btnY);
        }
        cc.restore();
        if (maxScroll > 0) {
          const barH = Math.max(20, viewH * (viewH / contentH));
          const barY = viewTop + (scrollY / maxScroll) * (viewH - barH);
          cc.fillStyle = '#ccc';
          cc.fillRect(w - 8, barY, 4, barH);
        }
        cc.fillStyle = '#47a'; cc.font = '11px monospace';
        cc.fillText('[Back]', 12, h - 10);
        return;
      }
      cc.fillStyle = '#f9f9f9'; cc.fillRect(0, 0, 300, 80);
      cc.strokeStyle = '#c1c1c1'; cc.lineWidth = 2; cc.strokeRect(0, 0, 300, 80);
      const bx = 20, by = 22, bs = 28;
      cc.fillStyle = '#fff'; cc.fillRect(bx, by, bs, bs);
      cc.strokeStyle = '#aaa'; cc.lineWidth = 2; cc.strokeRect(bx, by, bs, bs);
      if (verifying) {
        const cx = bx + bs/2, cy = by + bs/2, r = 10;
        cc.strokeStyle = '#ddd'; cc.lineWidth = 3;
        cc.beginPath(); cc.arc(cx, cy, r, 0, Math.PI*2); cc.stroke();
        cc.strokeStyle = '#4285f4'; cc.lineWidth = 3;
        cc.beginPath(); cc.arc(cx, cy, r, spinAngle, spinAngle + Math.PI*0.7); cc.stroke();
      } else if (checked) {
        cc.strokeStyle = '#34a853'; cc.lineWidth = 4; cc.lineCap = 'round';
        cc.beginPath();
        cc.moveTo(bx + 6, by + bs/2);
        cc.lineTo(bx + bs/2 - 2, by + bs - 7);
        cc.lineTo(bx + bs - 4, by + 6);
        cc.stroke(); cc.lineCap = 'butt';
      }
      cc.fillStyle = '#333'; cc.font = '15px monospace'; cc.textAlign = 'left';
      cc.fillText("I'm not a robot", 62, 42);
      cc.fillStyle = '#555'; cc.font = '9px monospace'; cc.textAlign = 'right';
      cc.fillText('dragonCAPTCHA', 285, 35);
      cc.fillStyle = '#47a'; cc.font = '8px monospace';
      cc.fillText('Privacy', 260, 48);
      cc.fillText('Terms', 285, 48);
      cc.fillStyle = '#888';
      cc.fillText(' - ', 265, 48);
      cc.textAlign = 'left';
    }
    drawCheckbox();

    canvasClick = (e) => {
      if (dragged) { dragged = false; return; }
      const rect = cCanvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      if (subPage) {
        if (mx >= 8 && mx <= 60 && my >= cCanvas.height - 22) {
          subPage = null; scrollY = 0;
          cCanvas.width = 300; cCanvas.height = 80;
          drawCheckbox();
        }
        if (subPage === 'terms') {
          const btnY = 30 + 12 + TERMS_LINES.length * 14 + 10 - scrollY;
          if (btnY >= 30 && btnY <= cCanvas.height - 26 && mx >= 8 && mx <= 250 && my >= btnY - 12 && my <= btnY + 4) {
            subPage = null; scrollY = 0;
            cCanvas.width = 300; cCanvas.height = 80;
            checked = true; drawCheckbox();
            setTimeout(() => endCaptcha(true), 600);
          }
        }
        return;
      }
      if (checked || verifying) return;
      // Privacy link ~(230-262, 40-55)
      if (mx >= 230 && mx <= 262 && my >= 40 && my <= 55) {
        subPage = 'privacy'; scrollY = 0;
        cCanvas.width = 300; cCanvas.height = 350;
        drawCheckbox();
        return;
      }
      // Terms link ~(268-290, 40-55)
      if (mx >= 268 && mx <= 290 && my >= 40 && my <= 55) {
        subPage = 'terms'; scrollY = 0;
        cCanvas.width = 300; cCanvas.height = 350;
        drawCheckbox();
        return;
      }
      if (mx >= 10 && mx <= 58 && my >= 15 && my <= 58) {
        verifying = true;
        drawCheckbox();
        const duration = 1500 + Math.random() * 2000;
        spinTimer = setInterval(() => { spinAngle += 0.15; drawCheckbox(); }, 30);
        setTimeout(() => {
          clearInterval(spinTimer);
          verifying = false;
          checked = true;
          drawCheckbox();
          setTimeout(() => endCaptcha(true), 600);
        }, duration);
      }
    };
    cCanvas.addEventListener('click', canvasClick);
    canvasWheel = (e) => { if (!subPage) return; e.preventDefault(); scrollY += e.deltaY > 0 ? 14 : -14; drawCheckbox(); };
    cCanvas.addEventListener('wheel', canvasWheel, { passive: false });
    let dragY = null, dragged = false;
    canvasMD = (e) => { if (!subPage) return; dragY = e.clientY; dragged = false; };
    canvasMM = (e) => { if (dragY === null) return; const dy = dragY - e.clientY; if (Math.abs(dy) > 2) { scrollY += dy; dragY = e.clientY; dragged = true; drawCheckbox(); } };
    canvasMU = () => { dragY = null; };
    cCanvas.addEventListener('mousedown', canvasMD);
    document.addEventListener('mousemove', canvasMM);
    document.addEventListener('mouseup', canvasMU);
    makeBtn('Close', () => { if (spinTimer) clearInterval(spinTimer); endCaptcha(false); });
  }
}

function drawDragonPortrait(pctx, w, h, bodyColor) {
  const colors = npcColorPalette(bodyColor || '#3a7d44');
  const s = Math.min(w, h);
  const cx = w/2, cy = h/2;
  pctx.clearRect(0, 0, w, h);
  // Body
  pctx.fillStyle = colors.body;
  pctx.fillRect(cx-s*0.3, cy-s*0.1, s*0.6, s*0.55);
  // Belly
  pctx.fillStyle = colors.belly;
  pctx.fillRect(cx-s*0.2, cy+s*0.05, s*0.4, s*0.35);
  // Head
  const hx = cx + s*0.2, hy = cy - s*0.15;
  pctx.fillStyle = colors.body;
  pctx.beginPath(); pctx.arc(hx, hy, s*0.22, 0, Math.PI*2); pctx.fill();
  // Eyes
  pctx.fillStyle = colors.eyes;
  pctx.beginPath(); pctx.arc(hx+s*0.08, hy-s*0.06, s*0.04, 0, Math.PI*2); pctx.fill();
  pctx.beginPath(); pctx.arc(hx+s*0.08, hy+s*0.06, s*0.04, 0, Math.PI*2); pctx.fill();
  // Wings
  pctx.fillStyle = colors.wings;
  pctx.beginPath(); pctx.moveTo(cx-s*0.15, cy-s*0.05); pctx.lineTo(cx, cy-s*0.4); pctx.lineTo(cx+s*0.15, cy-s*0.05); pctx.fill();
  // Tail
  pctx.strokeStyle = colors.body; pctx.lineWidth = 2;
  pctx.beginPath(); pctx.moveTo(cx-s*0.3, cy+s*0.2); pctx.quadraticCurveTo(cx-s*0.5, cy+s*0.35, cx-s*0.4, cy+s*0.45); pctx.stroke();
  // Horns
  pctx.fillStyle = colors.horns;
  pctx.beginPath(); pctx.moveTo(hx-s*0.08, hy-s*0.16); pctx.lineTo(hx-s*0.04, hy-s*0.32); pctx.lineTo(hx+s*0.02, hy-s*0.16); pctx.fill();
  pctx.beginPath(); pctx.moveTo(hx+s*0.04, hy-s*0.16); pctx.lineTo(hx+s*0.1, hy-s*0.32); pctx.lineTo(hx+s*0.14, hy-s*0.16); pctx.fill();
}

function showDialogue(text, name, bodyColor) {
  dialogueActive = true;
  SFX.play('dialogue');
  const overlay = document.getElementById('dialogue-overlay');
  overlay.classList.add('active');
  document.getElementById('dialogue-name').textContent = name || 'Dragon';
  document.getElementById('dialogue-text').textContent = text;
  // Draw portrait
  const pc = document.getElementById('dialogue-portrait');
  const pctx = pc.getContext('2d');
  drawDragonPortrait(pctx, 56, 56, bodyColor);

  const dismiss = () => {
    dialogueActive = false;
    overlay.classList.remove('active');
    overlay.removeEventListener('click', dismiss);
    document.removeEventListener('keydown', keyDismiss);
  };
  const keyDismiss = (e) => {
    if (e.code === 'KeyE' || e.code === 'Space' || e.code === 'Escape' || e.code === 'Enter') {
      e.preventDefault();
      dismiss();
    }
  };
  overlay.addEventListener('click', dismiss);
  document.addEventListener('keydown', keyDismiss);
}

function newsWrapText(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW) {
      if (line) lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function showNewspaper(customText, customSubtitle) {
  newsActive = true;
  SFX.play('paper');
  const overlay = document.getElementById('news-overlay');
  const nc = document.getElementById('news-canvas');
  const ctx = nc.getContext('2d');
  overlay.classList.add('active');

  let headline, body;
  if (customText) {
    headline = 'BREAKING NEWS';
    body = customText;
  } else {
    const a = NEWS_ARTICLES[Math.floor(Math.random() * NEWS_ARTICLES.length)];
    headline = a.headline;
    body = a.body;
  }

  const w = nc.width, h = nc.height;
  // Paper background
  ctx.fillStyle = '#f5e6c8';
  ctx.fillRect(0, 0, w, h);
  // Double border
  ctx.strokeStyle = '#8b7355';
  ctx.lineWidth = 3;
  ctx.strokeRect(3, 3, w - 6, h - 6);
  ctx.lineWidth = 1;
  ctx.strokeRect(7, 7, w - 14, h - 14);
  // Masthead
  ctx.fillStyle = '#2b1810';
  ctx.font = 'bold 24px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('THE DRAGON TIMES', w / 2, 40);
  // Rules
  ctx.strokeStyle = '#2b1810';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(15, 48); ctx.lineTo(w - 15, 48); ctx.stroke();
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(15, 52); ctx.lineTo(w - 15, 52); ctx.stroke();
  // Subtitle
  ctx.font = 'italic 9px Georgia, serif';
  ctx.fillText(customSubtitle || 'Vol. IV No. 22 \u00B7 The Age of Fire \u00B7 Price: 2 Gold', w / 2, 64);
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(15, 70); ctx.lineTo(w - 15, 70); ctx.stroke();
  // Headline
  ctx.font = 'bold 15px Georgia, serif';
  const headLines = newsWrapText(ctx, headline, w - 40);
  let y = 90;
  headLines.forEach(l => { ctx.fillText(l, w / 2, y); y += 18; });
  // Rule under headline
  y += 4;
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(30, y); ctx.lineTo(w - 30, y); ctx.stroke();
  y += 16;
  // Body
  ctx.font = '12px Georgia, serif';
  ctx.textAlign = 'left';
  const bodyLines = newsWrapText(ctx, body, w - 40);
  bodyLines.forEach(l => { ctx.fillText(l, 20, y); y += 16; });

  document.getElementById('news-close-btn').onclick = () => {
    newsActive = false;
    overlay.classList.remove('active');
  };
}
