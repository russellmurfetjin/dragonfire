<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dragon higher Puzzle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; overflow: hidden; }
  canvas { image-rendering: pixelated; border: 2px solid #444; }
  #ui {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    color: #f0e68c; font-size: 18px; text-align: center; text-shadow: 1px 1px 3px #000;
  }
  #controls {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #aaa; font-size: 14px; text-align: center;
  }
  .overlay {
    position: fixed; inset: 0; z-index: 10;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: #1a1a2e; color: #f0e68c; font-family: monospace;
  }
  .overlay.transparent { background: rgba(26,26,46,0.85); }
  .overlay h1 { font-size: 32px; margin-bottom: 24px; text-shadow: 2px 2px 6px #000; }
  .menu-btn {
    display: block; width: 260px; padding: 14px 0; margin: 8px 0;
    background: #2a2a4e; color: #f0e68c; border: 2px solid #4a4a6e;
    font-family: monospace; font-size: 18px; cursor: pointer;
    text-align: center; transition: background 0.15s;
  }
  .menu-btn:hover { background: #3a3a5e; border-color: #6a6a8e; }
  .menu-btn.small { width: 120px; padding: 10px 0; font-size: 14px; }
  .menu-btn.green { border-color: #4a7a4a; }
  .menu-btn.green:hover { background: #2a4a2e; }
  #levelselect-grid {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    max-width: 480px; margin-bottom: 24px;
  }
  .level-btn {
    width: 56px; height: 56px; background: #2a2a4e; color: #f0e68c;
    border: 2px solid #4a4a6e; font-family: monospace; font-size: 20px;
    cursor: pointer; position: relative; transition: background 0.15s;
  }
  .level-btn:hover { background: #3a3a5e; border-color: #6a6a8e; }
  .level-btn.completed { border-color: #4a7a4a; }
  .level-btn.completed::after {
    content: '\2713'; position: absolute; top: 2px; right: 4px;
    font-size: 12px; color: #6abf69;
  }
  .level-btn.cheated { border-color: #c4a800; }
  .level-btn.cheated::after {
    content: '\2713'; position: absolute; top: 2px; right: 4px;
    font-size: 12px; color: #c4a800;
  }
  .level-btn.drunk-completed { border-color: #2ab5a0; box-shadow: 0 0 6px rgba(42,181,160,0.4); }
  .level-btn.drunk-completed::before {
    content: '\1F943'; position: absolute; top: 1px; left: 3px;
    font-size: 10px;
  }
  #levelselect-packname { font-size: 18px; color: #aaa; margin-bottom: 16px; }
  #pack-list {
    display: flex; flex-direction: column; gap: 8px;
    max-height: 300px; overflow-y: auto; margin-bottom: 16px; min-width: 300px;
  }
  .pack-btn { text-align: left; padding: 12px 16px; }
  #pack-paste { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
  #share-code-input {
    width: 260px; padding: 10px; background: #2a2a4e; color: #f0e68c;
    border: 2px solid #4a4a6e; font-family: monospace; font-size: 14px;
  }
  #share-code-input::placeholder { color: #666; }
  /* Console */
  #console-overlay {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    display: none; flex-direction: column; font-family: monospace;
  }
  #console-overlay.active { display: flex; }
  #console-log {
    background: rgba(0,0,0,0.85); color: #0f0; font-size: 13px;
    max-height: 160px; overflow-y: auto; padding: 6px 10px;
    border-top: 2px solid #333;
  }
  #console-log div { margin: 2px 0; white-space: pre-wrap; }
  #console-log .err { color: #f44; }
  #console-log .info { color: #4af; }
  #console-log .ok { color: #4f4; }
  #console-input-row {
    display: flex; background: #111; border-top: 1px solid #333;
  }
  #console-prompt { color: #0f0; padding: 6px; font-size: 14px; }
  #console-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #0f0; font-family: monospace; font-size: 14px; padding: 6px 0;
  }
  #console-autocomplete {
    position: absolute; bottom: 100%; left: 0; right: 0;
    background: rgba(0,0,0,0.9); display: none;
  }
  #console-autocomplete div {
    padding: 3px 10px; color: #888; font-size: 13px; cursor: pointer;
  }
  #console-autocomplete div.selected { background: #333; color: #0f0; }
  /* Dragamon battle */
  #dragamon-overlay {
    position: fixed; inset: 0; z-index: 25; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: #0a0a1a; font-family: monospace; color: #ccc;
  }
  #dragamon-overlay.active { display: flex; }
  #dragamon-overlay canvas { border: 2px solid #444; margin-bottom: 16px; }
  #dragamon-msg { font-size: 16px; margin-bottom: 12px; min-height: 24px; color: #f0e68c; }
  #dragamon-actions { display: flex; gap: 12px; }
  .dragamon-btn {
    padding: 10px 24px; background: #2a2a4e; color: #f0e68c; border: 2px solid #4a4a6e;
    font-family: monospace; font-size: 16px; cursor: pointer; transition: background 0.15s;
  }
  .dragamon-btn:hover { background: #3a3a5e; }
  .dragamon-btn:disabled { opacity: 0.4; cursor: default; }
  /* Captcha */
  #captcha-overlay {
    position: fixed; inset: 0; z-index: 25; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: #0a0a1a; font-family: monospace; color: #ccc;
  }
  #captcha-overlay.active { display: flex; }
  #captcha-title { font-size: 18px; margin-bottom: 12px; color: #f0e68c; text-align: center; }
  #captcha-canvas { border: 2px solid #444; margin-bottom: 12px; cursor: pointer; }
  #captcha-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .captcha-btn {
    padding: 8px 20px; background: #2a2a4e; color: #f0e68c; border: 2px solid #4a4a6e;
    font-family: monospace; font-size: 14px; cursor: pointer; transition: background 0.15s;
  }
  .captcha-btn:hover { background: #3a3a5e; }
  /* Newspaper */
  #news-overlay {
    position: fixed; inset: 0; z-index: 25; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75);
  }
  #news-overlay.active { display: flex; }
  #dialogue-overlay {
    position: fixed; inset: 0; z-index: 25; display: none;
    flex-direction: column; align-items: center; justify-content: flex-end;
    background: rgba(0,0,0,0.5); padding-bottom: 40px;
  }
  #dialogue-overlay.active { display: flex; }
  #dialogue-box {
    background: #1a1a2e; border: 2px solid #4a7; border-radius: 8px;
    padding: 16px; max-width: 500px; width: 90%; position: relative;
    font-family: monospace; color: #e0e0e0;
  }
  #dialogue-name {
    position: absolute; top: -14px; left: 16px;
    background: #4a7; color: #1a1a2e; padding: 2px 10px;
    font-weight: bold; font-size: 13px; border-radius: 4px;
  }
  #dialogue-portrait {
    float: left; width: 56px; height: 56px; margin-right: 12px;
    background: #222; border: 1px solid #4a7; border-radius: 4px;
  }
  #dialogue-text { font-size: 14px; line-height: 1.5; min-height: 56px; }
  #dialogue-dismiss {
    text-align: right; color: #888; font-size: 11px; margin-top: 8px;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="level">Level 1</div>
  <div id="goal">Light all torches with fire breath!</div>
</div>
<canvas id="game"></canvas>
<div id="controls">Arrow keys: Move &nbsp;|&nbsp; Space: Breathe fire &nbsp;|&nbsp; R: Restart &nbsp;|&nbsp; Esc: Pause</div>

<!-- Overlays -->
<div id="levelselect-overlay" class="overlay">
  <h1>Select Level</h1>
  <div id="levelselect-packname"></div>
  <div id="levelselect-grid"></div>
  <button class="menu-btn" onclick="goMainMenu()">Back to Menu</button>
</div>

<div id="pause-overlay" class="overlay transparent">
  <h1>Paused</h1>
  <button class="menu-btn" onclick="resumeGame()">Resume</button>
  <button class="menu-btn" onclick="restartLevel()">Restart Level</button>
  <button class="menu-btn" onclick="showLevelSelect()">Level Select</button>
  <button class="menu-btn" onclick="goMainMenu()">Main Menu</button>
</div>

<div id="packbrowser-overlay" class="overlay">
  <h1>Custom Campaigns</h1>
  <div id="pack-list"></div>
  <div id="pack-paste">
    <input type="text" id="share-code-input" placeholder="Paste share code...">
    <button class="menu-btn small" onclick="loadShareCode()">Load</button>
  </div>
  <button class="menu-btn" onclick="goMainMenu()">Back to Menu</button>
</div>

<div id="win-overlay" class="overlay transparent">
  <h1 id="win-title">Level Complete!</h1>
  <button class="menu-btn green" id="win-next-btn" onclick="nextLevel()">Next Level</button>
  <button class="menu-btn" onclick="showLevelSelect()">Level Select</button>
</div>

<div id="death-overlay" class="overlay transparent">
  <h1 style="color:#f44">You Died!</h1>
  <button class="menu-btn" onclick="restartLevel()">Retry</button>
  <button class="menu-btn" onclick="showLevelSelect()">Level Select</button>
</div>

<div id="console-overlay">
  <div id="console-log"></div>
  <div id="console-input-row" style="position:relative">
    <div id="console-autocomplete"></div>
    <span id="console-prompt">&gt;</span>
    <input id="console-input" type="text" spellcheck="false" autocomplete="off">
  </div>
</div>

<div id="dragamon-overlay">
  <div id="dragamon-msg"></div>
  <canvas id="dragamon-canvas" width="400" height="200"></canvas>
  <div id="dragamon-actions"></div>
</div>

<div id="captcha-overlay">
  <div id="captcha-title"></div>
  <canvas id="captcha-canvas" width="300" height="300"></canvas>
  <div id="captcha-actions"></div>
</div>

<div id="news-overlay">
  <canvas id="news-canvas" width="340" height="460"></canvas>
  <button class="captcha-btn" style="margin-top:12px" id="news-close-btn">Close</button>
</div>

<div id="dialogue-overlay">
  <div id="dialogue-box">
    <div id="dialogue-name">Dragon</div>
    <canvas id="dialogue-portrait" width="56" height="56"></canvas>
    <div id="dialogue-text"></div>
    <div id="dialogue-dismiss">Press E or click to close</div>
  </div>
</div>

<script src="levels.js"></script>
<script src="sounds.js"></script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let TILE = 48;
{ const _savedSize = sessionStorage.getItem('dragonTileSize'); if (_savedSize) TILE = parseInt(_savedSize, 10) || 48; }
const COLS = 12;
const ROWS = 10;
canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

// Skin system
const SKIN_DEFAULT = { body: '#3a7d44', belly: '#6abf69', wings: '#6a3d7d', eyes: '#ff4444', horns: '#c4a35a' };
let _skinData; try { _skinData = JSON.parse(localStorage.dragonSkin); } catch(e) {}
if (!_skinData) _skinData = {};
const skinColors = _skinData.parts ? { ..._skinData.parts } : { ...SKIN_DEFAULT };
['body','belly','wings','eyes','horns'].forEach(p => { if (!skinColors[p]) skinColors[p] = SKIN_DEFAULT[p]; });
const weaponMode = _skinData.weapon === 'gun' ? 'gun' : 'fire';

// Tile types
const EMPTY = 0, WALL = 1, TORCH_OFF = 2, TORCH_ON = 3, ICE = 4, MIRROR_NE = 5, MIRROR_NW = 6, EXIT = 7, GRATE = 8, PUSH_BLOCK = 9, WATER = 10, TOGGLE_OFF = 11, TOGGLE_ON = 12, GATE_OPEN = 13, GATE_CLOSED = 14, LEVER_OFF = 15, LEVER_ON = 16, WATER_DRY = 17, BELT_UP = 18, BELT_RIGHT = 19, BELT_DOWN = 20, BELT_LEFT = 21, PLATE = 22, CRACKED = 23, EYE_OFF = 24, EYE_ON = 25, SKULL = 26, BONES = 27, COBWEB = 28, MUSHROOM = 29, GEAR = 30, PIPE = 31, CRATE = 32, SPIKE = 33, PAPER = 34, DOOR_CLOSED = 35, DOOR_OPEN = 36, RAILWAY = 37, ROAD = 38, LAMPPOST = 39, BENCH = 40, FOUNTAIN = 41, DRAGON_NPC = 42, TRAFFIC_LIGHT = 43, FIRE_HYDRANT = 44, MANHOLE = 45, TRASH_CAN = 46, TRAIN_FRONT = 47, TRAIN_BODY = 48, TRAIN_WINDOW = 49, TRAIN_SEAT = 50, TRAIN_WHEEL = 51, BARREL = 52, SUBWAY_WALL = 53, PLATFORM_EDGE = 54, SUBWAY_SIGN = 55, TURNSTILE = 56, SUBWAY_MAP = 57, SUBWAY_PILLAR = 58;
const ROTATABLE_DECO = new Set([COBWEB, RAILWAY, ROAD, LAMPPOST, BENCH, FOUNTAIN, PIPE, TRAIN_FRONT, TRAIN_BODY, TRAIN_WINDOW, TRAIN_SEAT, TRAIN_WHEEL, PLATFORM_EDGE, SUBWAY_WALL]);

// Theme system
const THEMES = {
  classic:  { floor: '#2a2a3e', floorBorder: '#333350', wall: '#4a4a5e', wallDark: '#3a3a4e', wallLight: '#555570', bg: '#1a1a2e', cracked: '#5a4a3e', crackedDark: '#4a3a2e', crackedLight: '#6a5548' },
  cave:     { floor: '#2e2518', floorBorder: '#3a3020', wall: '#6a5438', wallDark: '#5a4428', wallLight: '#7a6448', bg: '#1a1508', cracked: '#6a5030', crackedDark: '#5a4020', crackedLight: '#7a6040' },
  city:     { floor: '#3a3a3a', floorBorder: '#4a4a4a', wall: '#6a6a6a', wallDark: '#5a5a5a', wallLight: '#7a7a7a', bg: '#1a1a1a', cracked: '#5a5a5a', crackedDark: '#4a4a4a', crackedLight: '#6a6a6a' },
  factory:  { floor: '#282830', floorBorder: '#333340', wall: '#4a4a55', wallDark: '#3a3a45', wallLight: '#5a5a65', bg: '#141418', cracked: '#4a4a50', crackedDark: '#3a3a40', crackedLight: '#5a5a60' },
  forest:   { floor: '#1e2e1a', floorBorder: '#283820', wall: '#3a5a32', wallDark: '#2a4a22', wallLight: '#4a6a42', bg: '#0a1a08', cracked: '#4a5a30', crackedDark: '#3a4a20', crackedLight: '#5a6a40' },
  railway:  { floor: '#2a2420', floorBorder: '#352f28', wall: '#5a4a3a', wallDark: '#4a3a2a', wallLight: '#6a5a4a', bg: '#1a1410', cracked: '#5a4830', crackedDark: '#4a3820', crackedLight: '#6a5840' },
};
let currentTheme = THEMES.classic;

// Layer helpers
function cellToLayers(val) {
  if (Array.isArray(val)) { while (val.length < 5) val.push(0); return val; }
  if (val === 0) return [0, 0, 0, 0, 0];
  if (val === WATER || val === ICE || val === WATER_DRY || (val >= BELT_UP && val <= BELT_LEFT) || val === PLATE || val === SPIKE) return [val, 0, 0, 0, 0];
  if (val === WALL || val === PUSH_BLOCK || val === MIRROR_NE || val === MIRROR_NW || val === GRATE || val === GATE_OPEN || val === GATE_CLOSED || val === CRACKED || val === DOOR_CLOSED || val === DOOR_OPEN) return [0, val, 0, 0, 0];
  if (val === TORCH_OFF || val === TORCH_ON || val === TOGGLE_OFF || val === TOGGLE_ON || val === LEVER_OFF || val === LEVER_ON || val === EYE_OFF || val === EYE_ON) return [0, 0, val, 0, 0];
  if ((val >= SKULL && val <= CRATE) || val === PAPER || (val >= RAILWAY && val <= SUBWAY_PILLAR)) return [0, 0, 0, val, 0];
  return [0, 0, 0, 0, 0];
}

// Pack migration
function migratePack(p) {
  const v = p.version || 1;
  if (v < 2) {
    p.levels.forEach(lvl => {
      if (!lvl.cols) lvl.cols = lvl.map[0] ? lvl.map[0].length : 12;
      if (!lvl.rows) lvl.rows = lvl.map.length || 10;
    });
  }
  if (v < 3) {
    p.levels.forEach(lvl => {
      if (lvl.maxFire === undefined) lvl.maxFire = 0;
    });
  }
  if (v < 4) {
    p.levels.forEach(lvl => {
      lvl.map = lvl.map.map(row => row.map(cellToLayers));
    });
  }
  if (v < 5) {
    p.levels.forEach(lvl => {
      lvl.map.forEach(row => row.forEach(c => { if (c.length < 4) c.push(0); }));
    });
  }
  if (v < 6) {
    p.levels.forEach(lvl => {
      lvl.map.forEach(row => row.forEach(c => { if (c.length < 5) c.push(0); }));
    });
  }
  p.version = 6;
  return p;
}

// Check for custom level pack from editor or share code in URL
let activeLevels = levels;
let packName = '';
const params = new URLSearchParams(window.location.search);
const isCustomMode = params.get('mode') === 'custom';

(function loadCustomPack() {
  // Load from localStorage (editor "Play in Game")
  if (params.get('pack') === 'custom') {
    try {
      const data = migratePack(JSON.parse(localStorage.getItem('dragonPuzzleActivePack')));
      if (data && data.levels && data.levels.length) {
        activeLevels = data.levels;
        packName = data.name || 'Custom';
      }
    } catch(e) {}
  }
  // Load from URL hash (shared link)
  if (window.location.hash.startsWith('#DRAGONPACK:')) {
    try {
      const json = decodeURIComponent(escape(atob(window.location.hash.slice(12))));
      const data = migratePack(JSON.parse(json));
      if (data && data.levels && data.levels.length) {
        activeLevels = data.levels;
        packName = data.name || 'Shared';
      }
    } catch(e) {}
  }
})();

// Game state
let gameState = 'levelselect'; // 'levelselect' | 'playing' | 'paused' | 'packbrowser' | 'win' | 'death'
let currentLevel = 0;
let map, player, fireParticles, animFrame, facing;
let gameCols = COLS, gameRows = ROWS;
let pendingEffects = [];
let visualOverrides = [];
let maxFire = 0; // 0 = unlimited
let fireUsed = 0;
let pressedPlates = new Set();
let beltCargo = {}; // ice riding on belts: {"x,y": tileId}
let undoState = null; // snapshot for undo command

function saveUndo() {
  undoState = {
    map: map.map(r => r.map(c => [...c])),
    px: player.x, py: player.y,
    fx: facing.x, fy: facing.y,
    fireUsed: fireUsed,
    plates: new Set(pressedPlates),
    cargo: Object.assign({}, beltCargo)
  };
}

function deepCopy(arr) { return arr.map(r => r.map(c => Array.isArray(c) ? [...c] : c)); }

function tryPush(bx, by, dx, dy) {
  const nx = bx + dx, ny = by + dy;
  if (nx < 0 || nx >= gameCols || ny < 0 || ny >= gameRows) return false;
  const src = map[by][bx], dest = map[ny][nx];
  const srcKey = bx + ',' + by;
  const destKey = nx + ',' + ny;
  // Determine what's being pushed: PUSH_BLOCK, ICE in map, or ICE in beltCargo
  let pl, isCargo = false;
  if (src[1] === PUSH_BLOCK) pl = 1;
  else if (src[0] === ICE) pl = 0;
  else if (beltCargo[srcKey]) { pl = 0; isCargo = true; }
  else return false;
  // Dest must not have blocking structure, existing ice, or belt cargo
  if (dest[1] !== 0) return false;
  if (dest[0] === ICE || beltCargo[destKey]) return false;
  // Push ice onto a belt → store as cargo instead of overwriting belt
  if (pl === 0 && dest[0] >= BELT_UP && dest[0] <= BELT_LEFT) {
    beltCargo[destKey] = ICE;
  } else {
    if (dest[pl] !== 0) return false;
    dest[pl] = isCargo ? ICE : src[pl];
  }
  // Clear source
  if (isCargo) delete beltCargo[srcKey];
  else src[pl] = 0;
  return true;
}

function tickBelts() {
  const moved = new Set();
  for (let r = 0; r < gameRows; r++)
    for (let c = 0; c < gameCols; c++) {
      const g = map[r][c][0];
      if (g < BELT_UP || g > BELT_LEFT) continue;
      const dir = [[0,-1],[1,0],[0,1],[-1,0]][g - BELT_UP];
      const nx = c + dir[0], ny = r + dir[1];
      if (nx < 0 || nx >= gameCols || ny < 0 || ny >= gameRows) continue;
      if (player.x === c && player.y === r) continue;
      const dest = map[ny][nx];
      const cargoKey = c + ',' + r;
      const destKey = nx + ',' + ny;
      if (player.x === nx && player.y === ny) continue;
      if (moved.has(cargoKey)) continue;

      if (map[r][c][1] === PUSH_BLOCK) {
        if (dest[1] !== 0 || dest[0] === ICE || beltCargo[destKey]) continue;
        dest[1] = PUSH_BLOCK;
        map[r][c][1] = 0;
        moved.add(destKey);
      } else if (beltCargo[cargoKey]) {
        if (dest[1] !== 0 || beltCargo[destKey]) continue;
        if (dest[0] >= BELT_UP && dest[0] <= BELT_LEFT) {
          beltCargo[destKey] = beltCargo[cargoKey];
        } else if (dest[0] === 0) {
          dest[0] = beltCargo[cargoKey];
        } else {
          continue;
        }
        delete beltCargo[cargoKey];
        moved.add(destKey);
      }
    }
}

let levelConnections = [];
let levelCellProps = {};

function loadLevel(n) {
  const lvl = activeLevels[n];
  // Migrate cells to layer format on the fly (handles both old int and new array formats)
  map = lvl.map.map(r => r.map(c => Array.isArray(c) ? [...c] : cellToLayers(c)));
  player = { x: lvl.start[0], y: lvl.start[1] };
  facing = { x: 1, y: 0 };
  fireParticles = [];
  pendingEffects = [];
  visualOverrides = [];
  beltCargo = {};
  levelConnections = (lvl.connections || []).map(c => ({ from: [...c.from], to: [...c.to] }));
  levelCellProps = {};
  if (lvl.cellProps) Object.keys(lvl.cellProps).forEach(k => { levelCellProps[k] = { ...lvl.cellProps[k] }; });
  gameCols = lvl.cols || lvl.map[0].length;
  gameRows = lvl.rows || lvl.map.length;
  maxFire = lvl.maxFire || 0;
  fireUsed = 0;
  canvas.width = gameCols * TILE;
  canvas.height = gameRows * TILE;
  const fireInfo = maxFire > 0 ? ` (${maxFire} fires)` : '';
  const lvlName = lvl.name ? ` - ${lvl.name}` : '';
  document.getElementById('level').textContent = `${packName ? packName + ' - ' : ''}Level ${n + 1} / ${activeLevels.length}${lvlName}${fireInfo}`;
  document.getElementById('goal').textContent = packName ? `Pack: ${packName}` : 'Light all torches with fire breath!';
  winTimer = 0;
  pressedPlates = new Set();
  cheated = false;
  noclipOn = false;
  godMode = false;
  discoMode = false;
  drunkMode = false;
  drunkAllMoves = true;
  paintMode = false;
  paintTrail = [];
  highlightConns = false;
  undoState = null;
  canvas.style.border = '2px solid #444'; // reset CSS border
  currentTheme = THEMES[lvl.theme] || THEMES.classic;
  applyInitialPower();
  initPlates();
  updateFacingForEyes();
  updateDoors();
  // Check level if-rules
  checkIfRules();
}

function applyInitialPower() {
  // Phase 0: startsActive eyes
  for (let r = 0; r < gameRows; r++)
    for (let c = 0; c < gameCols; c++) {
      const props = levelCellProps[c + ',' + r] || {};
      if (props.startsActive && map[r][c][2] === EYE_OFF) map[r][c][2] = EYE_ON;
    }
  for (let r = 0; r < gameRows; r++) {
    for (let c = 0; c < gameCols; c++) {
      const o = map[r][c][2];
      if (o === TOGGLE_ON || o === LEVER_ON) {
        const conns = getConnectionsFrom(c, r);
        conns.forEach(conn => {
          const tx = conn.to[0], ty = conn.to[1];
          const cell = map[ty][tx];
          const props = levelCellProps[tx + ',' + ty] || {};
          const reverse = !!props.reverse;
          if (cell[1] === GATE_OPEN || cell[1] === GATE_CLOSED) {
            cell[1] = reverse ? GATE_OPEN : GATE_CLOSED;
          } else if (cell[0] === WATER || cell[0] === WATER_DRY) {
            cell[0] = reverse ? WATER_DRY : WATER;
          } else if (cell[2] === EYE_OFF || cell[2] === EYE_ON) {
            cell[2] = reverse ? EYE_OFF : EYE_ON;
          }
        });
      }
      // Plates with push blocks start pressed
      if (map[r][c][0] === PLATE && map[r][c][1] === PUSH_BLOCK) {
        pressedPlates.add(c + ',' + r);
        const conns = getConnectionsFrom(c, r);
        conns.forEach(conn => {
          const tx = conn.to[0], ty = conn.to[1];
          const cell = map[ty][tx];
          const props = levelCellProps[tx + ',' + ty] || {};
          const reverse = !!props.reverse;
          if (cell[1] === GATE_OPEN || cell[1] === GATE_CLOSED) {
            cell[1] = reverse ? GATE_OPEN : GATE_CLOSED;
          } else if (cell[0] === WATER || cell[0] === WATER_DRY) {
            cell[0] = reverse ? WATER_DRY : WATER;
          } else if (cell[2] === EYE_OFF || cell[2] === EYE_ON) {
            cell[2] = reverse ? EYE_OFF : EYE_ON;
          }
        });
      }
    }
  }
}

function initPlates() {
  // Detect plates the player starts on
  for (let r = 0; r < gameRows; r++) {
    for (let c = 0; c < gameCols; c++) {
      if (map[r][c][0] !== PLATE) continue;
      if (player.x === c && player.y === r) {
        pressedPlates.add(c + ',' + r);
      }
    }
  }
}

function updateFacingForEyes() {
  let closestDist = Infinity, ex = 0, ey = 0;
  for (let r = 0; r < gameRows; r++)
    for (let c = 0; c < gameCols; c++)
      if (map[r][c][2] === EYE_ON) {
        const d = Math.abs(c - player.x) + Math.abs(r - player.y);
        if (d > 0 && d < closestDist) { closestDist = d; ex = c; ey = r; }
      }
  if (closestDist < Infinity) {
    const dx = ex - player.x, dy = ey - player.y;
    facing = Math.abs(dx) >= Math.abs(dy) ? { x: dx > 0 ? 1 : -1, y: 0 } : { x: 0, y: dy > 0 ? 1 : -1 };
  }
}

function updatePlates() {
  const newPressed = new Set();
  for (let r = 0; r < gameRows; r++) {
    for (let c = 0; c < gameCols; c++) {
      if (map[r][c][0] !== PLATE) continue;
      const isPlayer = (player.x === c && player.y === r);
      const hasPushBlock = (map[r][c][1] === PUSH_BLOCK);
      if (isPlayer || hasPushBlock) newPressed.add(c + ',' + r);
    }
  }
  for (const key of newPressed) {
    if (!pressedPlates.has(key)) {
      const [x, y] = key.split(',').map(Number);
      activateConnections(x, y, 'toggle_on');
    }
  }
  for (const key of pressedPlates) {
    if (!newPressed.has(key)) {
      const [x, y] = key.split(',').map(Number);
      activateConnections(x, y, 'toggle_off');
    }
  }
  pressedPlates = newPressed;
}

// --- DRAWING ---

function drawDragon(px, py, facingX, facingY) {
  const x = px * TILE;
  const y = py * TILE;
  const s = TILE;

  // Body
  ctx.fillStyle = skinColors.body;
  ctx.fillRect(x + s*0.2, y + s*0.25, s*0.6, s*0.55);

  // Belly
  ctx.fillStyle = skinColors.belly;
  ctx.fillRect(x + s*0.3, y + s*0.4, s*0.4, s*0.35);

  // Head
  const hx = x + s*0.5 + facingX * s*0.2;
  const hy = y + s*0.25 + facingY * s*0.15;
  ctx.fillStyle = skinColors.body;
  ctx.beginPath();
  ctx.arc(hx, hy, s*0.2, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = skinColors.eyes;
  const ex1 = hx + facingX*s*0.06 - facingY*s*0.08;
  const ey1 = hy + facingY*s*0.06 + facingX*s*0.08;
  const ex2 = hx + facingX*s*0.06 + facingY*s*0.08;
  const ey2 = hy + facingY*s*0.06 - facingX*s*0.08;
  ctx.beginPath(); ctx.arc(ex1, ey1, s*0.04, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, ey2, s*0.04, 0, Math.PI*2); ctx.fill();

  // Wings
  ctx.fillStyle = skinColors.wings;
  if (facingX !== 0) {
    // Side-facing wings (top)
    ctx.beginPath();
    ctx.moveTo(x + s*0.3, y + s*0.3);
    ctx.lineTo(x + s*0.5, y + s*0.05);
    ctx.lineTo(x + s*0.7, y + s*0.3);
    ctx.fill();
  } else {
    // Front/back wings (sides)
    ctx.beginPath();
    ctx.moveTo(x + s*0.15, y + s*0.3);
    ctx.lineTo(x - s*0.05, y + s*0.15);
    ctx.lineTo(x + s*0.2, y + s*0.5);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + s*0.85, y + s*0.3);
    ctx.lineTo(x + s*1.05, y + s*0.15);
    ctx.lineTo(x + s*0.8, y + s*0.5);
    ctx.fill();
  }

  // Tail
  ctx.strokeStyle = skinColors.body;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x + s*0.5 - facingX*s*0.3, y + s*0.7 - facingY*s*0.2);
  ctx.quadraticCurveTo(
    x + s*0.5 - facingX*s*0.55, y + s*0.8 - facingY*s*0.3,
    x + s*0.5 - facingX*s*0.45, y + s*0.9 - facingY*s*0.15
  );
  ctx.stroke();

  // Horns
  ctx.fillStyle = skinColors.horns;
  ctx.beginPath();
  ctx.moveTo(hx - s*0.08, hy - s*0.12);
  ctx.lineTo(hx - s*0.04, hy - s*0.25);
  ctx.lineTo(hx + s*0.02, hy - s*0.12);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(hx + s*0.04, hy - s*0.12);
  ctx.lineTo(hx + s*0.1, hy - s*0.25);
  ctx.lineTo(hx + s*0.14, hy - s*0.12);
  ctx.fill();
}

function drawWall(gx, gy) {
  const x = gx * TILE, y = gy * TILE;
  ctx.fillStyle = currentTheme.wall;
  ctx.fillRect(x, y, TILE, TILE);
  ctx.fillStyle = currentTheme.wallDark;
  ctx.fillRect(x+2, y+2, TILE/2-3, TILE/2-3);
  ctx.fillRect(x+TILE/2+1, y+TILE/2+1, TILE/2-3, TILE/2-3);
  ctx.fillStyle = currentTheme.wallLight;
  ctx.fillRect(x+TILE/2+1, y+2, TILE/2-3, TILE/2-3);
  ctx.fillRect(x+2, y+TILE/2+1, TILE/2-3, TILE/2-3);
}

function drawTorch(gx, gy, lit) {
  const x = gx*TILE + TILE/2, y = gy*TILE + TILE/2;
  // Base
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(x-3, y-8, 6, 20);
  // Bowl
  ctx.fillStyle = '#a07818';
  ctx.fillRect(x-8, y-10, 16, 6);
  if (lit) {
    // Flame glow
    ctx.fillStyle = 'rgba(255,150,0,0.15)';
    ctx.beginPath(); ctx.arc(x, y-14, 18, 0, Math.PI*2); ctx.fill();
    // Flame
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(x-6, y-10);
    ctx.quadraticCurveTo(x, y-28 - Math.sin(Date.now()/100)*3, x+6, y-10);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(x-3, y-10);
    ctx.quadraticCurveTo(x, y-22 - Math.sin(Date.now()/120)*2, x+3, y-10);
    ctx.fill();
  }
}

function drawToggleTorch(gx, gy, lit) {
  const x = gx*TILE + TILE/2, y = gy*TILE + TILE/2;
  // Purple base
  ctx.fillStyle = '#4a2a7a';
  ctx.fillRect(x-3, y-8, 6, 20);
  ctx.fillStyle = '#6a3d9e';
  ctx.fillRect(x-8, y-10, 16, 6);
  // Toggle indicator ring
  ctx.strokeStyle = lit ? '#ffcc00' : '#887';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x, y+8, 4, 0, Math.PI*2); ctx.stroke();
  if (lit) {
    ctx.fillStyle = 'rgba(255,150,0,0.15)';
    ctx.beginPath(); ctx.arc(x, y-14, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(x-6, y-10);
    ctx.quadraticCurveTo(x, y-28 - Math.sin(Date.now()/100)*3, x+6, y-10);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(x-3, y-10);
    ctx.quadraticCurveTo(x, y-22 - Math.sin(Date.now()/120)*2, x+3, y-10);
    ctx.fill();
  }
}

function drawLever(gx, gy, on) {
  const x = gx*TILE + TILE/2, y = gy*TILE + TILE/2;
  // Stone base
  ctx.fillStyle = '#5a5a6e';
  ctx.fillRect(x-10, y+4, 20, 8);
  ctx.fillStyle = '#6a6a7e';
  ctx.fillRect(x-8, y+4, 16, 6);
  // Pivot
  ctx.fillStyle = '#888';
  ctx.beginPath(); ctx.arc(x, y+4, 4, 0, Math.PI*2); ctx.fill();
  // Handle
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, y+4);
  if (on) {
    ctx.lineTo(x+10, y-12);
    ctx.stroke();
    ctx.fillStyle = '#e04040';
    ctx.beginPath(); ctx.arc(x+10, y-12, 4, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.lineTo(x-10, y-12);
    ctx.stroke();
    ctx.fillStyle = '#777';
    ctx.beginPath(); ctx.arc(x-10, y-12, 4, 0, Math.PI*2); ctx.fill();
  }
}

function drawEye(gx, gy, active) {
  const x = gx * TILE + TILE / 2, y = gy * TILE + TILE / 2;
  if (active) {
    ctx.fillStyle = 'rgba(170, 68, 255, 0.15)';
    ctx.beginPath(); ctx.arc(x, y, 18, 0, Math.PI * 2); ctx.fill();
  }
  ctx.strokeStyle = active ? '#aa44ff' : '#555';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 14, y);
  ctx.quadraticCurveTo(x, y - 12, x + 14, y);
  ctx.quadraticCurveTo(x, y + 12, x - 14, y);
  ctx.closePath(); ctx.stroke();
  ctx.fillStyle = active ? '#cc66ff' : '#444';
  ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = active ? '#220044' : '#222';
  ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
}

function drawSkull(gx, gy) {
  const x = gx * TILE + TILE / 2, y = gy * TILE + TILE / 2;
  ctx.fillStyle = '#bbb';
  ctx.beginPath(); ctx.arc(x, y - 2, 8, Math.PI, 0); ctx.lineTo(x + 6, y + 6); ctx.lineTo(x - 6, y + 6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = currentTheme.bg;
  ctx.beginPath(); ctx.arc(x - 3, y, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 3, y, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillRect(x - 1, y + 3, 2, 2);
}

function drawBones(gx, gy) {
  const x = gx * TILE + TILE / 2, y = gy * TILE + TILE / 2;
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x - 8, y - 5); ctx.lineTo(x + 8, y + 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 8, y - 5); ctx.lineTo(x - 8, y + 5); ctx.stroke();
  ctx.fillStyle = '#ccc';
  [[-8,-5],[8,-5],[-8,5],[8,5]].forEach(([ox,oy]) => { ctx.beginPath(); ctx.arc(x+ox, y+oy, 2.5, 0, Math.PI*2); ctx.fill(); });
}

function drawCobweb(gx, gy) {
  const x = gx * TILE, y = gy * TILE;
  ctx.strokeStyle = 'rgba(200,200,200,0.35)'; ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 0.5;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + Math.cos(a) * 28, y + Math.sin(a) * 28); ctx.stroke();
  }
  for (let r = 8; r <= 24; r += 8) {
    ctx.beginPath();
    for (let i = 0; i <= 4; i++) { const a = (i / 4) * Math.PI * 0.5; const px = x + Math.cos(a) * r, py = y + Math.sin(a) * r; i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); }
    ctx.stroke();
  }
}

function drawMushroom(gx, gy) {
  const x = gx * TILE + TILE / 2, y = gy * TILE + TILE / 2;
  ctx.fillStyle = '#7a6a50'; ctx.fillRect(x - 2, y, 4, 10);
  ctx.fillStyle = '#c44'; ctx.beginPath(); ctx.arc(x, y, 8, Math.PI, 0); ctx.fill();
  ctx.fillStyle = '#fcc';
  ctx.beginPath(); ctx.arc(x - 3, y - 3, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 4, y - 2, 1.5, 0, Math.PI * 2); ctx.fill();
}

function drawGear(gx, gy) {
  const x = gx * TILE + TILE / 2, y = gy * TILE + TILE / 2;
  const t = Date.now() / 2000;
  ctx.save(); ctx.translate(x, y); ctx.rotate(t);
  ctx.fillStyle = '#777';
  ctx.beginPath();
  const teeth = 12;
  for (let i = 0; i < teeth; i++) {
    const a = (i / teeth) * Math.PI * 2, r = i % 2 === 0 ? 11 : 8;
    i === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawPipe(gx, gy) {
  const x = gx * TILE + TILE / 2, y = gy * TILE;
  ctx.fillStyle = '#444'; ctx.fillRect(x - 5, y + 4, 10, TILE - 8);
  ctx.fillStyle = '#555'; ctx.fillRect(x - 7, y + 4, 14, 4); ctx.fillRect(x - 7, y + TILE - 8, 14, 4);
  ctx.fillStyle = '#333'; ctx.fillRect(x - 3, y + 10, 6, TILE - 20);
}

function drawCrate(gx, gy) {
  const x = gx * TILE + 6, y = gy * TILE + 6, s = TILE - 12;
  ctx.fillStyle = '#5a4a2a'; ctx.fillRect(x, y, s, s);
  ctx.fillStyle = '#6a5a3a'; ctx.fillRect(x + 2, y + 2, s - 4, s - 4);
  ctx.strokeStyle = '#4a3a1a'; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, s, s);
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + s, y + s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + s, y); ctx.lineTo(x, y + s); ctx.stroke();
}

function drawPaper(gx, gy) {
  const x = gx * TILE + 8, y = gy * TILE + 4, w = TILE - 16, h = TILE - 8;
  // Page
  ctx.fillStyle = '#f5e6c8'; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#8b7355'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
  // Lines of text
  ctx.fillStyle = '#6b5b45';
  for (let i = 0; i < 4; i++) {
    const lw = i === 0 ? w * 0.7 : (i === 3 ? w * 0.5 : w * 0.8);
    ctx.fillRect(x + 3, y + 5 + i * 6, lw, 1.5);
  }
  // Corner fold
  ctx.fillStyle = '#e0d0b0';
  ctx.beginPath(); ctx.moveTo(x + w - 5, y); ctx.lineTo(x + w, y + 5); ctx.lineTo(x + w, y); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#8b7355'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(x + w - 5, y); ctx.lineTo(x + w, y + 5); ctx.stroke();
}

function drawRailway(gx, gy) {
  const x = gx * TILE, y = gy * TILE;
  // Sleepers (wooden ties)
  ctx.fillStyle = '#5a4a3a';
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(x + 4 + i * 12, y + 6, 8, TILE - 12);
  }
  // Rails
  ctx.fillStyle = '#888';
  ctx.fillRect(x + 2, y + 12, TILE - 4, 3);
  ctx.fillRect(x + 2, y + TILE - 15, TILE - 4, 3);
  // Rail highlights
  ctx.fillStyle = '#aaa';
  ctx.fillRect(x + 2, y + 12, TILE - 4, 1);
  ctx.fillRect(x + 2, y + TILE - 15, TILE - 4, 1);
}

function drawRoad(gx, gy) {
  const x = gx * TILE, y = gy * TILE;
  // Pavement
  ctx.fillStyle = '#4a4a4a';
  ctx.fillRect(x, y, TILE, TILE);
  // Cobblestone pattern
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const ox = x + 2 + c * 16 + (r % 2 ? 8 : 0);
      const oy = y + 2 + r * 16;
      ctx.strokeRect(ox, oy, 14, 14);
    }
  }
  // Center line dashes
  ctx.fillStyle = '#666';
  ctx.fillRect(x + TILE / 2 - 1, y + 2, 2, 10);
  ctx.fillRect(x + TILE / 2 - 1, y + TILE - 12, 2, 10);
}

function drawLamppost(gx, gy) {
  const x = gx * TILE + TILE / 2, y = gy * TILE;
  // Glow
  ctx.fillStyle = 'rgba(255,220,100,0.12)';
  ctx.beginPath(); ctx.arc(x, y + 8, 18, 0, Math.PI * 2); ctx.fill();
  // Post
  ctx.fillStyle = '#333';
  ctx.fillRect(x - 2, y + 10, 4, TILE - 10);
  // Base
  ctx.fillStyle = '#444';
  ctx.fillRect(x - 6, y + TILE - 4, 12, 4);
  // Lantern
  ctx.fillStyle = '#553';
  ctx.fillRect(x - 5, y + 4, 10, 8);
  // Light
  ctx.fillStyle = '#ffcc44';
  ctx.fillRect(x - 3, y + 5, 6, 5);
  // Top
  ctx.fillStyle = '#444';
  ctx.fillRect(x - 6, y + 3, 12, 2);
  ctx.beginPath(); ctx.moveTo(x - 4, y + 3); ctx.lineTo(x, y); ctx.lineTo(x + 4, y + 3); ctx.fill();
}

function drawBench(gx, gy) {
  const x = gx * TILE, y = gy * TILE;
  // Legs
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(x + 6, y + TILE / 2, 3, TILE / 2 - 2);
  ctx.fillRect(x + TILE - 9, y + TILE / 2, 3, TILE / 2 - 2);
  // Seat
  ctx.fillStyle = '#8a6a3a';
  ctx.fillRect(x + 4, y + TILE / 2 - 2, TILE - 8, 4);
  // Back slats
  ctx.fillStyle = '#7a5a2a';
  ctx.fillRect(x + 4, y + TILE / 2 - 10, TILE - 8, 3);
  ctx.fillRect(x + 4, y + TILE / 2 - 6, TILE - 8, 3);
  // Back supports
  ctx.fillStyle = '#5a4020';
  ctx.fillRect(x + 6, y + TILE / 2 - 12, 3, 12);
  ctx.fillRect(x + TILE - 9, y + TILE / 2 - 12, 3, 12);
}

function drawFountain(gx, gy) {
  const x = gx * TILE + TILE / 2, y = gy * TILE + TILE / 2;
  // Basin
  ctx.fillStyle = '#6a6a7a';
  ctx.beginPath(); ctx.ellipse(x, y + 6, TILE / 2 - 4, 8, 0, 0, Math.PI * 2); ctx.fill();
  // Water in basin
  ctx.fillStyle = '#3a7abf';
  ctx.beginPath(); ctx.ellipse(x, y + 6, TILE / 2 - 7, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Center column
  ctx.fillStyle = '#7a7a8a';
  ctx.fillRect(x - 3, y - 6, 6, 12);
  // Water jet (animated)
  const t = Date.now() / 200;
  ctx.strokeStyle = '#5aaaee';
  ctx.lineWidth = 1.5;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(x + i * 2, y - 6);
    ctx.quadraticCurveTo(x + i * 4, y - 14 - Math.sin(t + i) * 3, x + i * 6, y + 2);
    ctx.stroke();
  }
  // Rim
  ctx.strokeStyle = '#555568';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(x, y + 6, TILE / 2 - 4, 8, 0, 0, Math.PI * 2); ctx.stroke();
}

function npcColorPalette(body) {
  // Parse hex to RGB, derive belly (lighter), wings (darker/shifted)
  const r = parseInt(body.slice(1,3),16), g = parseInt(body.slice(3,5),16), b = parseInt(body.slice(5,7),16);
  const belly = '#' + [Math.min(r+60,255),Math.min(g+60,255),Math.min(b+60,255)].map(v=>v.toString(16).padStart(2,'0')).join('');
  const wings = '#' + [Math.max(r-30,0)+50,Math.max(g-60,0),Math.max(b+40,0)].map(v=>Math.min(v,255).toString(16).padStart(2,'0')).join('');
  return { body, belly, wings, eyes: '#ff4444', horns: '#c4a35a' };
}

function drawDragonNPC(gx, gy, facingX, facingY, bodyColor) {
  const colors = npcColorPalette(bodyColor || '#3a7d44');
  const x = gx * TILE;
  const y = gy * TILE;
  const s = TILE;
  const fx = facingX || 1, fy = facingY || 0;

  // Body
  ctx.fillStyle = colors.body;
  ctx.fillRect(x + s*0.2, y + s*0.25, s*0.6, s*0.55);
  // Belly
  ctx.fillStyle = colors.belly;
  ctx.fillRect(x + s*0.3, y + s*0.4, s*0.4, s*0.35);
  // Head
  const hx = x + s*0.5 + fx * s*0.2;
  const hy = y + s*0.25 + fy * s*0.15;
  ctx.fillStyle = colors.body;
  ctx.beginPath(); ctx.arc(hx, hy, s*0.2, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = colors.eyes;
  const ex1 = hx + fx*s*0.06 - fy*s*0.08;
  const ey1 = hy + fy*s*0.06 + fx*s*0.08;
  const ex2 = hx + fx*s*0.06 + fy*s*0.08;
  const ey2 = hy + fy*s*0.06 - fx*s*0.08;
  ctx.beginPath(); ctx.arc(ex1, ey1, s*0.04, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, ey2, s*0.04, 0, Math.PI*2); ctx.fill();
  // Wings
  ctx.fillStyle = colors.wings;
  if (fx !== 0) {
    ctx.beginPath(); ctx.moveTo(x+s*0.3, y+s*0.3); ctx.lineTo(x+s*0.5, y+s*0.05); ctx.lineTo(x+s*0.7, y+s*0.3); ctx.fill();
  } else {
    ctx.beginPath(); ctx.moveTo(x+s*0.15, y+s*0.3); ctx.lineTo(x-s*0.05, y+s*0.15); ctx.lineTo(x+s*0.2, y+s*0.5); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+s*0.85, y+s*0.3); ctx.lineTo(x+s*1.05, y+s*0.15); ctx.lineTo(x+s*0.8, y+s*0.5); ctx.fill();
  }
  // Tail
  ctx.strokeStyle = colors.body; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x+s*0.5-fx*s*0.3, y+s*0.7-fy*s*0.2);
  ctx.quadraticCurveTo(x+s*0.5-fx*s*0.55, y+s*0.8-fy*s*0.3, x+s*0.5-fx*s*0.45, y+s*0.9-fy*s*0.15);
  ctx.stroke();
  // Horns
  ctx.fillStyle = colors.horns;
  ctx.beginPath(); ctx.moveTo(hx-s*0.08, hy-s*0.12); ctx.lineTo(hx-s*0.04, hy-s*0.25); ctx.lineTo(hx+s*0.02, hy-s*0.12); ctx.fill();
  ctx.beginPath(); ctx.moveTo(hx+s*0.04, hy-s*0.12); ctx.lineTo(hx+s*0.1, hy-s*0.25); ctx.lineTo(hx+s*0.14, hy-s*0.12); ctx.fill();
  // Speech indicator
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '10px monospace'; ctx.textAlign = 'center';
  ctx.fillText('...', hx, hy - s*0.28);
}

function drawTrafficLight(gx, gy) {
  const x = gx * TILE + TILE / 2, y = gy * TILE;
  // Post
  ctx.fillStyle = '#444';
  ctx.fillRect(x - 2, y + TILE * 0.55, 4, TILE * 0.45);
  // Housing
  ctx.fillStyle = '#333';
  ctx.fillRect(x - 7, y + 2, 14, TILE * 0.55);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.strokeRect(x - 7, y + 2, 14, TILE * 0.55);
  // Lights: red, yellow, green
  const colors = ['#ff2222', '#ffcc00', '#22cc44'];
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = colors[i];
    ctx.beginPath(); ctx.arc(x, y + 8 + i * 7, 3, 0, Math.PI * 2); ctx.fill();
    // Glow on green
    if (i === 2) {
      ctx.fillStyle = 'rgba(34,204,68,0.12)';
      ctx.beginPath(); ctx.arc(x, y + 8 + i * 7, 8, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawFireHydrant(gx, gy) {

function drawManhole(gx, gy) {
  const x = gx * TILE + TILE / 2, y = gy * TILE + TILE / 2;
  // Outer ring
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(x, y, TILE * 0.4, 0, Math.PI * 2); ctx.fill();
  // Inner
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.arc(x, y, TILE * 0.32, 0, Math.PI * 2); ctx.fill();
  // Vertical lines (grate pattern)
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.5;
  for (let i = -2; i <= 2; i++) {
    const lx = x + i * 5;
    const halfH = Math.sqrt(Math.max(0, (TILE * 0.28) ** 2 - (i * 5) ** 2));
    ctx.beginPath(); ctx.moveTo(lx, y - halfH); ctx.lineTo(lx, y + halfH); ctx.stroke();
  }
  // Rim highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(x, y, TILE * 0.38, Math.PI * 1.2, Math.PI * 1.7); ctx.stroke();
}

function drawTrashCan(gx, gy) {

  ctx.lineWidth = 1.5;

}

function drawSubwayWall(gx, gy) {

function drawTurnstile(gx, gy) {
  const x = gx * TILE, y = gy * TILE;
  // Base posts
  ctx.fillStyle = '#666';
  ctx.fillRect(x + 4, y + 4, 6, TILE - 8);
  ctx.fillRect(x + TILE - 10, y + 4, 6, TILE - 8);
  // Top bar
  ctx.fillStyle = '#888';
  ctx.fillRect(x + 4, y + 4, TILE - 8, 4);
  // Turnstile arms
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  const cx = x + TILE / 2, cy = y + TILE / 2;
  for (let i = 0; i < 3; i++) {
    const a = (i / 3) * Math.PI * 2 + Date.now() / 2000;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * 10, cy + Math.sin(a) * 10);
    ctx.stroke();
  }
  // Center hub
  ctx.fillStyle = '#777';
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fill();
}
