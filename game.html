function drawSpike(gx, gy) {
  const x = gx * TILE, y = gy * TILE;
  ctx.fillStyle = '#333';
  ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
  ctx.fillStyle = '#888';
  const cx = x + TILE / 2, cy = y + TILE / 2;
  const spikes = [[0, -10], [7, -5], [10, 0], [7, 7], [0, 10], [-7, 7], [-10, 0], [-7, -5]];
  spikes.forEach(([ox, oy]) => {
    ctx.beginPath();
    ctx.moveTo(cx + ox * 1.1, cy + oy * 1.1);
    ctx.lineTo(cx + ox * 0.3 + oy * 0.3, cy + oy * 0.3 - ox * 0.3);
    ctx.lineTo(cx + ox * 0.3 - oy * 0.3, cy + oy * 0.3 + ox * 0.3);
    ctx.closePath(); ctx.fill();
  });
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
}

function drawMirror(gx, gy, type) {
  const x = gx*TILE, y = gy*TILE;
  ctx.fillStyle = 'rgba(200,200,220,0.2)';
  ctx.fillRect(x+4, y+4, TILE-8, TILE-8);
  ctx.strokeStyle = '#b0b0cc';
  ctx.lineWidth = 3;
  ctx.beginPath();
  if (type === MIRROR_NE) { // reflects: right<->up, left<->down (NE mirror: /)
    ctx.moveTo(x+6, y+TILE-6);
    ctx.lineTo(x+TILE-6, y+6);
  } else { // NW mirror: backslash
    ctx.moveTo(x+6, y+6);
    ctx.lineTo(x+TILE-6, y+TILE-6);
  }
  ctx.stroke();
  // Shine
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  if (type === MIRROR_NE) {
    ctx.beginPath(); ctx.moveTo(x+10, y+TILE-14); ctx.lineTo(x+TILE-14, y+10); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(x+10, y+14); ctx.lineTo(x+TILE-14, y+TILE-10); ctx.stroke();
  }
}

function drawFloor(gx, gy) {
  const x = gx*TILE, y = gy*TILE;
  if (discoMode) {
    const hue = (Date.now() / 10 + gx * 30 + gy * 50) % 360;
    ctx.fillStyle = `hsl(${hue}, 60%, 20%)`;
  } else {
    ctx.fillStyle = currentTheme.floor;
  }
  ctx.fillRect(x, y, TILE, TILE);
  ctx.strokeStyle = discoMode ? `hsl(${(Date.now()/5 + gx*20 + gy*40) % 360}, 80%, 40%)` : currentTheme.floorBorder;
  ctx.lineWidth = 0.5;
  ctx.strokeRect(x, y, TILE, TILE);
}

function drawGrate(gx, gy) {
  const x = gx*TILE, y = gy*TILE;
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  // Vertical bars
  for (let i = 1; i < 5; i++) {
    const bx = x + i * (TILE / 5);
    ctx.beginPath(); ctx.moveTo(bx, y + 2); ctx.lineTo(bx, y + TILE - 2); ctx.stroke();
  }
  // Horizontal bars
  for (let i = 1; i < 4; i++) {
    const by = y + i * (TILE / 4);
    ctx.beginPath(); ctx.moveTo(x + 2, by); ctx.lineTo(x + TILE - 2, by); ctx.stroke();
  }
  // Border
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 3;
  ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
}

function drawPushBlock(gx, gy) {
  const x = gx*TILE, y = gy*TILE;
  ctx.fillStyle = '#7a6a50';
  ctx.fillRect(x+2, y+2, TILE-4, TILE-4);
  ctx.fillStyle = '#8d7b5e';
  ctx.fillRect(x+6, y+6, TILE-12, TILE-12);
  ctx.strokeStyle = '#5a4a30';
  ctx.lineWidth = 2;
  ctx.strokeRect(x+2, y+2, TILE-4, TILE-4);
  // Arrow hints
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath(); ctx.moveTo(x+TILE/2, y+8); ctx.lineTo(x+TILE/2-5, y+16); ctx.lineTo(x+TILE/2+5, y+16); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+TILE/2, y+TILE-8); ctx.lineTo(x+TILE/2-5, y+TILE-16); ctx.lineTo(x+TILE/2+5, y+TILE-16); ctx.fill();
}

function drawWater(gx, gy) {
  const x = gx*TILE, y = gy*TILE;
  // Base water colour
  ctx.fillStyle = '#1a5276';
  ctx.fillRect(x, y, TILE, TILE);
  // Animated wave highlights
  const t = Date.now() / 400;
  ctx.fillStyle = 'rgba(100,180,255,0.25)';
  for (let i = 0; i < 3; i++) {
    const wy = y + 10 + i * 14 + Math.sin(t + gx + i) * 3;
    ctx.beginPath();
    ctx.moveTo(x, wy);
    ctx.quadraticCurveTo(x + TILE*0.25, wy - 5, x + TILE*0.5, wy);
    ctx.quadraticCurveTo(x + TILE*0.75, wy + 5, x + TILE, wy);
    ctx.lineTo(x + TILE, wy + 4);
    ctx.quadraticCurveTo(x + TILE*0.75, wy + 9, x + TILE*0.5, wy + 4);
    ctx.quadraticCurveTo(x + TILE*0.25, wy - 1, x, wy + 4);
    ctx.fill();
  }
  // Border
  ctx.strokeStyle = '#15416d';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, TILE, TILE);
}

function drawWaterDry(gx, gy) {
  const x = gx*TILE, y = gy*TILE;
  ctx.fillStyle = '#1e2e3e';
  ctx.fillRect(x, y, TILE, TILE);
  ctx.strokeStyle = '#253a4a';
  ctx.lineWidth = 1;
  // Cracked lines
  ctx.strokeStyle = '#2a3a50';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(x+8, y+6); ctx.lineTo(x+20, y+18); ctx.lineTo(x+14, y+30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+30, y+10); ctx.lineTo(x+36, y+24); ctx.lineTo(x+28, y+38); ctx.stroke();
  ctx.strokeStyle = '#15263a';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, TILE, TILE);
}

function drawGate(gx, gy, closed) {
  const x = gx * TILE, y = gy * TILE;
  if (closed) {
    ctx.fillStyle = '#5a3030';
    ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
    ctx.strokeStyle = '#8a4444';
    ctx.lineWidth = 3;
    for (let i = 1; i < 5; i++) {
      const bx = x + i * (TILE / 5);
      ctx.beginPath(); ctx.moveTo(bx, y + 2); ctx.lineTo(bx, y + TILE - 2); ctx.stroke();
    }
    ctx.strokeStyle = '#7a3838';
    ctx.lineWidth = 2;
    for (let i = 1; i < 4; i++) {
      const by = y + i * (TILE / 4);
      ctx.beginPath(); ctx.moveTo(x + 2, by); ctx.lineTo(x + TILE - 2, by); ctx.stroke();
    }
    ctx.strokeStyle = '#6a3030';
    ctx.lineWidth = 3;
    ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
  } else {
    ctx.fillStyle = '#3a3040';
    ctx.fillRect(x + 2, y + 2, TILE - 4, 4);
    ctx.fillRect(x + 2, y + TILE - 6, TILE - 4, 4);
  }
}

function drawBelt(gx, gy, dir) {
  const x = gx * TILE, y = gy * TILE;
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(x, y, TILE, TILE);
  ctx.fillStyle = '#333344';
  ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
  const t = (Date.now() / 200) % 14;
  ctx.fillStyle = '#5a5a70';
  ctx.save();
  ctx.beginPath();
  ctx.rect(x + 2, y + 2, TILE - 4, TILE - 4);
  ctx.clip();
  const isVert = (dir === BELT_UP || dir === BELT_DOWN);
  const sign = (dir === BELT_DOWN || dir === BELT_RIGHT) ? 1 : -1;
  for (let i = -1; i < 5; i++) {
    if (isVert) {
      const cy = y + i * 14 + t * sign;
      ctx.beginPath();
      if (dir === BELT_UP) {
        ctx.moveTo(x + 6, cy + 8); ctx.lineTo(x + TILE/2, cy); ctx.lineTo(x + TILE - 6, cy + 8);
      } else {
        ctx.moveTo(x + 6, cy); ctx.lineTo(x + TILE/2, cy + 8); ctx.lineTo(x + TILE - 6, cy);
      }
      ctx.closePath(); ctx.fill();
    } else {
      const cx = x + i * 14 + t * sign;
      ctx.beginPath();
      if (dir === BELT_LEFT) {
        ctx.moveTo(cx + 8, y + 6); ctx.lineTo(cx, y + TILE/2); ctx.lineTo(cx + 8, y + TILE - 6);
      } else {
        ctx.moveTo(cx, y + 6); ctx.lineTo(cx + 8, y + TILE/2); ctx.lineTo(cx, y + TILE - 6);
      }
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.restore();
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, TILE, TILE);
}

function drawPlate(gx, gy, pressed) {
  const x = gx * TILE, y = gy * TILE;
  drawFloor(gx, gy);
  const inset = pressed ? 8 : 6;
  ctx.fillStyle = pressed ? '#6a6a50' : '#8a8a6a';
  ctx.fillRect(x + inset, y + inset, TILE - inset*2, TILE - inset*2);
  ctx.strokeStyle = pressed ? '#5a5a40' : '#9a9a7a';
  ctx.lineWidth = pressed ? 1 : 2;
  ctx.strokeRect(x + inset, y + inset, TILE - inset*2, TILE - inset*2);
  ctx.fillStyle = pressed ? '#8a8a60' : '#aaa880';
  ctx.beginPath();
  ctx.arc(x + TILE/2, y + TILE/2, pressed ? 3 : 4, 0, Math.PI*2);
  ctx.fill();
}

function drawCrackedWall(gx, gy) {
  const x = gx * TILE, y = gy * TILE;
  // Brownish base to distinguish from normal walls
  ctx.fillStyle = currentTheme.cracked;
  ctx.fillRect(x, y, TILE, TILE);
  ctx.fillStyle = currentTheme.crackedDark;
  ctx.fillRect(x+2, y+2, TILE/2-3, TILE/2-3);
  ctx.fillRect(x+TILE/2+1, y+TILE/2+1, TILE/2-3, TILE/2-3);
  ctx.fillStyle = currentTheme.crackedLight;
  ctx.fillRect(x+TILE/2+1, y+2, TILE/2-3, TILE/2-3);
  ctx.fillRect(x+2, y+TILE/2+1, TILE/2-3, TILE/2-3);
  // Prominent cracks
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + TILE*0.3, y);
  ctx.lineTo(x + TILE*0.4, y + TILE*0.25);
  ctx.lineTo(x + TILE*0.3, y + TILE*0.45);
  ctx.lineTo(x + TILE*0.45, y + TILE*0.6);
  ctx.lineTo(x + TILE*0.35, y + TILE);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + TILE*0.3, y + TILE*0.45);
  ctx.lineTo(x + TILE*0.1, y + TILE*0.55);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + TILE*0.45, y + TILE*0.6);
  ctx.lineTo(x + TILE*0.7, y + TILE*0.55);
  ctx.lineTo(x + TILE*0.85, y + TILE*0.7);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + TILE*0.7, y);
  ctx.lineTo(x + TILE*0.65, y + TILE*0.2);
  ctx.lineTo(x + TILE*0.75, y + TILE*0.35);
  ctx.stroke();
  // Rubble dots
  ctx.fillStyle = '#3a2a1e';
  ctx.fillRect(x + TILE*0.15, y + TILE*0.75, 3, 3);
  ctx.fillRect(x + TILE*0.6, y + TILE*0.8, 4, 3);
  ctx.fillRect(x + TILE*0.8, y + TILE*0.15, 3, 3);
}

function drawDoor(gx, gy, open) {
  const x = gx * TILE, y = gy * TILE;
  // Door frame
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(x + 2, y, TILE - 4, TILE);
  if (open) {
    // Dark interior
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(x + 5, y + 3, TILE - 10, TILE - 3);
    // Frame edges
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(x + 2, y, 3, TILE);
    ctx.fillRect(x + TILE - 5, y, 3, TILE);
    ctx.fillRect(x + 2, y, TILE - 4, 3);
    // Archway hint
    ctx.strokeStyle = '#7a5a3a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x + TILE / 2, y + 6, TILE / 2 - 7, Math.PI, 0);
    ctx.stroke();
  } else {
    // Wooden planks
    ctx.fillStyle = '#7a5a3a';
    ctx.fillRect(x + 4, y + 2, TILE - 8, TILE - 2);
    ctx.strokeStyle = '#4a2a0a';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      const ly = y + i * (TILE / 4);
      ctx.beginPath(); ctx.moveTo(x + 4, ly); ctx.lineTo(x + TILE - 4, ly); ctx.stroke();
    }
    // Vertical center plank
    ctx.beginPath(); ctx.moveTo(x + TILE / 2, y + 2); ctx.lineTo(x + TILE / 2, y + TILE); ctx.stroke();
    // Handle
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.arc(x + TILE * 0.65, y + TILE * 0.55, 3, 0, Math.PI * 2); ctx.fill();
    // Frame border
    ctx.strokeStyle = '#3a1a00';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 3, y + 1, TILE - 6, TILE - 1);
  }
}

// --- FIRE ---

function spawnFire(sx, sy, dx, dy) {
  const steps = [];
  let cx = sx + dx, cy = sy + dy;
  let fdx = dx, fdy = dy;
  const FIRE_DELAY_PER_TILE = 3;

  for (let i = 0; i < 1000; i++) {
    if (cx < 0 || cx >= gameCols || cy < 0 || cy >= gameRows) break;
    const cell = map[cy][cx];
    const g = cell[0], s = cell[1], o = cell[2];
    const delay = steps.length * FIRE_DELAY_PER_TILE;

    // Structure layer: blocking/reflecting
    if (s === WALL || s === PUSH_BLOCK || s === GATE_CLOSED || s === DOOR_CLOSED) break;
    if (s === CRACKED) {
      steps.push({ x: cx, y: cy, efx: ['crack'], fdx, fdy });
      visualOverrides.push({ x: cx, y: cy, layer: 1, value: CRACKED, delay });
      cell[1] = 0;
      SFX.play('crack');
      break;
    }
    if (s === MIRROR_NE) {
      steps.push({ x: cx, y: cy, efx: [], fdx, fdy });
      SFX.play('mirror');
      const ndx = -fdy; fdy = -fdx; fdx = ndx;
      cx += fdx; cy += fdy;
      continue;
    }
    if (s === MIRROR_NW) {
      steps.push({ x: cx, y: cy, efx: [], fdx, fdy });
      SFX.play('mirror');
      const ndx = fdy; fdy = fdx; fdx = ndx;
      cx += fdx; cy += fdy;
      continue;
    }
    // s === GRATE or s === GATE_OPEN or s === 0: fire passes through

    // Apply effects immediately, push visual overrides for delayed rendering
    const efx = [];
    let stop = false;
    const cargoKey = cx + ',' + cy;
    if (g === ICE) {
      efx.push('ice'); stop = true;
      visualOverrides.push({ x: cx, y: cy, layer: 0, value: ICE, delay });
      cell[0] = 0;
      SFX.play('ice');
    } else if (beltCargo[cargoKey] === ICE) {
      efx.push('ice'); stop = true;
      delete beltCargo[cargoKey];
      SFX.play('ice');
    } else if (g === WATER) {
      efx.push('steam'); stop = true;
      SFX.play('steam');
    }

    if (o === TORCH_OFF) {
      efx.push('torch');
      visualOverrides.push({ x: cx, y: cy, layer: 2, value: TORCH_OFF, delay });
      cell[2] = TORCH_ON;
      SFX.play('torch');
    } else if (o === TOGGLE_OFF) {
      efx.push('toggle_on');
      visualOverrides.push({ x: cx, y: cy, layer: 2, value: TOGGLE_OFF, delay });
      cell[2] = TOGGLE_ON;
      applyConnectionImmediate(cx, cy, 'toggle_on', delay);
      SFX.play('toggle');
    } else if (o === TOGGLE_ON) {
      efx.push('toggle_off');
      visualOverrides.push({ x: cx, y: cy, layer: 2, value: TOGGLE_ON, delay });
      cell[2] = TOGGLE_OFF;
      applyConnectionImmediate(cx, cy, 'toggle_off', delay);
      SFX.play('toggle');
    } else if (o === LEVER_OFF) {
      efx.push('lever_on');
      visualOverrides.push({ x: cx, y: cy, layer: 2, value: LEVER_OFF, delay });
      cell[2] = LEVER_ON;
      applyConnectionImmediate(cx, cy, 'toggle_on', delay);
      SFX.play('toggle');
    } else if (o === LEVER_ON) {
      efx.push('lever_off');
      visualOverrides.push({ x: cx, y: cy, layer: 2, value: LEVER_ON, delay });
      cell[2] = LEVER_OFF;
      applyConnectionImmediate(cx, cy, 'toggle_off', delay);
      SFX.play('toggle');
    }

    steps.push({ x: cx, y: cy, efx, fdx, fdy });
    if (stop) break;
    cx += fdx; cy += fdy;
  }

  // Spawn visual particles (map effects already applied above)
  steps.forEach((s, i) => {
    const delay = i * FIRE_DELAY_PER_TILE;
    // Steam particles
    if (s.efx.includes('steam')) {
      for (let sp = 0; sp < 10; sp++) {
        fireParticles.push({
          x: s.x * TILE + TILE/2 + (Math.random()-0.5)*16,
          y: s.y * TILE + TILE/2 + (Math.random()-0.5)*10,
          vx: (Math.random()-0.5)*2,
          vy: -Math.random()*2.5 - 1,
          life: 35, maxLife: 35, delay, steam: true
        });
      }
    }
    // Fire/bullet particles
    if (weaponMode === 'gun') {
      for (let p = 0; p < 2; p++) {
        fireParticles.push({
          x: s.x * TILE + TILE/2 + (Math.random()-0.5)*4,
          y: s.y * TILE + TILE/2 + (Math.random()-0.5)*4,
          vx: s.fdx * 1.5 + (Math.random()-0.5)*0.5,
          vy: s.fdy * 1.5 + (Math.random()-0.5)*0.5,
          life: 12 + i*2, maxLife: 12 + i*2, delay,
          bullet: true, bdx: s.fdx, bdy: s.fdy
        });
      }
    } else {
      for (let p = 0; p < 4; p++) {
        fireParticles.push({
          x: s.x * TILE + TILE/2 + (Math.random()-0.5)*10,
          y: s.y * TILE + TILE/2 + (Math.random()-0.5)*10,
          vx: (Math.random()-0.5)*2,
          vy: (Math.random()-0.5)*2 - 1,
          life: 30 + i*3, maxLife: 30 + i*3, delay
        });
      }
    }
  });
  // Lead particle: blocks movement for exactly the travel duration + small buffer
  if (steps.length > 0) {
    const last = steps[steps.length - 1];
    fireParticles.push({
      x: last.x * TILE + TILE/2, y: last.y * TILE + TILE/2,
      vx: 0, vy: 0,
      life: (steps.length - 1) * FIRE_DELAY_PER_TILE + 5,
      maxLife: (steps.length - 1) * FIRE_DELAY_PER_TILE + 5,
      delay: 0, lead: true
    });
  }
}

function tickPendingEffects() {
  // Only connection effects remain (from pressure plates)
  for (let i = pendingEffects.length - 1; i >= 0; i--) {
    const e = pendingEffects[i];
    if (e.delay > 0) { e.delay--; continue; }
    if (e.type === 'connection') {
      const cell = map[e.y][e.x];
      const props = levelCellProps[e.x + ',' + e.y] || {};
      const reverse = !!props.reverse;
      if (cell[1] === GATE_OPEN || cell[1] === GATE_CLOSED) {
        const gOld = cell[1];
        if (e.activationType === 'toggle_on') {
          cell[1] = reverse ? GATE_OPEN : GATE_CLOSED;
        } else if (e.activationType === 'toggle_off') {
          cell[1] = reverse ? GATE_CLOSED : GATE_OPEN;
        }
        if (cell[1] !== gOld) SFX.play('gate');
      } else if (cell[0] === WATER || cell[0] === WATER_DRY) {
        const wOld = cell[0];
        if (e.activationType === 'toggle_on') {
          cell[0] = reverse ? WATER_DRY : WATER;
        } else if (e.activationType === 'toggle_off') {
          cell[0] = reverse ? WATER : WATER_DRY;
        }
        if (cell[0] !== wOld) SFX.play('water');
      } else if (cell[2] === EYE_OFF || cell[2] === EYE_ON) {
        if (e.activationType === 'toggle_on') {
          cell[2] = reverse ? EYE_OFF : EYE_ON;
        } else if (e.activationType === 'toggle_off') {
          cell[2] = reverse ? EYE_ON : EYE_OFF;
        }
      }
    }
    pendingEffects.splice(i, 1);
  }
}

function tickVisualOverrides() {
  for (let i = visualOverrides.length - 1; i >= 0; i--) {
    if (visualOverrides[i].delay > 0) {
      visualOverrides[i].delay--;
    } else {
      visualOverrides.splice(i, 1);
    }
  }
}

// ====== CONNECTION HELPERS ======
function getConnectionsFrom(x, y) {
  return levelConnections.filter(c => c.from[0] === x && c.from[1] === y);
}

function getConnectionsTo(x, y) {
  return levelConnections.filter(c => c.to[0] === x && c.to[1] === y);
}

function activateConnections(x, y, activationType) {
  getConnectionsFrom(x, y).forEach(conn => {
    pendingEffects.push({
      x: conn.to[0], y: conn.to[1],
      type: 'connection', activationType, delay: 5
    });
  });
}

// Apply connection effects immediately to the map + push visual overrides
function applyConnectionImmediate(x, y, activationType, baseDelay) {
  getConnectionsFrom(x, y).forEach(conn => {
    const tx = conn.to[0], ty = conn.to[1];
    const cell = map[ty][tx];
    const props = levelCellProps[tx + ',' + ty] || {};
    const reverse = !!props.reverse;
    if (cell[1] === GATE_OPEN || cell[1] === GATE_CLOSED) {
      const oldVal = cell[1];
      if (activationType === 'toggle_on') {
        cell[1] = reverse ? GATE_OPEN : GATE_CLOSED;
      } else if (activationType === 'toggle_off') {
        cell[1] = reverse ? GATE_CLOSED : GATE_OPEN;
      }
      if (cell[1] !== oldVal) {
        visualOverrides.push({ x: tx, y: ty, layer: 1, value: oldVal, delay: baseDelay + 5 });
        SFX.play('gate');
      }
    } else if (cell[0] === WATER || cell[0] === WATER_DRY) {
      const oldVal = cell[0];
      if (activationType === 'toggle_on') {
        cell[0] = reverse ? WATER_DRY : WATER;
      } else if (activationType === 'toggle_off') {
        cell[0] = reverse ? WATER : WATER_DRY;
      }
      if (cell[0] !== oldVal) {
        visualOverrides.push({ x: tx, y: ty, layer: 0, value: oldVal, delay: baseDelay + 5 });
        SFX.play('water');
      }
    } else if (cell[2] === EYE_OFF || cell[2] === EYE_ON) {
      const oldVal = cell[2];
      if (activationType === 'toggle_on') {
        cell[2] = reverse ? EYE_OFF : EYE_ON;
      } else if (activationType === 'toggle_off') {
        cell[2] = reverse ? EYE_ON : EYE_OFF;
      }
      if (cell[2] !== oldVal) {
        visualOverrides.push({ x: tx, y: ty, layer: 2, value: oldVal, delay: baseDelay + 5 });
      }
    }
  });
}

function allTorchesLit() {
  if (visualOverrides.some(v => v.layer === 2 && (v.value === TORCH_OFF || v.value === TOGGLE_OFF))) return false;
  for (let r = 0; r < gameRows; r++)
    for (let c = 0; c < gameCols; c++) {
      const o = map[r][c][2];
      if (o === TORCH_OFF || o === TOGGLE_OFF) return false;
    }
  return true;
}

function levelHasDoor() {
  for (let r = 0; r < gameRows; r++)
    for (let c = 0; c < gameCols; c++)
      if (map[r][c][1] === DOOR_CLOSED || map[r][c][1] === DOOR_OPEN) return true;
  return false;
}

function levelHasTorches() {
  for (let r = 0; r < gameRows; r++)
    for (let c = 0; c < gameCols; c++) {
      const o = map[r][c][2];
      if (o === TORCH_OFF || o === TORCH_ON || o === TOGGLE_OFF || o === TOGGLE_ON) return true;
    }
  return false;
}

function updateDoors() {
  const open = !levelHasTorches() || allTorchesLit();
  for (let r = 0; r < gameRows; r++)
    for (let c = 0; c < gameCols; c++) {
      if (map[r][c][1] === DOOR_CLOSED && open) map[r][c][1] = DOOR_OPEN;
      else if (map[r][c][1] === DOOR_OPEN && !open) map[r][c][1] = DOOR_CLOSED;
    }
}

function checkWin() {
  if (levelHasDoor()) return map[player.y][player.x][1] === DOOR_OPEN;
  return allTorchesLit();
}

let winTimer = 0;

// --- PROGRESS TRACKING ---

function getProgress() {
  try { return JSON.parse(localStorage.getItem('dragonPuzzleProgress') || '{}'); } catch(e) { return {}; }
}

function saveProgress(levelIndex) {
  const prog = getProgress();
  if (cheated) {
    // Cheated: only save as cheated, don't overwrite a legit completion
    if (packName) {
      if (!prog.customCheated) prog.customCheated = {};
      if (!prog.customCheated[packName]) prog.customCheated[packName] = [];
      prog.customCheated[packName][levelIndex] = true;
    } else {
      if (!prog.campaignCheated) prog.campaignCheated = [];
      prog.campaignCheated[levelIndex] = true;
    }
  } else {
    // Legit completion
    if (packName) {
      if (!prog.custom) prog.custom = {};
      if (!prog.custom[packName]) prog.custom[packName] = [];
      prog.custom[packName][levelIndex] = true;
    } else {
      if (!prog.campaign) prog.campaign = [];
      prog.campaign[levelIndex] = true;
    }
    // Drunk mode completion
    if (drunkMode && drunkAllMoves) {
      if (packName) {
        if (!prog.customDrunk) prog.customDrunk = {};
        if (!prog.customDrunk[packName]) prog.customDrunk[packName] = [];
        prog.customDrunk[packName][levelIndex] = true;
      } else {
        if (!prog.campaignDrunk) prog.campaignDrunk = [];
        prog.campaignDrunk[levelIndex] = true;
      }
    }
  }
  localStorage.setItem('dragonPuzzleProgress', JSON.stringify(prog));
}

function isLevelCompleted(levelIndex) {
  const prog = getProgress();
  if (packName) {
    return prog.custom && prog.custom[packName] && prog.custom[packName][levelIndex];
  }
  return prog.campaign && prog.campaign[levelIndex];
}

function isCheatedCompleted(levelIndex) {
  const prog = getProgress();
  if (packName) {
    return prog.customCheated && prog.customCheated[packName] && prog.customCheated[packName][levelIndex];
  }
  return prog.campaignCheated && prog.campaignCheated[levelIndex];
}

function isDrunkCompleted(levelIndex) {
  const prog = getProgress();
  if (packName) {
    return prog.customDrunk && prog.customDrunk[packName] && prog.customDrunk[packName][levelIndex];
  }
  return prog.campaignDrunk && prog.campaignDrunk[levelIndex];
}

// --- STATE MANAGEMENT ---

function setState(s) {
  gameState = s;
  document.getElementById('levelselect-overlay').style.display = s === 'levelselect' ? 'flex' : 'none';
  document.getElementById('pause-overlay').style.display = s === 'paused' ? 'flex' : 'none';
  document.getElementById('packbrowser-overlay').style.display = s === 'packbrowser' ? 'flex' : 'none';
  document.getElementById('win-overlay').style.display = s === 'win' ? 'flex' : 'none';
  document.getElementById('death-overlay').style.display = s === 'death' ? 'flex' : 'none';
  const gameVisible = s === 'playing' || s === 'paused' || s === 'win' || s === 'death' || s === 'dying';
  document.getElementById('ui').style.display = gameVisible ? 'block' : 'none';
  document.getElementById('controls').style.display = s === 'playing' ? 'block' : 'none';
  canvas.style.display = gameVisible ? 'block' : 'none';
}

function renderLevelSelect() {
  const grid = document.getElementById('levelselect-grid');
  grid.innerHTML = '';
  document.getElementById('levelselect-packname').textContent = packName || 'Campaign';
  activeLevels.forEach((lvl, i) => {
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    if (isLevelCompleted(i)) btn.classList.add('completed');
    else if (isCheatedCompleted(i)) btn.classList.add('cheated');
    if (isDrunkCompleted(i)) btn.classList.add('drunk-completed');
    btn.textContent = i + 1;
    if (lvl.name) btn.title = lvl.name;
    btn.onclick = () => {
      SFX.play('click');
      currentLevel = i;
      loadLevel(i);
      setState('playing');
    };
    grid.appendChild(btn);
  });
}

function renderPackBrowser() {
  const list = document.getElementById('pack-list');
  list.innerHTML = '';
  let packs = {};
  try { packs = JSON.parse(localStorage.getItem('dragonPuzzlePacks') || '{}'); } catch(e) {}
  const names = Object.keys(packs);
  if (names.length === 0) {
    list.innerHTML = '<p style="color:#888">No saved packs yet. Create one in the Level Editor!</p>';
    return;
  }
  names.forEach(name => {
    const pack = packs[name];
    const btn = document.createElement('button');
    btn.className = 'menu-btn pack-btn';
    const count = pack.levels ? pack.levels.length : 0;
    btn.innerHTML = '<strong>' + name + '</strong><br><span style="color:#888">' + count + ' level' + (count !== 1 ? 's' : '') + '</span>';
    btn.onclick = () => {
      const migrated = migratePack(JSON.parse(JSON.stringify(pack)));
      activeLevels = migrated.levels;
      packName = name;
      renderLevelSelect();
      setState('levelselect');
    };
    list.appendChild(btn);
  });
}

// --- MENU ACTIONS ---

function goMainMenu() {
  window.location = 'index.html';
}

function resumeGame() {
  setState('playing');
}

function restartLevel() {
  loadLevel(currentLevel);
  setState('playing');
}

let deathTimer = 0;
function killPlayer() {
  if (gameState !== 'playing') return;
  deathTimer = 0;
  gameState = 'dying';
  SFX.play('death');
}

function showLevelSelect() {
  renderLevelSelect();
  setState('levelselect');
}

function nextLevel() {
  if (currentLevel < activeLevels.length - 1) {
    currentLevel++;
    loadLevel(currentLevel);
    setState('playing');
  } else {
    showLevelSelect();
  }
}

function loadShareCode() {
  const input = document.getElementById('share-code-input');
  const code = input.value.trim();
  if (!code) return;
  try {
    const b64 = code.startsWith('DRAGONPACK:') ? code.slice(11) : code;
    const json = decodeURIComponent(escape(atob(b64)));
    const data = migratePack(JSON.parse(json));
    if (data && data.levels && data.levels.length) {
      activeLevels = data.levels;
      packName = data.name || 'Shared';
      renderLevelSelect();
      setState('levelselect');
    } else {
      alert('Invalid pack data');
    }
  } catch(e) {
    alert('Invalid share code');
  }
}

// --- INPUT ---

document.addEventListener('keydown', e => {
  // Console toggle
  if (e.code === 'Backquote') {
    e.preventDefault();
    if (!dragamonActive && !newsActive && !dialogueActive) toggleConsole();
    return;
  }

  // Block game input while console or dragamon or captcha or news or dialogue is open
  if (consoleOpen || dragamonActive || captchaActive || newsActive || dialogueActive) return;

  // Custom key bindings
  if (keyBindings[e.code]) {
    e.preventDefault();
    execCommand(keyBindings[e.code]);
    return;
  }

  // Escape handling
  if (e.code === 'Escape') {
    e.preventDefault();
    if (gameState === 'playing') { setState('paused'); return; }
    if (gameState === 'paused') { resumeGame(); return; }
    return;
  }

  // Only process game input when playing
  if (gameState !== 'playing') return;
  // Block input while fire is still traveling
  if (fireParticles.some(p => p.lead)) return;

  // Save undo state before any action
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'KeyW' || e.code === 'KeyA' || e.code === 'KeyS' || e.code === 'KeyD') {
    saveUndo();
  }

  if (e.code === 'Space') {
    e.preventDefault();
    if (maxFire > 0 && fireUsed >= maxFire && !godMode) return;
    // Can't breathe fire while standing in water (check ground layer)
    if (map[player.y][player.x][0] === WATER) {
      for (let p = 0; p < 6; p++) {
        fireParticles.push({
          x: player.x * TILE + TILE/2 + (Math.random()-0.5)*12,
          y: player.y * TILE + TILE/4 + (Math.random()-0.5)*8,
          vx: (Math.random()-0.5)*1.5,
          vy: -Math.random()*2 - 0.5,
          life: 20, maxLife: 20, delay: 0, steam: true
        });
      }
      SFX.play('steam');
      return;
    }
    spawnFire(player.x, player.y, facing.x, facing.y);
    SFX.play('fire');
    fireUsed++;
    // Fire counts as a "turn" for belts and plates
    const beltGF = map[player.y][player.x][0];
    if (beltGF >= BELT_UP && beltGF <= BELT_LEFT) {
      const beltDirsF = [[0,-1],[1,0],[0,1],[-1,0]];
      const [bdxF, bdyF] = beltDirsF[beltGF - BELT_UP];
      const bxF = player.x + bdxF, byF = player.y + bdyF;
      if (bxF >= 0 && bxF < gameCols && byF >= 0 && byF < gameRows) {
        const bcF = map[byF][bxF];
        if (bcF[1] !== WALL && bcF[1] !== MIRROR_NE && bcF[1] !== MIRROR_NW && bcF[1] !== GRATE && bcF[1] !== GATE_CLOSED && bcF[1] !== PUSH_BLOCK && bcF[1] !== CRACKED && bcF[1] !== DOOR_CLOSED && bcF[1] !== DOOR_OPEN && bcF[0] !== ICE) {
          player.x = bxF; player.y = byF;
          SFX.play('belt');
        }
      }
    }
    // Spike death after fire belt push
    if (map[player.y][player.x][0] === SPIKE && !noclipOn && !godMode) { killPlayer(); return; }
    tickBelts();
    updatePlates();
    updateFacingForEyes();
    return;
  }
  if (e.code === 'KeyR') { loadLevel(currentLevel); return; }

  // Interact with adjacent paper or dragon NPC (E key)
  if (e.code === 'KeyE') {
    e.preventDefault();
    const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
    for (const [ddx, ddy] of dirs) {
      const nx = player.x + ddx, ny = player.y + ddy;
      if (nx >= 0 && nx < gameCols && ny >= 0 && ny < gameRows) {
        const d3 = map[ny][nx][3];
        if (d3 === PAPER) {
          const props = levelCellProps[nx + ',' + ny] || {};
          showNewspaper(props.paperText || 'The page is blank.', props.paperSubtitle);
          return;
        }
        if (d3 === DRAGON_NPC) {
          const props = levelCellProps[nx + ',' + ny] || {};
          showDialogue(props.npcText || 'The dragon stares silently.', props.npcName || 'Dragon', props.npcColor);
          return;
        }
        const d4 = map[ny][nx][4];
        if (d4 === PAPER) {
          const props = levelCellProps[nx + ',' + ny] || {};
          showNewspaper(props.paperText || 'The page is blank.', props.paperSubtitle);
          return;
        }
        if (d4 === DRAGON_NPC) {
          const props = levelCellProps[nx + ',' + ny] || {};
          showDialogue(props.npcText || 'The dragon stares silently.', props.npcName || 'Dragon', props.npcColor);
          return;
        }
      }
    }
    // Also check the tile the player is standing on
    const d3s = map[player.y][player.x][3];
    if (d3s === PAPER) {
      const props = levelCellProps[player.x + ',' + player.y] || {};
      showNewspaper(props.paperText || 'The page is blank.', props.paperSubtitle);
      return;
    }
    if (d3s === DRAGON_NPC) {
      const props = levelCellProps[player.x + ',' + player.y] || {};
      showDialogue(props.npcText || 'The dragon stares silently.', props.npcName || 'Dragon', props.npcColor);
      return;
    }
    const d4s = map[player.y][player.x][4];
    if (d4s === PAPER) {
      const props = levelCellProps[player.x + ',' + player.y] || {};
      showNewspaper(props.paperText || 'The page is blank.', props.paperSubtitle);
      return;
    }
    if (d4s === DRAGON_NPC) {
      const props = levelCellProps[player.x + ',' + player.y] || {};
      showDialogue(props.npcText || 'The dragon stares silently.', props.npcName || 'Dragon', props.npcColor);
      return;
    }
    return;
  }

  let dx = 0, dy = 0;
  if (e.code === 'ArrowUp' || e.code === 'KeyW') dy = -1;
  else if (e.code === 'ArrowDown' || e.code === 'KeyS') dy = 1;
  else if (e.code === 'ArrowLeft' || e.code === 'KeyA') dx = -1;
  else if (e.code === 'ArrowRight' || e.code === 'KeyD') dx = 1;
  else return;

  // Track if any move was made without drunk mode
  if (!drunkMode) drunkAllMoves = false;

  // Drunk mode: 50% chance to scramble direction
  if (drunkMode && Math.random() < 0.5) {
    const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
    const pick = dirs[Math.floor(Math.random() * 4)];
    dx = pick[0]; dy = pick[1];
  }
  e.preventDefault();

  if (dx !== 0 || dy !== 0) {
    facing = { x: dx, y: dy };
  }

  // Move (check layers)
  const nx = player.x + dx;
  const ny = player.y + dy;
  if (nx >= 0 && nx < gameCols && ny >= 0 && ny < gameRows) {
    if (noclipOn) {
      player.x = nx; player.y = ny;
      SFX.play('move');
    } else {
      const cell = map[ny][nx];
      const st = cell[1]; // structure layer
      if (st === WALL || st === MIRROR_NE || st === MIRROR_NW || st === GRATE || st === GATE_CLOSED || st === CRACKED || st === DOOR_CLOSED) {
        // Blocked by structure
      } else if (cell[3] === DRAGON_NPC || cell[4] === DRAGON_NPC) {
        // Blocked by NPC
      } else if (st === PUSH_BLOCK) {
        if (tryPush(nx, ny, dx, dy)) { player.x = nx; player.y = ny; SFX.play('push'); }
      } else if (cell[0] === ICE) {
        if (tryPush(nx, ny, dx, dy)) { player.x = nx; player.y = ny; SFX.play('push'); }
      } else {
        player.x = nx;
        player.y = ny;
        SFX.play('move');
      }
    }
  }

  // Belt push
  const beltG = map[player.y][player.x][0];
  if (beltG >= BELT_UP && beltG <= BELT_LEFT) {
    const beltDirs = [[0,-1],[1,0],[0,1],[-1,0]];
    const [bdx, bdy] = beltDirs[beltG - BELT_UP];
    const bx = player.x + bdx, by = player.y + bdy;
    if (bx >= 0 && bx < gameCols && by >= 0 && by < gameRows) {
      const bc = map[by][bx];
      if (bc[1] !== WALL && bc[1] !== MIRROR_NE && bc[1] !== MIRROR_NW && bc[1] !== GRATE && bc[1] !== GATE_CLOSED && bc[1] !== PUSH_BLOCK && bc[1] !== CRACKED && bc[1] !== DOOR_CLOSED && bc[1] !== DOOR_OPEN && bc[0] !== ICE) {
        player.x = bx; player.y = by;
        SFX.play('belt');
      }
    }
  }

  // Spike death check
  if (map[player.y][player.x][0] === SPIKE && !noclipOn && !godMode) { killPlayer(); return; }

  // Paint trail
  if (paintMode) {
    paintTrail.push({ x: player.x, y: player.y, hue: (Date.now() / 3) % 360 });
  }

  // Push objects on belts, then update pressure plates
  tickBelts();
  updatePlates();
  updateFacingForEyes();
  checkIfRules();
});

// --- DRAW LOOP ---

function draw() {
  tickPendingEffects();
  tickVisualOverrides();
  updateFacingForEyes();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Build visual override lookup for this frame
  const voMap = {};
  visualOverrides.forEach(v => { voMap[v.x + ',' + v.y + ',' + v.layer] = v.value; });

  // Draw tiles (3 layers: ground, structure, object)
  for (let r = 0; r < gameRows; r++) {
    for (let c = 0; c < gameCols; c++) {
      drawFloor(c, r);
      const cell = map[r][c];
      // Use visual override if active, otherwise actual map value
      const g = (voMap[c+','+r+',0'] !== undefined) ? voMap[c+','+r+',0'] : cell[0];
      const s = (voMap[c+','+r+',1'] !== undefined) ? voMap[c+','+r+',1'] : cell[1];
      const o = (voMap[c+','+r+',2'] !== undefined) ? voMap[c+','+r+',2'] : cell[2];
      // Layer 0: ground
      if (g === ICE) drawIce(c, r);
      else if (g === WATER) drawWater(c, r);
      else if (g === WATER_DRY) drawWaterDry(c, r);
      else if (g >= BELT_UP && g <= BELT_LEFT) drawBelt(c, r, g);
      else if (g === PLATE) drawPlate(c, r, pressedPlates.has(c + ',' + r));
      else if (g === SPIKE) drawSpike(c, r);
      // Belt cargo (ice riding on belts)
      if (beltCargo[c + ',' + r] === ICE) drawIce(c, r);
      // Layer 1: structure
      if (s === WALL) drawWall(c, r);
      else if (s === MIRROR_NE || s === MIRROR_NW) drawMirror(c, r, s);
      else if (s === GRATE) drawGrate(c, r);
      else if (s === PUSH_BLOCK) drawPushBlock(c, r);
      else if (s === GATE_CLOSED) drawGate(c, r, true);
      else if (s === GATE_OPEN) drawGate(c, r, false);
      else if (s === CRACKED) drawCrackedWall(c, r);
      else if (s === DOOR_CLOSED) drawDoor(c, r, false);
      else if (s === DOOR_OPEN) drawDoor(c, r, true);
      // Layer 2: object
      if (o === TORCH_OFF) drawTorch(c, r, false);
      else if (o === TORCH_ON) drawTorch(c, r, true);
      else if (o === TOGGLE_OFF) drawToggleTorch(c, r, false);
      else if (o === TOGGLE_ON) drawToggleTorch(c, r, true);
      else if (o === LEVER_OFF) drawLever(c, r, false);
      else if (o === LEVER_ON) drawLever(c, r, true);
      else if (o === EYE_OFF) drawEye(c, r, false);
      else if (o === EYE_ON) drawEye(c, r, true);
      // Layer 3: deco
      const d = cell[3];
      let decoRotated = false;
      if (d && ROTATABLE_DECO.has(d)) {
        const rot = (levelCellProps[c+','+r] || {}).rotation || 0;
        if (rot) { decoRotated = true; ctx.save(); ctx.translate(c*TILE+TILE/2, r*TILE+TILE/2); ctx.rotate(rot*Math.PI/2); ctx.translate(-(c*TILE+TILE/2), -(r*TILE+TILE/2)); }
      }
      if (d === SKULL) drawSkull(c, r);
      else if (d === BONES) drawBones(c, r);
      else if (d === COBWEB) drawCobweb(c, r);
      else if (d === MUSHROOM) drawMushroom(c, r);
      else if (d === GEAR) drawGear(c, r);
      else if (d === PIPE) drawPipe(c, r);
      else if (d === CRATE) drawCrate(c, r);
      else if (d === PAPER) drawPaper(c, r);
      else if (d === RAILWAY) drawRailway(c, r);
      else if (d === ROAD) drawRoad(c, r);
      else if (d === LAMPPOST) drawLamppost(c, r);
      else if (d === BENCH) drawBench(c, r);
      else if (d === FOUNTAIN) drawFountain(c, r);
      else if (d === DRAGON_NPC) {
        const np = levelCellProps[c+','+r] || {};
        const nf = [[1,0],[0,1],[-1,0],[0,-1]][np.npcFacing||0];
        drawDragonNPC(c, r, nf[0], nf[1], np.npcColor);
      }
      else if (d === TRAFFIC_LIGHT) drawTrafficLight(c, r);
      else if (d === FIRE_HYDRANT) drawFireHydrant(c, r);
      else if (d === MANHOLE) drawManhole(c, r);
      else if (d === TRASH_CAN) drawTrashCan(c, r);
      else if (d === TRAIN_FRONT) drawTrainFront(c, r);
      else if (d === TRAIN_BODY) drawTrainBody(c, r);
      else if (d === TRAIN_WINDOW) drawTrainWindow(c, r);
      else if (d === TRAIN_SEAT) drawTrainSeat(c, r);
      else if (d === TRAIN_WHEEL) drawTrainWheel(c, r);
      else if (d === BARREL) drawBarrel(c, r);
      else if (d === SUBWAY_WALL) drawSubwayWall(c, r);
      else if (d === PLATFORM_EDGE) drawPlatformEdge(c, r);
      else if (d === SUBWAY_SIGN) drawSubwaySign(c, r);
      else if (d === TURNSTILE) drawTurnstile(c, r);
      else if (d === SUBWAY_MAP) drawSubwayMap(c, r);
      else if (d === SUBWAY_PILLAR) drawSubwayPillar(c, r);
      if (decoRotated) ctx.restore();
      // Layer 4: deco2
      const d2 = cell[4];
      let deco2Rotated = false;
      if (d2 && ROTATABLE_DECO.has(d2)) {
        const rot = (levelCellProps[c+','+r] || {}).rotation || 0;
        if (rot) { deco2Rotated = true; ctx.save(); ctx.translate(c*TILE+TILE/2, r*TILE+TILE/2); ctx.rotate(rot*Math.PI/2); ctx.translate(-(c*TILE+TILE/2), -(r*TILE+TILE/2)); }
      }
      if (d2 === SKULL) drawSkull(c, r);
      else if (d2 === BONES) drawBones(c, r);
      else if (d2 === COBWEB) drawCobweb(c, r);
      else if (d2 === MUSHROOM) drawMushroom(c, r);
      else if (d2 === GEAR) drawGear(c, r);
      else if (d2 === PIPE) drawPipe(c, r);
      else if (d2 === CRATE) drawCrate(c, r);
      else if (d2 === PAPER) drawPaper(c, r);
      else if (d2 === RAILWAY) drawRailway(c, r);
      else if (d2 === ROAD) drawRoad(c, r);
      else if (d2 === LAMPPOST) drawLamppost(c, r);
      else if (d2 === BENCH) drawBench(c, r);
      else if (d2 === FOUNTAIN) drawFountain(c, r);
      else if (d2 === DRAGON_NPC) {
        const np = levelCellProps[c+','+r] || {};
        const nf = [[1,0],[0,1],[-1,0],[0,-1]][np.npcFacing||0];
        drawDragonNPC(c, r, nf[0], nf[1], np.npcColor);
      }
      else if (d2 === TRAFFIC_LIGHT) drawTrafficLight(c, r);
      else if (d2 === FIRE_HYDRANT) drawFireHydrant(c, r);
      else if (d2 === MANHOLE) drawManhole(c, r);
      else if (d2 === TRASH_CAN) drawTrashCan(c, r);
      else if (d2 === TRAIN_FRONT) drawTrainFront(c, r);
      else if (d2 === TRAIN_BODY) drawTrainBody(c, r);
      else if (d2 === TRAIN_WINDOW) drawTrainWindow(c, r);
      else if (d2 === TRAIN_SEAT) drawTrainSeat(c, r);
      else if (d2 === TRAIN_WHEEL) drawTrainWheel(c, r);
      else if (d2 === BARREL) drawBarrel(c, r);
      else if (d2 === SUBWAY_WALL) drawSubwayWall(c, r);
      else if (d2 === PLATFORM_EDGE) drawPlatformEdge(c, r);
      else if (d2 === SUBWAY_SIGN) drawSubwaySign(c, r);
      else if (d2 === TURNSTILE) drawTurnstile(c, r);
      else if (d2 === SUBWAY_MAP) drawSubwayMap(c, r);
      else if (d2 === SUBWAY_PILLAR) drawSubwayPillar(c, r);
      if (deco2Rotated) ctx.restore();
    }
  }

  // Console grid overlay
  if (consoleOpen) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (let c = 0; c <= gameCols; c++) {
      ctx.beginPath(); ctx.moveTo(c * TILE, 0); ctx.lineTo(c * TILE, gameRows * TILE); ctx.stroke();
    }
    for (let r = 0; r <= gameRows; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * TILE); ctx.lineTo(gameCols * TILE, r * TILE); ctx.stroke();
    }
    // Coordinate labels
    for (let r = 0; r < gameRows; r++) {
      for (let c = 0; c < gameCols; c++) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(c * TILE, r * TILE, 22, 11);
        ctx.fillStyle = 'rgba(255,255,0,0.7)';
        ctx.fillText(c + ',' + r, c * TILE + 11, r * TILE + 1);
      }
    }
    ctx.restore();
  }

  // Connection highlight overlay
  if (highlightConns && levelConnections.length > 0) {
    ctx.save();
    ctx.lineWidth = 2;
    levelConnections.forEach((conn, i) => {
      const fx = conn.from[0] * TILE + TILE / 2, fy = conn.from[1] * TILE + TILE / 2;
      const tx = conn.to[0] * TILE + TILE / 2, ty = conn.to[1] * TILE + TILE / 2;
      const hue = (i * 60) % 360;
      ctx.strokeStyle = 'hsla(' + hue + ',80%,60%,0.7)';
      ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(tx, ty); ctx.stroke();
      // Arrow head
      const angle = Math.atan2(ty - fy, tx - fx);
      ctx.fillStyle = 'hsla(' + hue + ',80%,60%,0.9)';
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - 8 * Math.cos(angle - 0.4), ty - 8 * Math.sin(angle - 0.4));
      ctx.lineTo(tx - 8 * Math.cos(angle + 0.4), ty - 8 * Math.sin(angle + 0.4));
      ctx.closePath(); ctx.fill();
      // Source dot
      ctx.fillStyle = 'hsla(' + hue + ',80%,70%,0.8)';
      ctx.beginPath(); ctx.arc(fx, fy, 4, 0, Math.PI * 2); ctx.fill();
    });
    ctx.restore();
  }

  // Fire counter
  if (maxFire > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(4, canvas.height - 24, 120, 20);
    ctx.fillStyle = fireUsed >= maxFire ? '#ff4444' : '#ff9900';
    ctx.font = '14px monospace';
    ctx.textAlign = 'left';
    const weapLabel = weaponMode === 'gun' ? 'Ammo' : 'Fire';
    ctx.fillText(`${weapLabel}: ${maxFire - fireUsed} / ${maxFire}`, 8, canvas.height - 8);
  }

  // Paint trail
  if (paintTrail.length > 0) {
    paintTrail.forEach((pt, i) => {
      const alpha = 0.3 + 0.4 * (i / paintTrail.length);
      ctx.fillStyle = `hsla(${pt.hue}, 80%, 55%, ${alpha})`;
      ctx.beginPath();
      ctx.arc(pt.x * TILE + TILE/2, pt.y * TILE + TILE/2, TILE * 0.2, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // Draw dragon
  drawDragon(player.x, player.y, facing.x, facing.y);

  // Draw fire/bullet particles
  fireParticles.forEach(p => {
    if (p.delay > 0) { p.delay--; return; }
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.lead) return; // invisible marker, not drawn
    const alpha = p.life / p.maxLife;
    if (p.steam) {
      const size = 3 + (1 - alpha) * 4;
      ctx.fillStyle = `rgba(200,210,220,${alpha * 0.7})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, Math.PI*2); ctx.fill();
    } else if (p.bullet) {
      ctx.fillStyle = `rgba(255,220,60,${alpha})`;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.atan2(p.bdy || 0, p.bdx || 1));
      ctx.fillRect(-4, -1.5, 8, 3);
      ctx.restore();
      // muzzle flash trail
      ctx.fillStyle = `rgba(255,255,200,${alpha * 0.4})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
    } else {
      const size = 3 + (1 - alpha) * 4;
      ctx.fillStyle = `rgba(255,${Math.floor(100 + 100*alpha)},0,${alpha})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, Math.PI*2); ctx.fill();
    }
  });
  fireParticles = fireParticles.filter(p => p.life > 0 || p.delay > 0);

  // Update door states based on torch state
  if (gameState === 'playing') updateDoors();
  // Win check (only during gameplay)
  if (gameState === 'playing' && checkWin()) {
    winTimer++;
    // Brief celebration on canvas before showing overlay
    const alpha = Math.min(winTimer / 30, 1);
    ctx.fillStyle = `rgba(255,200,50,${alpha * 0.8})`;
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Level Complete!', canvas.width/2, canvas.height/2);
    if (winTimer >= 50) {
      saveProgress(currentLevel);
      const isLast = currentLevel >= activeLevels.length - 1;
      document.getElementById('win-title').textContent = isLast ? 'All Levels Complete!' : 'Level Complete!';
      document.getElementById('win-next-btn').style.display = isLast ? 'none' : 'block';
      setState('win');
      SFX.play('win');
    }
  } else if (gameState === 'playing') {
    winTimer = 0;
  }

  // Death animation
  if (gameState === 'dying') {
    deathTimer++;
    const alpha = Math.min(deathTimer / 30, 1);
    ctx.fillStyle = `rgba(255,0,0,${alpha * 0.6})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = `rgba(255,68,68,${alpha})`;
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('You Died!', canvas.width / 2, canvas.height / 2);
    if (deathTimer >= 50) {
      setState('death');
    }
  }

  // Cheat border (yellow) or drunk run border (teal)
  if (cheated) {
    ctx.save();
    ctx.strokeStyle = '#c4a800';
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
    ctx.restore();
  } else if (drunkMode && drunkAllMoves) {
    ctx.save();
    ctx.strokeStyle = '#2ab5a0';
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
    ctx.restore();
  }

  requestAnimationFrame(draw);
}

function normalizeKeyCode(raw) {
  const s = raw.trim();
  // Already proper format (e.g. KeyQ, F1, Digit3)
  const known = ['Backquote','Minus','Equal','BracketLeft','BracketRight','Backslash','Semicolon','Quote','Comma','Period','Slash','Backspace','Tab','Enter','ShiftLeft','ShiftRight','ControlLeft','ControlRight','AltLeft','AltRight','Space','Insert','Delete','Home','End','PageUp','PageDown'];
  if (known.includes(s)) return s;
  if (/^Key[A-Z]$/.test(s)) return s;
  if (/^Digit[0-9]$/.test(s)) return s;
  if (/^F\d{1,2}$/.test(s)) return s;
  // Single letter -> KeyX
  if (/^[a-zA-Z]$/.test(s)) return 'Key' + s.toUpperCase();
  // Single digit -> DigitX
  if (/^[0-9]$/.test(s)) return 'Digit' + s;
  // Lowercase variants: f1 -> F1, keyq -> KeyQ, digit3 -> Digit3
  if (/^f\d{1,2}$/i.test(s)) return 'F' + s.slice(1);
  if (/^key[a-z]$/i.test(s)) return 'Key' + s.slice(3).toUpperCase();
  if (/^digit[0-9]$/i.test(s)) return 'Digit' + s.slice(5);
  return s;
}

let conIfRules = [];

function describeIfRule(r) {
  return r.conditions.map(c => {
    if (c.type === 'console') return 'console ' + c.text;
    if (c.type === 'level') return 'level ' + c.level;
    if (c.type === 'grid') return 'grid ' + c.x + ' ' + c.y + ' ' + c.state;
    return '?';
  }).join(' and ');
}

function checkGridState(x, y, state) {
  if (x < 0 || x >= gameCols || y < 0 || y >= gameRows) return false;
  const cell = map[y][x];
  switch (state) {
    case 'lit': return cell[2] === TORCH_ON || cell[2] === TOGGLE_ON || cell[2] === EYE_ON;
    case 'unlit': return cell[2] === TORCH_OFF || cell[2] === TOGGLE_OFF || cell[2] === EYE_OFF;
    case 'open': return cell[1] === GATE_OPEN;
    case 'closed': return cell[1] === GATE_CLOSED;
    case 'water': return cell[0] === WATER;
    case 'dry': return cell[0] === WATER_DRY;
    case 'wall': return cell[1] === WALL;
    case 'empty': return cell[0] === EMPTY && cell[1] === EMPTY && cell[2] === EMPTY;
    case 'player': return player.x === x && player.y === y;
    default: return false;
  }
}

function checkCondition(c) {
  if (c.type === 'level') return (currentLevel + 1) === c.level;
  if (c.type === 'grid') return checkGridState(c.x, c.y, c.state);
  return false; // console conditions handled separately in conPrint
}

function checkIfRules() {
  if (conIfRunning || gameState !== 'playing') return;
  for (const r of conIfRules) {
    // Skip rules with console conditions — those fire from conPrint
    if (r.conditions.some(c => c.type === 'console')) continue;
    const met = r.conditions.every(c => checkCondition(c));
    if (met && !r.wasMet) {
      r.wasMet = true;
      conIfRunning = true;
      execCommand(r.cmd);
      conIfRunning = false;
    } else if (!met) {
      r.wasMet = false;
    }
  }
}

function conPrint(text, cls) {
  const d = document.createElement('div');
  d.textContent = text;
  if (cls) d.className = cls;
  conLog.appendChild(d);
  conLog.scrollTop = conLog.scrollHeight;
  if (!conIfRunning && text) {
    const matching = conIfRules.filter(r => {
      const consoleCond = r.conditions.find(c => c.type === 'console');
      if (!consoleCond) return false;
      if (!text.includes(consoleCond.text)) return false;
      // Check all non-console conditions too
      return r.conditions.every(c => c.type === 'console' ? true : checkCondition(c));
    });
    if (matching.length > 0) {
      conIfRunning = true;
      matching.forEach(r => execCommand(r.cmd));
      conIfRunning = false;
    }
  }
}

function hideAC() {

function showAC(matches) {
  conAC.innerHTML = '';
  if (matches.length === 0) { hideAC(); return; }
  matches.forEach((m, i) => {
    const d = document.createElement('div');
    d.textContent = m;
